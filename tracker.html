<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Robbery Sniper</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.3);
            --green: #00ff88;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }

        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-item { position: relative; height: 70px; display: flex; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .nav-link:hover, .nav-item:hover .nav-link, .nav-link.active { color: #fff; }

        /* Dropdown Logic */
        .dropdown {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; min-width: 200px; padding: 10px;
            opacity: 0; pointer-events: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        .drop-link { display: block; padding: 12px; color: var(--text-dim); text-decoration: none; font-size: 0.75rem; border-radius: 8px; font-weight: 600; }
        .drop-link:hover { background: var(--card); color: var(--accent); }

        /* --- CONTENT --- */
        .container { max-width: 1200px; margin: auto; padding: 0 20px; }
        
        .header-content h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -1.5px; }
        .header-content p { color: var(--text-dim); margin-bottom: 40px; font-size: 1.1rem; }

        .tracker-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); 
            gap: 20px; 
            margin-bottom: 100px;
        }

        /* --- SERVER CARDS --- */
        .server-card { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 24px; 
            text-align: left;
            position: relative;
        }
        .server-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

        .server-name { font-size: 1.1rem; font-weight: 700; color: #fff; margin-bottom: 15px; }
        
        .status-badge {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 6px 12px; border-radius: 8px;
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase;
            background: rgba(255,255,255,0.05); color: var(--text-dim);
        }
        .status-open { background: rgba(0, 255, 136, 0.1); color: var(--green); }

        .join-btn { 
            display: block; width: 100%; 
            background: var(--accent); color: white; 
            padding: 12px; border-radius: 10px; 
            margin-top: 20px; text-decoration: none; 
            font-size: 0.8rem; font-weight: 800; text-align: center;
            box-shadow: 0 4px 15px var(--accent-glow);
        }
        .join-btn:hover { background: #005cc5; transform: scale(1.02); }

        /* Pulse Animation */
        .pulse {
            width: 8px; height: 8px; background: var(--green);
            border-radius: 50%; display: inline-block;
            box-shadow: 0 0 0 rgba(0, 255, 136, 0.4);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(0, 255, 136, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
            100% { box-shadow: 0 0 0 0px rgba(0, 255, 136, 0); }
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="tracker.html" class="nav-link active">Robbery Sniper</a>
            <div class="nav-item">
                <a class="nav-link">Trading Tools ▼</a>
                <div class="dropdown">
                    <a href="values.html" class="drop-link">Value List</a>
                    <a href="calculator.html" class="drop-link">Value Calculator</a>
                </div>
            </div>
        </div>
        <div style="width: 40px;"></div>
    </nav>

    <div class="container">
        <div class="header-content">
            <h1>Live Robbery Tracker</h1>
            <p>Real-time status of active servers. Join open robberies instantly.</p>
        </div>

        <div id="tracker" class="tracker-grid">
            <p style="color:var(--text-dim); font-family: 'JetBrains Mono';">Establishing connection to database...</p>
        </div>
    </div>

<script>
    // PASTE YOUR FIREBASE URL BELOW
    const FIREBASE_URL = "https://YOUR-PROJECT-ID.firebaseio.com"; 

    async function updateTracker() {
        try {
            const res = await fetch(`${FIREBASE_URL}/robberies.json`);
            const data = await res.json();
            const container = document.getElementById('tracker');
            
            if(!data) {
                container.innerHTML = '<p style="color:var(--text-dim)">Searching for active servers...</p>';
                return;
            }

            container.innerHTML = '';
            Object.values(data).forEach(server => {
                const isOpen = server.status === "Open";
                container.innerHTML += `
                    <div class="server-card">
                        <div class="server-name">${server.name}</div>
                        <div class="status-badge ${isOpen ? 'status-open' : ''}">
                            ${isOpen ? '<span class="pulse"></span>' : ''}
                            ${server.status}
                        </div>
                        ${isOpen ? `
                            <a href="roblox://placeId=606849621&gameInstanceId=${server.jobId}" class="join-btn">
                                SNIPE SERVER
                            </a>` : `
                            <div style="margin-top:20px; font-size:0.75rem; color:var(--text-dim); font-weight:700; text-align:center; opacity:0.6;">
                                WAITING...
                            </div>
                        `}
                    </div>`;
            });
        } catch(e) {
            console.error("Fetch error:", e);
        }
    }

    setInterval(updateTracker, 5000); 
    updateTracker();
</script>

</body>
</html>
