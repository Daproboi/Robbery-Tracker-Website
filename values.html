<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Values | Sniper Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --green: #238636;
            --blue: #58a6ff;
        }

        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: sans-serif; 
            padding: 20px; 
            margin: 0;
            text-align: center;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        .header-box { 
            background: var(--card-bg); 
            border: 1px solid var(--border); 
            padding: 20px; 
            border-radius: 10px; 
            margin-bottom: 20px;
        }

        a { color: var(--blue); text-decoration: none; font-weight: bold; font-size: 14px; }

        .search-box {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: #1c2128;
            border: 1px solid var(--border);
            border-radius: 8px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        .tabs {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding-bottom: 10px;
            margin-bottom: 20px;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        
        .tab {
            background: #1c2128;
            border: 1px solid var(--border);
            color: var(--text-dim);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            white-space: nowrap;
            font-size: 13px;
        }
        .tab.active { background: var(--blue); color: white; border-color: var(--blue); }

        .item-list { 
            background: var(--card-bg); 
            border-radius: 10px; 
            border: 1px solid var(--border); 
            overflow: hidden; 
            text-align: left;
        }

        table { width: 100%; border-collapse: collapse; }
        th { background: #1c2128; padding: 12px; font-size: 12px; color: var(--text-dim); text-transform: uppercase; }
        td { padding: 12px; border-top: 1px solid var(--border); font-size: 14px; }
        
        .val-clean { color: var(--green); font-weight: bold; }
        .val-duped { color: #f85149; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-box">
        <h1 style="margin: 0 0 10px 0;">💎 Trading Values</h1>
        <a href="index.html">← Go Back to Tracker</a>
    </div>

    <input type="text" id="searchBar" class="search-box" placeholder="Search for items (e.g. Torpedo, HyperRed)..." onkeyup="renderItems()">

    <div class="tabs" id="tabContainer">
        <div class="tab active" onclick="filterCat('All', this)">All</div>
    </div>

    <div class="item-list">
        <table>
            <thead>
                <tr>
                    <th>Item Name</th>
                    <th>Clean Value</th>
                    <th>Duped Value</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    // All items from your 12 files
    const data = {
        "Vehicles": [{"name":"Javelin","cash_value":49500000,"duped_value":49500000},{"name":"Torpedo","cash_value":49000000,"duped_value":43500000},{"name":"Beignet","cash_value":40000000,"duped_value":37000000},{"name":"Celsior","cash_value":30000000,"duped_value":28000000},{"name":"Proto-8","cash_value":30000000,"duped_value":30000000},{"name":"Power 1","cash_value":23000000,"duped_value":23000000},{"name":"Arachnid","cash_value":21000000,"duped_value":17500000},{"name":"Plaid","cash_value":18000000,"duped_value":18000000},{"name":"M12 Molten","cash_value":14000000,"duped_value":14000000},{"name":"Brulee","cash_value":10500000,"duped_value":9000000},{"name":"Beam Hybrid","cash_value":10000000,"duped_value":10000000},{"name":"Macaron","cash_value":10000000,"duped_value":10000000},{"name":"Parisian","cash_value":9500000,"duped_value":9500000},{"name":"Volt 4X4","cash_value":8500000,"duped_value":8500000},{"name":"Snake","cash_value":5500000,"duped_value":5500000},{"name":"Airtail","cash_value":3000000,"duped_value":3000000},{"name":"Agent","cash_value":2750000,"duped_value":2750000},{"name":"Bloxy","cash_value":2500000,"duped_value":2500000}],
        "Hyperchromes": [{"name":"HyperShift","cash_value":355000000,"duped_value":312000000},{"name":"HyperShift Level 4","cash_value":254000000,"duped_value":254000000},{"name":"HyperDiamond Level 5","cash_value":70000000,"duped_value":60000000},{"name":"HyperBlue Level 5","cash_value":61000000,"duped_value":50000000},{"name":"HyperPink Level 5","cash_value":58000000,"duped_value":51000000},{"name":"HyperBlue Level 4","cash_value":54000000,"duped_value":54000000},{"name":"HyperDiamond Level 4","cash_value":47000000,"duped_value":47000000}],
        "Textures": [{"name":"Checker","cash_value":41000000,"duped_value":38000000},{"name":"Drip","cash_value":20000000,"duped_value":20000000},{"name":"Snowstorm","cash_value":8000000,"duped_value":8000000},{"name":"Galactic Carbon","cash_value":4000000,"duped_value":4000000},{"name":"Earthquake","cash_value":3500000,"duped_value":3500000},{"name":"Fire","cash_value":3000000,"duped_value":3000000}],
        "Rims": [{"name":"Void","cash_value":46000000,"duped_value":41000000},{"name":"Laser Cannon","cash_value":28000000,"duped_value":28000000},{"name":"RTX","cash_value":18000000,"duped_value":18000000},{"name":"Spinner","cash_value":17000000,"duped_value":15000000},{"name":"Snow Face","cash_value":10000000,"duped_value":10000000}],
        "Spoilers": [{"name":"Thrusters","cash_value":40000000,"duped_value":37000000},{"name":"Snow Shovel","cash_value":12000000,"duped_value":12000000},{"name":"2 Billion","cash_value":8500000,"duped_value":8500000}],
        "Weapon skins": [{"name":"Drip","cash_value":15000000,"duped_value":15000000},{"name":"Snowstorm","cash_value":4000000,"duped_value":4000000}],
        "Drifts": [{"name":"Blue Fire","cash_value":23000000,"duped_value":23000000},{"name":"Gradient Pixel","cash_value":9000000,"duped_value":9000000}],
        "Furniture": [{"name":"Noob Scream","cash_value":14000000,"duped_value":14000000},{"name":"Sci-Fi Kitchen","cash_value":5000000,"duped_value":5000000}],
        "Tire sticker": [{"name":"Blue 50","cash_value":10000000,"duped_value":10000000},{"name":"Red 50","cash_value":3000000,"duped_value":3000000}],
        "Tire style": [{"name":"Spiked","cash_value":8000000,"duped_value":8000000}],
        "Body color": [{"name":"Vantablack","cash_value":30000000,"duped_value":30000000},{"name":"Gold","cash_value":1250000,"duped_value":1250000}],
        "Horn": [{"name":"Cucaracha","cash_value":1500000,"duped_value":1500000}]
    };

    let selectedCat = "All";
    const allItems = [];
    Object.keys(data).forEach(cat => {
        data[cat].forEach(item => {
            allItems.push({...item, category: cat});
        });

        // Add Tabs
        const tab = document.createElement('div');
        tab.className = 'tab';
        tab.innerText = cat;
        tab.onclick = () => filterCat(cat, tab);
        document.getElementById('tabContainer').appendChild(tab);
    });

    function formatNum(num) {
        if (!num) return "---";
        if (num >= 1000000) return (num / 1000000).toFixed(1).replace('.0', '') + "M";
        if (num >= 1000) return (num / 1000) + "K";
        return num;
    }

    function filterCat(cat, el) {
        selectedCat = cat;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');
        renderItems();
    }

    function renderItems() {
        const query = document.getElementById('searchBar').value.toLowerCase();
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        const filtered = allItems.filter(i => {
            const matchesCat = selectedCat === "All" || i.category === selectedCat;
            const matchesSearch = i.name.toLowerCase().includes(query);
            return matchesCat && matchesSearch;
        });

        filtered.sort((a,b) => (b.cash_value || 0) - (a.cash_value || 0)).forEach(i => {
            tbody.innerHTML += `
                <tr>
                    <td><b>${i.name}</b><br><small style="color:var(--text-dim)">${i.category}</small></td>
                    <td class="val-clean">${formatNum(i.cash_value)}</td>
                    <td class="val-duped">${formatNum(i.duped_value)}</td>
                </tr>
            `;
        });
    }

    renderItems();
</script>

</body>
</html>
