<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Item Values | Robbery Tracker</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #ffffff;
            --blue: #58a6ff;
        }
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            padding: 40px; 
            text-align: center;
        }
        .container {
            max-width: 600px;
            margin: 50px auto;
            background: var(--card-bg);
            padding: 40px;
            border: 1px solid var(--border);
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            color: var(--blue);
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            transition: 0.2s;
        }
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <h1 style="font-size: 32px; margin-bottom: 10px;">💎 Item Values</h1>
        <p style="color: #8b949e;">The marketplace guide is currently being updated.</p>
        <div style="font-size: 60px; margin: 30px 0;">🚧</div>
        <p>Checking database for latest trading prices...</p>
        <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> RETURN TO TRACKER</a>
    </div>
</body>
</html>
