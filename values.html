<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Item Values</title>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --border: #30363d; 
            --text-main: #c9d1d9; --text-dim: #8b949e; 
            --accent: #58a6ff; --green: #3fb950; --red: #f85149;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-top: 80px; }

        /* Navbar */
        .nav-top { position: fixed; top: 0; width: 100%; background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px 0; display: flex; justify-content: center; gap: 20px; z-index: 1000; }
        .nav-link { color: var(--text-main); text-decoration: none; font-weight: bold; padding: 8px 16px; border-radius: 6px; border: 1px solid transparent; transition: 0.2s; }
        .nav-link:hover { color: var(--accent); }
        .nav-active { color: var(--accent); border-color: var(--border); background: #21262d; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }
        
        /* Search and Filters */
        #searchInput { width: 100%; padding: 15px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 20px; box-sizing: border-box; font-size: 16px; }
        .filter-group { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .filter-btn { background: #21262d; border: 1px solid var(--border); color: var(--text-main); padding: 8px 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .filter-btn:hover { background: #30363d; }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* Cards */
        .value-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 15px; }
        .item-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; transition: transform 0.2s, border-color 0.2s; }
        .item-card:hover { transform: translateY(-3px); border-color: var(--accent); }
        .item-header { background: #1c2128; padding: 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); font-weight: bold; }
        .category-tag { font-size: 0.7rem; background: var(--accent); color: white; padding: 3px 8px; border-radius: 12px; }
        .item-body { padding: 15px; }
        
        /* Image Styling */
        .item-img { width: 100%; height: 160px; object-fit: contain; background: #000; border-radius: 8px; margin-bottom: 15px; display: block; border: 1px solid #000; }
        
        /* Pricing */
        .price-row { display: flex; justify-content: space-between; margin-bottom: 8px; align-items: center; }
        .price-label { color: var(--text-dim); font-size: 0.9rem; font-weight: bold; }
        .price-val { font-weight: bold; font-size: 1.05rem; color: var(--green); }
        .duped-val { color: var(--red); }
        
        /* Error Message */
        .error-msg { text-align: center; color: var(--red); font-size: 1.2rem; margin-top: 50px; background: #2d1114; padding: 20px; border-radius: 8px; border: 1px solid var(--red); }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-link">HOME</a>
        <a href="tracker.html" class="nav-link">ROBBERY TRACKER</a>
        <a href="values.html" class="nav-link nav-active">ITEM VALUES</a>
    </nav>

    <div class="container">
        <input type="text" id="searchInput" placeholder="Search for items..." oninput="render()">
        <div id="filterGroup" class="filter-group">
            <button class="filter-btn active" onclick="filterCat('All', this)">All</button>
        </div>
        <div id="valueGrid" class="value-grid">
            </div>
    </div>

    <script src="Values.js"></script>

    <script>
        let currentCat = 'All';

        function filterCat(cat, btn) {
            currentCat = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('valueGrid');
            
            // Safety Net 1: Check if Values.js actually loaded
            if (typeof db === 'undefined') {
                grid.innerHTML = `<div class="error-msg">
                    <strong>Error:</strong> Could not load data.<br>
                    Make sure your data file is named exactly <code>Values.js</code> on GitHub and contains the <code>db</code> variable.
                </div>`;
                return;
            }

            const query = document.getElementById('searchInput').value.toLowerCase();
            grid.innerHTML = '';

            Object.keys(db).forEach(category => {
                if (currentCat !== 'All' && currentCat !== category) return;

                db[category].forEach(item => {
                    if (!item.name.toLowerCase().includes(query)) return;

                    // Safety Net 2: Handle missing or null values gracefully
                    const cleanValue = item.cash_value ? `$${item.cash_value.toLocaleString()}` : "N/A";
                    const dupedValue = item.duped_value ? `$${item.duped_value.toLocaleString()}` : "N/A";
                    
                    // Safety Net 3: Fallback image logic
                    // If item.image doesn't exist, use placeholder.
                    // The onerror attribute ensures that if a file like 'javelin.png' is misspelled on GitHub, it switches to the placeholder instead of a broken ? mark.
                    const imagePath = item.image ? item.image : 'images/placeholder.png';

                    grid.innerHTML += `
                        <div class="item-card">
                            <div class="item-header">
                                <span>${item.name}</span>
                                <span class="category-tag">${category}</span>
                            </div>
                            <div class="item-body">
                                <img src="${imagePath}" 
                                     class="item-img" 
                                     alt="${item.name}"
                                     onerror="this.onerror=null; this.src='images/placeholder.png';">
                                
                                <div class="price-row">
                                    <span class="price-label">Clean Value</span>
                                    <span class="price-val">${cleanValue}</span>
                                </div>
                                <div class="price-row">
                                    <span class="price-label">Duped Value</span>
                                    <span class="price-val duped-val">${dupedValue}</span>
                                </div>
                            </div>
                        </div>`;
                });
            });
        }

        // Wait for the page to fully load before trying to build the buttons
        window.addEventListener('DOMContentLoaded', () => {
            const group = document.getElementById('filterGroup');
            
            if (typeof db !== 'undefined') {
                // Build category buttons automatically from the db variable
                Object.keys(db).forEach(cat => {
                    const btn = document.createElement('button');
                    btn.className = 'filter-btn';
                    btn.innerText = cat;
                    btn.onclick = (e) => filterCat(cat, e.target);
                    group.appendChild(btn);
                });
            }
            // Draw the grid
            render();
        });
    </script>
</body>
</html>
