<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value List</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.3);
            --green: #00ff88;
            --red: #ff3333;
            --orange: #ff9900;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }

        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }

        .header-content { max-width: 1200px; margin: 0 auto 40px; padding: 0 20px; }
        .header-content h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -1.5px; }
        
        .control-panel { 
            max-width: 1200px; margin: 0 auto 40px; padding: 30px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 24px;
        }

        .search-bar { 
            width: 100%; background: #000; border: 1px solid var(--border); 
            padding: 18px 25px; border-radius: 14px; color: #fff; font-size: 1rem; margin-bottom: 25px;
        }

        .filter-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .filter-pill { 
            padding: 10px 20px; border-radius: 12px; background: var(--card); 
            border: 1px solid var(--border); color: var(--text-dim); 
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .items-container { 
            max-width: 1200px; margin: 0 auto; padding: 0 20px 100px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px;
        }

        .item-card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .item-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .card-top { display: flex; gap: 15px; align-items: center; position: relative; }
        .item-img { width: 75px; height: 75px; background: #000; border-radius: 15px; object-fit: contain; border: 1px solid var(--border); }
        
        /* Trend Badge */
        .trend-badge {
            position: absolute; top: 0; right: 0;
            padding: 4px 8px; border-radius: 6px; font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
        }
        .trend-rising { background: rgba(0, 255, 136, 0.1); color: var(--green); border: 1px solid var(--green); }
        .trend-falling { background: rgba(255, 51, 51, 0.1); color: var(--red); border: 1px solid var(--red); }
        .trend-stable { background: rgba(148, 163, 184, 0.1); color: var(--text-dim); border: 1px solid var(--border); }

        .card-stats { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 14px;
        }
        .stat-label { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 4px; display: block;}
        .stat-value { font-family: 'JetBrains Mono'; font-size: 0.85rem; font-weight: 700; }

        .full-width-stat { grid-column: span 2; border-top: 1px solid var(--border); pt: 10px; margin-top: 5px; padding-top: 8px; }

        .card-action {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: #fff; text-decoration: none;
            text-align: center; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .card-action:hover { background: var(--accent); }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link" style="color: var(--text-dim); text-decoration: none; margin-right: 20px;">Home</a>
            <a href="values.html" class="nav-link" style="color: #fff; text-decoration: none;">Values</a>
        </div>
    </nav>

    <header class="header-content">
        <h1>Market Values</h1>
        <p>Tracking dupe-adjusted values and economy trends.</p>
    </header>

    <div class="header-content">
        <div class="control-panel">
            <input type="text" id="searchInput" class="search-bar" placeholder="Search items..." oninput="renderItems()">
            <div class="filter-group" id="filterGroup">
                <div class="filter-pill active" data-filter="all" onclick="setCategory('all', this)">All</div>
            </div>
        </div>

        <div id="itemsGrid" class="items-container"></div>
    </div>

    <script src="Values.js"></script>

    <script>
        let currentCategory = 'all';

        // Auto-generate filter buttons based on your Values.js keys
        function initFilters() {
            const group = document.getElementById('filterGroup');
            for (let cat in db) {
                const pill = document.createElement('div');
                pill.className = 'filter-pill';
                pill.innerText = cat;
                pill.onclick = (e) => setCategory(cat, pill);
                group.appendChild(pill);
            }
        }

        function setCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            renderItems();
        }

        function getTrendClass(trend) {
            if (!trend) return 'trend-stable';
            const t = trend.toLowerCase();
            if (t.includes('up') || t.includes('rising')) return 'trend-rising';
            if (t.includes('down') || t.includes('falling')) return 'trend-falling';
            return 'trend-stable';
        }

        function getTrendIcon(trend) {
            const t = getTrendClass(trend);
            if (t === 'trend-rising') return '▲';
            if (t === 'trend-falling') return '▼';
            return '•';
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            let html = '';

            for (let cat in db) {
                if (currentCategory !== 'all' && cat !== currentCategory) continue;

                db[cat].forEach(item => {
                    if (!item.name.toLowerCase().includes(search)) return;

                    const trendClass = getTrendClass(item.trend);
                    const trendIcon = getTrendIcon(item.trend);
                    const cleanValue = item.cash_value ? `$${item.cash_value.toLocaleString()}` : 'N/A';
                    const cleanDupe = item.duped_value ? `$${item.duped_value.toLocaleString()}` : 'Same';

                    html += `
                        <div class="item-card">
                            <div class="card-top">
                                <img src="${item.image || 'https://via.placeholder.com/80/000/333?text=?'}" class="item-img">
                                <div class="item-info">
                                    <span style="font-size: 0.6rem; color: var(--accent); font-weight: 800; text-transform: uppercase;">${cat}</span>
                                    <h3>${item.name}</h3>
                                </div>
                                <div class="trend-badge ${trendClass}">
                                    ${trendIcon} ${item.trend || 'Stable'}
                                </div>
                            </div>
                            <div class="card-stats">
                                <div class="stat-box">
                                    <span class="stat-label">Clean Value</span>
                                    <span class="stat-value" style="color: var(--green)">${cleanValue}</span>
                                </div>
                                <div class="stat-box">
                                    <span class="stat-label">Demand</span>
                                    <span class="stat-value">${item.demand || 'Normal'}</span>
                                </div>
                                <div class="stat-box full-width-stat">
                                    <span class="stat-label">Dupe-Adjusted Value</span>
                                    <span class="stat-value" style="color: var(--orange)">${cleanDupe}</span>
                                </div>
                            </div>
                            <a href="calculator.html" class="card-action">Add to Calculator</a>
                        </div>
                    `;
                });
            }
            grid.innerHTML = html;
        }

        window.onload = () => {
            initFilters();
            renderItems();
        };
    </script>
</body>
</html>
