<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value List</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --green: #00ff88;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 90px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }

        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-item { position: relative; height: 70px; display: flex; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .nav-link:hover, .nav-item:hover .nav-link { color: #fff; }

        .dropdown {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; min-width: 200px; padding: 10px;
            opacity: 0; pointer-events: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        .drop-link { display: block; padding: 12px; color: var(--text-dim); text-decoration: none; font-size: 0.75rem; border-radius: 8px; font-weight: 600; }
        .drop-link:hover { background: var(--card); color: var(--accent); }

        /* --- CONTENT --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        
        .search-section {
            background: var(--surface); border: 1px solid var(--border);
            padding: 30px; border-radius: 24px; margin-bottom: 30px;
        }

        .search-bar {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 18px; border-radius: 12px; color: #fff; font-size: 1.1rem;
            outline: none; margin-bottom: 20px;
        }

        .filter-row { display: flex; flex-wrap: wrap; gap: 10px; }
        .f-btn {
            padding: 8px 16px; border-radius: 8px; background: var(--card);
            border: 1px solid var(--border); color: var(--text-dim);
            font-size: 0.7rem; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }
        .f-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        .items-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px; padding-bottom: 80px;
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }

        .card-top { display: flex; align-items: center; gap: 15px; }
        .img-box { width: 60px; height: 60px; background: #000; border-radius: 12px; border: 1px solid var(--border); }
        
        .val-row {
            display: flex; justify-content: space-between; 
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px;
        }
        .v-label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; }
        .v-amt { font-family: 'JetBrains Mono'; font-weight: 700; color: var(--green); }

        footer { padding: 40px; border-top: 1px solid var(--border); text-align: center; color: var(--text-dim); }
        .disclaimer { font-size: 0.7rem; color: #444; margin-bottom: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="pity.html" class="nav-link">Pity Calc</a>
            <div class="nav-item">
                <a class="nav-link" style="color: #fff;">Values ▼</a>
                <div class="dropdown">
                    <a href="values.html" class="drop-link">Value List</a>
                    <a href="calculator.html" class="drop-link">Value Calculator</a>
                </div>
            </div>
            <a href="tracker.html" class="nav-link">Robbery Tracker</a>
        </div>
        <div style="width: 40px;"></div>
    </nav>

    <div class="container">
        <h1>Market Database</h1>
        <div class="search-section">
            <input type="text" id="search" class="search-bar" placeholder="Search for items or cars..." oninput="render()">
            <div class="filter-row" id="filters">
                <div class="f-btn active" onclick="setCat('all', this)">All Items</div>
            </div>
        </div>
        <div class="items-grid" id="grid"></div>
    </div>

    <footer>
        <div class="disclaimer">Values are estimates. We are not responsible for any trade losses.</div>
        &copy; 2026 Jailbreak Hub.
    </footer>

    <script src="Values.js"></script>
    <script>
        let currentCategory = 'all';

        function init() {
            if (typeof db === 'undefined') {
                document.getElementById('grid').innerHTML = "<p style='color:red'>Error: Values.js not found or 'db' variable is missing.</p>";
                return;
            }
            const fContainer = document.getElementById('filters');
            for (let category in db) {
                const btn = document.createElement('div');
                btn.className = 'f-btn';
                btn.innerText = category;
                btn.onclick = () => setCat(category, btn);
                fContainer.appendChild(btn);
            }
            render();
        }

        function setCat(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            render();
        }

        function render() {
            const grid = document.getElementById('grid');
            const query = document.getElementById('search').value.toLowerCase();
            let allItems = [];

            for (let category in db) {
                if (currentCategory !== 'all' && category !== currentCategory) continue;
                db[category].forEach(item => {
                    if (item.name.toLowerCase().includes(query)) {
                        allItems.push({...item, cat: category});
                    }
                });
            }

            // Sort High to Low
            allItems.sort((a, b) => (b.cash_value || 0) - (a.cash_value || 0));

            grid.innerHTML = allItems.map(i => `
                <div class="item-card">
                    <div class="card-top">
                        <img src="${i.image}" class="img-box" onerror="this.src='https://via.placeholder.com/60/000/333?text=?'">
                        <div>
                            <span style="font-size:0.5rem; color:var(--accent); font-weight:800; text-transform:uppercase;">${i.cat}</span>
                            <h3 style="margin:0; font-size:1rem;">${i.name}</h3>
                        </div>
                    </div>
                    <div class="val-row">
                        <span class="v-label">Value</span>
                        <span class="v-amt">$${(i.cash_value || 0).toLocaleString()}</span>
                    </div>
                </div>
            `).join('');
        }

        window.onload = init;
    </script>
</body>
</html>
