<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value List</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.3);
            --green: #00ff88;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }

        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 30px; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link:hover, .nav-link.active { color: #fff; }

        /* --- PAGE HEADER --- */
        .header-content { max-width: 1200px; margin: 0 auto 40px; padding: 0 20px; }
        .header-content h1 { font-size: 2.8rem; font-weight: 800; margin-bottom: 10px; letter-spacing: -1.5px; }
        .header-content p { color: var(--text-dim); font-size: 1.1rem; }

        /* --- FILTER & SEARCH SECTION --- */
        .control-panel { 
            max-width: 1200px; margin: 0 auto 40px; padding: 30px; 
            background: var(--surface); border: 1px solid var(--border); 
            border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .search-wrapper { position: relative; margin-bottom: 25px; }
        .search-bar { 
            width: 100%; background: #000; border: 1px solid var(--border); 
            padding: 18px 25px; border-radius: 14px; color: #fff; 
            font-size: 1rem; font-family: inherit;
        }
        .search-bar:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        .filter-group { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .filter-pill { 
            padding: 10px 20px; border-radius: 12px; background: var(--card); 
            border: 1px solid var(--border); color: var(--text-dim); 
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; 
            cursor: pointer; user-select: none;
        }
        .filter-pill:hover { border-color: var(--text-dim); color: #fff; }
        .filter-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; box-shadow: 0 5px 15px var(--accent-glow); }

        /* --- GRID LAYOUT --- */
        .items-container { 
            max-width: 1200px; margin: 0 auto; padding: 0 20px 100px;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px;
        }

        .item-card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 15px;
            position: relative; overflow: hidden;
        }
        .item-card:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }

        .card-top { display: flex; gap: 15px; align-items: center; }
        .item-img { width: 75px; height: 75px; background: #000; border-radius: 15px; object-fit: contain; border: 1px solid var(--border); }
        
        .item-info h3 { margin: 0; font-size: 1.1rem; font-weight: 700; color: #fff; }
        .item-category { font-size: 0.65rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; }

        .card-stats { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 14px;
        }
        .stat-box span { display: block; }
        .stat-label { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; margin-bottom: 4px; }
        .stat-value { font-family: 'JetBrains Mono'; font-size: 0.95rem; font-weight: 700; }
        .price-green { color: var(--green); }

        .card-action {
            width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border);
            background: rgba(255,255,255,0.03); color: #fff; text-decoration: none;
            text-align: center; font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }
        .card-action:hover { background: var(--accent); border-color: var(--accent); }

        /* --- RESPONSIVE --- */
        @media (max-width: 768px) {
            .nav-top { padding: 0 20px; }
            .nav-links { display: none; }
            .header-content h1 { font-size: 2rem; }
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="values.html" class="nav-link active">Values</a>
            <a href="calculator.html" class="nav-link">Calculator</a>
        </div>
        <div style="width: 40px;"></div>
    </nav>

    <header class="header-content">
        <h1>Market Values</h1>
        <p>Real-time trading values for all Jailbreak items, vehicles, and cosmetics.</p>
    </header>

    <div class="header-content">
        <div class="control-panel">
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-bar" placeholder="Search for items (e.g. Javelin, Torpedo, HyperShift)..." oninput="renderItems()">
            </div>
            
            <div class="filter-group">
                <div class="filter-pill active" data-filter="all" onclick="setCategory('all', this)">All Items</div>
                <div class="filter-pill" data-filter="Vehicles" onclick="setCategory('Vehicles', this)">Vehicles</div>
                <div class="filter-pill" data-filter="Rims" onclick="setCategory('Rims', this)">Rims</div>
                <div class="filter-pill" data-filter="Hyperchromes" onclick="setCategory('Hyperchromes', this)">Hyperchromes</div>
                <div class="filter-pill" data-filter="Skins" onclick="setCategory('Skins', this)">Skins</div>
                <div class="filter-pill" data-filter="Furniture" onclick="setCategory('Furniture', this)">Furniture</div>
                
                <div style="flex: 1;"></div> <div class="filter-pill active" id="sort-desc" onclick="setSort('desc')">High Value</div>
                <div class="filter-pill" id="sort-asc" onclick="setSort('asc')">Low Value</div>
            </div>
        </div>

        <div id="itemsGrid" class="items-container">
            </div>
    </div>

    <script src="Values.js"></script>

    <script>
        let currentCategory = 'all';
        let currentSort = 'desc';

        function setCategory(cat, el) {
            currentCategory = cat;
            document.querySelectorAll('.filter-pill[data-filter]').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            renderItems();
        }

        function setSort(dir) {
            currentSort = dir;
            document.getElementById('sort-desc').classList.toggle('active', dir === 'desc');
            document.getElementById('sort-asc').classList.toggle('active', dir === 'asc');
            renderItems();
        }

        function renderItems() {
            const grid = document.getElementById('itemsGrid');
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            let allItems = [];

            // 1. Flatten the DB into a single list
            for (let category in db) {
                if (currentCategory === 'all' || category === currentCategory) {
                    db[category].forEach(item => {
                        allItems.push({ ...item, category: category });
                    });
                }
            }

            // 2. Filter by search
            let filtered = allItems.filter(i => i.name.toLowerCase().includes(searchTerm));

            // 3. Sort by value
            filtered.sort((a, b) => {
                const valA = a.cash_value || 0;
                const valB = b.cash_value || 0;
                return currentSort === 'desc' ? valB - valA : valA - valB;
            });

            // 4. Generate HTML
            grid.innerHTML = filtered.map(item => `
                <div class="item-card">
                    <div class="card-top">
                        <img src="${item.image || 'https://via.placeholder.com/80/000/333?text=?'}" class="item-img" alt="${item.name}">
                        <div class="item-info">
                            <span class="item-category">${item.category}</span>
                            <h3>${item.name}</h3>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="stat-box">
                            <span class="stat-label">Market Value</span>
                            <span class="stat-value price-green">$${(item.cash_value || 0).toLocaleString()}</span>
                        </div>
                        <div class="stat-box">
                            <span class="stat-label">Demand</span>
                            <span class="stat-value">${item.demand || 'Stable'}</span>
                        </div>
                    </div>
                    <a href="calculator.html" class="card-action">Use in Calculator</a>
                </div>
            `).join('');
        }

        // Initialize on load
        window.onload = renderItems;
    </script>
</body>
</html>
