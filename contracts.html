<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.12);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }
        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 25px; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; }

        /* --- MAIN UI --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        .result-panel {
            background: var(--surface); border: 2px solid var(--border);
            border-radius: 24px; padding: 25px; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 85px; z-index: 4000;
        }
        .status-big { font-weight: 900; font-size: 2rem; text-transform: uppercase; font-style: italic; }

        .item-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; margin-bottom: 50px;
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; position: relative; overflow: hidden;
        }
        .img-container { width: 100%; height: 220px; background: #000; display: flex; align-items: center; justify-content: center; }
        .img-container img { width: 85%; height: 85%; object-fit: contain; }
        .card-details { padding: 20px; }
        .card-name { font-size: 1.3rem; font-weight: 800; margin-bottom: 5px; }
        .val-num { font-family: 'JetBrains Mono'; color: var(--green); font-weight: 800; font-size: 1.2rem; }

        .remove-btn {
            position: absolute; top: 12px; right: 12px; background: var(--red); color: white;
            border: none; width: 40px; height: 40px; border-radius: 10px; cursor: pointer; font-weight: 900; font-size: 1.2rem; z-index: 10;
        }

        .add-box {
            border: 3px dashed var(--border); border-radius: 24px; height: 350px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-dim); font-weight: 800; gap: 10px; font-size: 1.2rem;
        }
        .add-box:hover { border-color: var(--accent); color: white; background: rgba(0, 112, 243, 0.05); }

        /* --- MEGA PICKER OVERLAY --- */
        #pickerOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: none; flex-direction: column; padding: 40px;
        }

        .picker-header { display: flex; flex-direction: column; gap: 20px; margin-bottom: 30px; }
        .search-giant { 
            flex-grow: 1; background: var(--surface); border: 3px solid var(--border); 
            border-radius: 20px; padding: 25px; color: white; font-size: 1.8rem; font-weight: 700;
        }
        .search-giant:focus { border-color: var(--accent); outline: none; }

        .filter-bar { display: flex; gap: 15px; align-items: center; flex-wrap: wrap; }
        .mega-select { 
            background: var(--card); color: white; border: 2px solid var(--border); 
            padding: 15px 25px; border-radius: 12px; font-weight: 800; font-size: 1rem; cursor: pointer;
        }

        .picker-results {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); /* MASSIVE CARDS */
            gap: 30px; overflow-y: auto; padding-bottom: 100px;
        }

        .mega-picker-card {
            background: var(--card); border: 2px solid var(--border); border-radius: 25px;
            padding: 25px; text-align: center; cursor: pointer; transition: transform 0.1s;
        }
        .mega-picker-card:hover { border-color: var(--accent); background: var(--surface); transform: scale(1.02); }
        .mega-picker-card img { width: 180px; height: 180px; object-fit: contain; margin-bottom: 20px; }
        .mega-picker-card .p-name { font-size: 1.5rem; font-weight: 900; margin-bottom: 8px; }
        .mega-picker-card .p-val { font-family: 'JetBrains Mono'; color: var(--green); font-size: 1.3rem; font-weight: 800; }
        .mega-picker-card .p-cat { color: var(--accent); font-size: 0.8rem; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; }

        .close-btn {
            background: var(--red); color: white; border: none; padding: 0 40px; 
            border-radius: 20px; font-weight: 900; font-size: 1.5rem; cursor: pointer;
        }

    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="values.html" class="nav-link">Values</a>
            <a href="calculator.html" class="nav-link" style="color:white">Calculator</a>
        </div>
    </nav>

    <div class="container">
        <div class="result-panel">
            <div>
                <div class="status-big" id="status">EQUAL</div>
                <div id="difference" style="color:var(--text-dim); font-weight:700; font-size: 1.1rem;">Difference: $0</div>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="mega-select" onclick="swapSides()">Swap</button>
                <button class="mega-select" style="color:var(--red)" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <h2 style="font-style:italic; font-weight:900; border-bottom: 2px solid var(--border); padding-bottom:10px;">YOUR SIDE <span id="valA" style="float:right; color:var(--green); font-family:'JetBrains Mono';">$0</span></h2>
        <div class="item-grid" id="gridA">
            <div class="add-box" onclick="openPicker('A')"><h1>+</h1>ADD ITEM</div>
        </div>

        <h2 style="font-style:italic; font-weight:900; border-bottom: 2px solid var(--border); padding-bottom:10px;">THEIR SIDE <span id="valB" style="float:right; color:var(--green); font-family:'JetBrains Mono';">$0</span></h2>
        <div class="item-grid" id="gridB">
            <div class="add-box" onclick="openPicker('B')"><h1>+</h1>ADD ITEM</div>
        </div>
    </div>

    <div id="pickerOverlay">
        <div class="picker-header">
            <div style="display:flex; gap:20px;">
                <input type="text" id="pSearch" class="search-giant" placeholder="Type to search all items..." oninput="renderPicker()">
                <button class="close-btn" onclick="closePicker()">CLOSE</button>
            </div>
            <div class="filter-bar">
                <select id="sortType" class="mega-select" onchange="renderPicker()">
                    <option value="val_desc">Value: High to Low</option>
                    <option value="val_asc">Value: Low to High</option>
                    <option value="alpha_asc">Name: A-Z</option>
                </select>
                <select id="catFilter" class="mega-select" onchange="renderPicker()">
                    <option value="All">All Categories</option>
                </select>
            </div>
        </div>
        <div class="picker-results" id="pResults"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let sideA = [];
        let sideB = [];
        let activeSide = 'A';

        function init() {
            const catMenu = document.getElementById('catFilter');
            for(let cat in db) {
                const opt = document.createElement('option');
                opt.value = cat; opt.innerText = cat;
                catMenu.appendChild(opt);
            }
        }
        init();

        function openPicker(side) {
            activeSide = side;
            document.getElementById('pickerOverlay').style.display = 'flex';
            renderPicker();
        }

        function closePicker() { document.getElementById('pickerOverlay').style.display = 'none'; }

        function renderPicker() {
            const query = document.getElementById('pSearch').value.toLowerCase();
            const sort = document.getElementById('sortType').value;
            const catF = document.getElementById('catFilter').value;
            const res = document.getElementById('pResults');
            res.innerHTML = '';

            let list = [];
            for(let cat in db) {
                db[cat].forEach(item => {
                    if(catF === 'All' || cat === catF) list.push({...item, cat});
                });
            }

            if(sort === 'val_desc') list.sort((a,b) => b.cash_value - a.cash_value);
            else if(sort === 'val_asc') list.sort((a,b) => a.cash_value - b.cash_value);
            else list.sort((a,b) => a.name.localeCompare(b.name));

            list.filter(i => i.name.toLowerCase().includes(query)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'mega-picker-card';
                div.innerHTML = `
                    <div class="p-cat">${item.cat}</div>
                    <img src="${item.image}">
                    <div class="p-name">${item.name}</div>
                    <div class="p-val">$${item.cash_value.toLocaleString()}</div>
                `;
                div.onclick = () => {
                    if (activeSide === 'A') sideA.push(item);
                    else sideB.push(item);
                    closePicker();
                    updateUI();
                };
                res.appendChild(div);
            });
        }

        function removeItem(side, index) {
            if (side === 'A') sideA.splice(index, 1);
            else sideB.splice(index, 1);
            updateUI();
        }

        function clearAll() { sideA = []; sideB = []; updateUI(); }
        function swapSides() { [sideA, sideB] = [sideB, sideA]; updateUI(); }

        function updateUI() {
            const draw = (items, gridId, side) => {
                const grid = document.getElementById(gridId);
                let html = items.map((item, i) => `
                    <div class="item-card">
                        <button class="remove-btn" onclick="removeItem('${side}', ${i})">×</button>
                        <div class="img-container"><img src="${item.image}"></div>
                        <div class="card-details">
                            <div class="card-name">${item.name}</div>
                            <div class="val-num">$${item.cash_value.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
                html += `<div class="add-box" onclick="openPicker('${side}')"><h1>+</h1>ADD ITEM</div>`;
                grid.innerHTML = html;
            };

            draw(sideA, 'gridA', 'A');
            draw(sideB, 'gridB', 'B');

            const totalA = sideA.reduce((s, i) => s + i.cash_value, 0);
            const totalB = sideB.reduce((s, i) => s + i.cash_value, 0);
            document.getElementById('valA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('valB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalA - totalB;
            const status = document.getElementById('status');
            document.getElementById('difference').innerText = `Difference: $${Math.abs(diff).toLocaleString()}`;

            if (totalA === 0 && totalB === 0) { status.innerText = "EQUAL"; status.style.color = "white"; }
            else if (Math.abs(diff) < (Math.max(totalA, totalB) * 0.12)) { status.innerText = "FAIR TRADE"; status.style.color = "var(--green)"; }
            else { status.innerText = diff > 0 ? "A OVERPAYING" : "B OVERPAYING"; status.style.color = "var(--red)"; }
        }
    </script>
</body>
</html>
