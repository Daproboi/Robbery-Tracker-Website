<div class="bg-[#030508] min-h-screen text-white p-8 font-sans">
    
    <div class="max-w-6xl mx-auto mb-12 flex justify-between items-end">
        <div>
            <h1 class="text-4xl font-extrabold tracking-tight mb-2 uppercase">
                Weekly <span class="text-[#0070f3]">Contracts</span>
            </h1>
            <p id="status-text" class="text-gray-400">Syncing with Jailbreak servers...</p>
        </div>
        <div id="last-updated" class="text-xs font-mono text-gray-600 uppercase"></div>
    </div>

    <div id="contracts-container" class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        <div class="animate-pulse bg-white/5 h-64 rounded-2xl"></div>
        <div class="animate-pulse bg-white/5 h-64 rounded-2xl"></div>
        <div class="animate-pulse bg-white/5 h-64 rounded-2xl"></div>
    </div>
</div>

<script>
    async function fetchContracts() {
        const container = document.getElementById('contracts-container');
        const statusText = document.getElementById('status-text');
        const updateTime = document.getElementById('last-updated');

        try {
            // Using a proxy/api to get the data from the changelogs source
            // Note: In a real production environment, you'd use your own backend or the JBCL API endpoint
            const response = await fetch('https://api.jailbreakchangelogs.xyz/v1/contracts'); 
            const data = await response.json();

            // Clear the skeletons
            container.innerHTML = '';
            statusText.innerText = "Current Season: " + (data.seasonName || "Live");
            updateTime.innerText = "Data Freshness: Secure";

            data.contracts.forEach(contract => {
                const card = document.createElement('div');
                card.className = "bg-[#0a0c10] border border-white/5 rounded-2xl p-6 hover:border-[#00ff88]/50 transition-all duration-300 group";
                
                // Determine color based on team
                const teamColor = contract.team === 'Police' ? '#0070f3' : '#ff3e3e';
                const teamBg = contract.team === 'Police' ? 'rgba(0,112,243,0.1)' : 'rgba(255,62,62,0.1)';

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs font-bold px-3 py-1 rounded-full uppercase tracking-widest" 
                              style="background: ${teamBg}; color: ${teamColor}">
                            ${contract.team}
                        </span>
                        <span class="text-[#00ff88] font-mono font-bold">+${contract.xp} XP</span>
                    </div>
                    
                    <h3 class="text-xl font-bold mb-2 group-hover:text-[#00ff88] transition-colors">${contract.title}</h3>
                    <p class="text-gray-400 text-sm mb-6">${contract.description}</p>
                    
                    <div class="space-y-2">
                        <div class="flex justify-between text-xs font-bold uppercase tracking-tighter">
                            <span class="text-gray-500">Requirement</span>
                            <span>0 / ${contract.requirement}</span>
                        </div>
                        <div class="w-full bg-white/5 h-1.5 rounded-full overflow-hidden">
                            <div class="bg-[#00ff88] h-full w-0 group-hover:w-full transition-all duration-700 shadow-[0_0_10px_#00ff88]"></div>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });

        } catch (error) {
            console.error("Failed to load contracts:", error);
            statusText.innerHTML = "<span class='text-red-500'>Connection Interrupted.</span> Retrying...";
            // Fallback to local data if API fails
        }
    }

    // Run on load
    fetchContracts();
</script>
