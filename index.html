<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robbery Tracker | Multi-Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --green: #238636;
            --orange: #d29922;
            --red: #f85149;
            --blue: #58a6ff;
        }

        /* This part fixes the white background */
        html, body { 
            background-color: var(--bg-dark) !important; 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            padding: 20px;
            margin: 0;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        h1 { margin: 0; font-size: 24px; color: var(--text-main); }

        .filter-bar { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }

        .filter-btn { 
            background: #1c1f26; 
            border: 1px solid var(--border); 
            color: var(--text-main); 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
            transition: 0.2s;
            text-decoration: none;
        }
        
        .filter-btn:hover { background: #30363d; border-color: #8b949e; }
        .filter-btn.active { border-color: var(--green); background: #23863622; }
        
        .values-btn {
            border-color: var(--blue);
            color: var(--blue);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }
        
        .card { 
            background: var(--card-bg); 
            border-radius: 10px; 
            padding: 20px; 
            border: 1px solid var(--border); 
            position: relative;
        }

        .card h3 { margin: 0 0 15px 0; font-size: 18px; display: flex; justify-content: space-between; align-items: center; }
        .status { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .open { background: var(--green); color: white; }
        .robbing { background: var(--orange); color: black; }
        .in-progress { background: var(--blue); color: white; }
        .double-bank { background: var(--red); color: white; }

        .join-btn { 
            width: 100%; background: var(--green); color: white; border: none; 
            padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; 
            font-size: 14px; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        
        .stats-row { 
            display: flex; justify-content: space-between; color: var(--text-dim); 
            font-size: 13px; margin-top: 15px; padding-top: 10px; border-top: 1px solid var(--border);
        }
        
        .time-ago { color: var(--text-dim); font-size: 11px; margin-bottom: 8px; display: block; }
    </style>
</head>
<body>

    <div class="header-container">
        <h1>🚨 Live Robbery Snipers</h1>
        <a href="values.html" class="filter-btn values-btn">
            <i class="fas fa-gem"></i> Values
        </a>
    </div>

    <div class="filter-bar" id="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('Jewelry', this)">Jewelry</button>
        <button class="filter-btn" onclick="setFilter('Bank', this)">Bank</button>
        <button class="filter-btn" onclick="setFilter('Museum', this)">Museum</button>
        <button class="filter-btn" onclick="setFilter('Casino', this)">Casino</button>
        <button class="filter-btn" onclick="setFilter('Mansion', this)">Mansion</button>
        <button class="filter-btn" onclick="setFilter('Airdrop', this)">Airdrops</button>
    </div> 
    
    <div class="container" id="card-container"></div>

    <script>
        const FIREBASE_URL = "https://robbery-tracker-d43c5-default-rtdb.firebaseio.com/robberies.json";
        let currentFilter = 'all';

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchRobberies();
        }

        function getTimeAgo(timestamp) {
            const seconds = Math.floor(Date.now() / 1000) - timestamp;
            if (seconds < 60) return "Just now";
            return Math.floor(seconds / 60) + "m ago";
        }

        async function fetchRobberies() {
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                const container = document.getElementById('card-container');
                
                if (!data) {
                    container.innerHTML = "<p style='color: #8b949e;'>Waiting for bots...</p>";
                    return;
                }

                const now = Math.floor(Date.now() / 1000);
                let robberies = [];

                Object.keys(data).forEach(key => {
                    const rob = data[key];
                    if (rob && rob.lastUpdated && (now - rob.lastUpdated) < 300) {
                        robberies.push({
                            ...rob,
                            jobId: rob.jobId || key.split('_')[0]
                        });
                    }
                });

                if (currentFilter !== 'all') {
                    robberies = robberies.filter(r => r.name.toLowerCase().includes(currentFilter.toLowerCase()));
                }

                robberies.sort((a, b) => b.lastUpdated - a.lastUpdated);
                
                container.innerHTML = ""; 
                robberies.forEach(rob => {
                    let statusClass = rob.status === "Open" ? "open" : "robbing";
                    let statusText = rob.status === "Open" ? "Open" : "IN ROBBERY";
                    
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <span class="time-ago">🕒 Updated ` + getTimeAgo(rob.lastUpdated) + `</span>
                        <h3>` + rob.name + ` <span class="status ` + statusClass + `">` + statusText + `</span></h3>
                        <button class="join-btn" onclick="joinServer('` + rob.jobId + `')">JOIN GAME</button>
                        <div class="stats-row"><span>Players:</span><span><b>` + (rob.players || "?") + ` / 30</b></span></div>
                    `;
                    container.appendChild(card);
                });
            } catch (error) { console.error("Error:", error); }
        }

        function joinServer(jobId) {
            window.location.href = "roblox://experiences/start?placeId=606849621&gameInstanceId=" + jobId;
        }

        setInterval(fetchRobberies, 3000);
        fetchRobberies();
    </script>
</body>
</html>
