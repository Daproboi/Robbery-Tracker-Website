    <script>
        // --- GAME LAUNCHER ---
        function launchGame() {
            const urlParams = new URLSearchParams(window.location.search);
            const jobId = urlParams.get('jobid');
            const placeId = "606849621";
            
            if (jobId) {
                window.location.href = `roblox://experiences/start?placeId=${placeId}&gameInstanceId=${jobId}`;
            } else {
                window.location.href = `roblox://experiences/start?placeId=${placeId}`;
            }
        }

        // --- THEME ENGINE ---
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.addEventListener('click', () => {
            document.body.classList.toggle('light-mode');
            const icon = themeBtn.querySelector('i');
            if (document.body.classList.contains('light-mode')) {
                icon.classList.replace('fa-moon', 'fa-sun');
            } else {
                icon.classList.replace('fa-sun', 'fa-moon');
            }
        });

        // --- MATRIX RAIN CANVAS ---
        const canvas = document.getElementById('cashCanvas');
        const ctx = canvas.getContext('2d');
        let width, height, columns, drops;
        const fontSize = 16;
        const cashChars = "$£€¥01";

        function initCanvas() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            columns = Math.floor(width / fontSize);
            drops = Array(columns).fill(1);
        }
            function drawMatrix() {
            ctx.fillStyle = document.body.classList.contains('light-mode') ? 'rgba(248,250,252,0.1)' : 'rgba(3,4,7,0.1)';
            ctx.fillRect(0, 0, width, height);
            ctx.font = fontSize + 'px monospace';

            for (let i = 0; i < drops.length; i++) {
                const text = cashChars[Math.floor(Math.random() * cashChars.length)];
                
                // Variating Green Tones
                ctx.fillStyle = i % 2 === 0 ? '#00ff88' : '#0070f3';
                ctx.globalAlpha = Math.random() * 0.5 + 0.5;
                
                ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                if (drops[i] * fontSize > height && Math.random() > 0.98) {
                    drops[i] = 0;
                }
                drops[i]++;
            }
        }

        initCanvas();
        window.addEventListener('resize', initCanvas);
        setInterval(drawMatrix, 60);

        // --- 3D PARALLAX EFFECT ON CARDS ---
        document.querySelectorAll('.bento-card').forEach(card => {
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                const xc = rect.width / 2;
                const yc = rect.height / 2;
                const dx = x - xc;
                const dy = y - yc;
                card.style.transform = `perspective(1000px) rotateY(${dx / 20}deg) rotateX(${-dy / 20}deg) translateY(-5px)`;
            });
            card.addEventListener('mouseleave', () => {
                card.style.transform = 'perspective(1000px) rotateY(0deg) rotateX(0deg) translateY(0px)';
            });
        });

        // --- SCROLL REVEAL SYSTEM ---
        const revealObserver = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('active');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

        // --- STATS COUNTER ANIMATION ---
        function animateCounter(id, target) {
            let current = 0;
            const el = document.getElementById(id);
            if(!el) return;
            const duration = 2000;
            const stepTime = 20;
            const steps = duration / stepTime;
            const increment = target / steps;

            const interval = setInterval(() => {
                current += increment;
                if (current >= target) {
                    el.innerText = target.toLocaleString();
                    clearInterval(interval);
                } else {
                    el.innerText = Math.floor(current).toLocaleString();
                }
            }, stepTime);
        }
        
        window.onload = () => {
            animateCounter('userCount', 1402);
        };
    </script>
