<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Home</title>
    <style>
        :root {
            --bg: #0d1117;
            --panel: #161b22;
            --border: #30363d;
            --text-main: #c9d1d9;
            --text-dim: #8b949e;
            --accent: #58a6ff;
            --green: #3fb950;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* --- Updated Navbar & Dropdown --- */
        .nav-top { 
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--panel); border-bottom: 1px solid var(--border); 
            display: flex; justify-content: center; gap: 10px; z-index: 1000; 
            align-items: center;
        }

        .nav-item { position: relative; height: 100%; display: flex; align-items: center; }

        .nav-link { 
            color: var(--text-dim); text-decoration: none; font-weight: 600; 
            padding: 8px 16px; border-radius: 8px; transition: 0.2s; font-size: 0.9rem; 
            display: flex; align-items: center; gap: 6px;
        }

        .nav-link:hover, .nav-item:hover .nav-link { color: var(--text-main); background: #21262d; }
        .nav-active { color: var(--accent) !important; background: #21262d; border: 1px solid var(--border); }

        .dropdown-content {
            display: none; position: absolute; top: 55px; left: 0;
            background: var(--panel); min-width: 180px;
            border: 1px solid var(--border); border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1100;
            overflow: hidden;
        }

        .dropdown-content a {
            color: var(--text-dim); padding: 12px 16px; text-decoration: none;
            display: block; font-size: 0.85rem; font-weight: 600; transition: 0.2s;
        }

        .dropdown-content a:hover { background: #21262d; color: var(--accent); }
        .nav-item:hover .dropdown-content { display: block; }
        /* ------------------------ */

        /* Hero Section */
        .hero {
            text-align: center;
            max-width: 800px;
            padding: 20px;
        }

        .hero h1 {
            font-size: 3.5rem;
            margin: 0;
            background: linear-gradient(to right, #58a6ff, #3fb950);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 800;
        }

        .hero p {
            font-size: 1.25rem;
            color: var(--text-dim);
            margin: 20px 0 40px 0;
        }

        /* Main Action Buttons */
        .btn-container {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .main-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 220px;
            padding: 30px 20px;
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
        }

        .main-btn:hover {
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .btn-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .btn-title {
            font-size: 1.2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .btn-desc {
            font-size: 0.85rem;
            color: var(--text-dim);
            text-align: center;
        }

        .tracker-btn { border-left: 4px solid var(--green); }
        .values-btn { border-left: 4px solid var(--accent); }

    </style>
</head>
<body>

    <nav class="nav-top">
        <div class="nav-item">
            <a href="index.html" class="nav-link nav-active">HOME</a>
        </div>
        <div class="nav-item">
            <a href="tracker.html" class="nav-link">ROBBERY TRACKER</a>
        </div>
        
        <div class="nav-item">
            <a href="values.html" class="nav-link">
                VALUES 
                <svg width="10" height="10" viewBox="0 0 10 10" fill="none"><path d="M2 4L5 7L8 4" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </a>
            <div class="dropdown-content">
                <a href="values.html">ITEM VALUES</a>
                <a href="calculator.html">VALUE CALCULATOR</a>
            </div>
        </div>
    </nav>

    <div class="hero">
        <h1>Jailbreak Hub</h1>
        <p>Your all-in-one suite for live tracking and market values.</p>

        <div class="btn-container">
            <a href="tracker.html" class="main-btn tracker-btn">
                <span class="btn-icon">🕵️‍♂️</span>
                <span class="btn-title">Robbery Tracker</span>
                <span class="btn-desc">Check live server statuses for open robberies.</span>
            </a>

            <a href="values.html" class="main-btn values-btn">
                <span class="btn-icon">💎</span>
                <span class="btn-title">Item Values</span>
                <span class="btn-desc">Browse current trade values for all items.</span>
            </a>
        </div>
    </div>

</body>
</html>
