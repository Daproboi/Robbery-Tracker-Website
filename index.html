<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Robbery Tracker | Multi-Server</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0b0e14;
            --card-bg: #161b22;
            --border: #30363d;
            --text-main: #ffffff;
            --text-dim: #8b949e;
            --green: #238636;
            --orange: #d29922;
            --red: #f85149;
            --blue: #58a6ff;
        }

        /* Forced Dark Mode */
        html, body { 
            background-color: #0b0e14 !important; 
            color: #ffffff !important; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; 
            padding: 20px;
            margin: 0;
            min-height: 100vh;
        }

        .header-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #30363d;
            padding-bottom: 15px;
            margin-bottom: 25px;
        }

        .filter-bar { 
            display: flex; 
            gap: 8px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }

        .filter-btn { 
            background: #1c1f26; 
            border: 1px solid #30363d; 
            color: #ffffff; 
            padding: 8px 16px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 13px; 
            font-weight: 600; 
            text-decoration: none;
        }
        
        .filter-btn:hover { background: #30363d; }
        .filter-btn.active { border-color: #238636; background: rgba(35, 134, 54, 0.15); }
        
        .values-btn {
            border-color: #58a6ff;
            color: #58a6ff;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .container { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }
        
        .card { 
            background: #161b22; 
            border-radius: 10px; 
            padding: 20px; 
            border: 1px solid #30363d; 
        }

        .status { padding: 4px 10px; border-radius: 4px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .open { background: #238636; color: white; }
        .robbing { background: #d29922; color: black; }

        .join-btn { 
            width: 100%; background: #238636; color: white; border: none; 
            padding: 12px; border-radius: 6px; font-weight: bold; cursor: pointer; 
            margin-top: 10px; display: block; text-align: center;
        }
    </style>
</head>
<body style="background-color: #0b0e14;">

    <div class="header-container">
        <h1 style="color: white; margin: 0;">🚨 Live Robbery Snipers</h1>
        <a href="values.html" class="filter-btn values-btn">
            <i class="fas fa-gem"></i> Values
        </a>
    </div>

    <div class="filter-bar" id="filters">
        <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
        <button class="filter-btn" onclick="setFilter('Jewelry', this)">Jewelry</button>
        <button class="filter-btn" onclick="setFilter('Bank', this)">Bank</button>
        <button class="filter-btn" onclick="setFilter('Museum', this)">Museum</button>
        <button class="filter-btn" onclick="setFilter('Casino', this)">Casino</button>
        <button class="filter-btn" onclick="setFilter('Mansion', this)">Mansion</button>
        <button class="filter-btn" onclick="setFilter('Airdrop', this)">Airdrops</button>
    </div> 
    
    <div class="container" id="card-container"></div>

    <script>
        const FIREBASE_URL = "https://robbery-tracker-d43c5-default-rtdb.firebaseio.com/robberies.json";
        let currentFilter = 'all';

        function setFilter(type, btn) {
            currentFilter = type;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            fetchRobberies();
        }

        async function fetchRobberies() {
            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();
                const container = document.getElementById('card-container');
                
                if (!data) {
                    container.innerHTML = "<p style='color: #8b949e;'>Waiting for bots...</p>";
                    return;
                }

                const now = Math.floor(Date.now() / 1000);
                let robberies = [];

                Object.keys(data).forEach(key => {
                    const rob = data[key];
                    if (rob && (now - rob.lastUpdated) < 300) {
                        robberies.push({
                            ...rob,
                            jobId: rob.jobId || key.split('_')[0]
                        });
                    }
                });

                if (currentFilter !== 'all') {
                    robberies = robberies.filter(r => r.name.toLowerCase().includes(currentFilter.toLowerCase()));
                }

                container.innerHTML = ""; 
                robberies.forEach(rob => {
                    let sClass = rob.status === "Open" ? "open" : "robbing";
                    let sText = rob.status === "Open" ? "Open" : "IN ROBBERY";
                    
                    container.innerHTML += `
                        <div class="card">
                            <h3 style="color: white;">${rob.name} <span class="status ${sClass}">${sText}</span></h3>
                            <button class="join-btn" onclick="joinServer('${rob.jobId}')">JOIN GAME</button>
                        </div>
                    `;
                });
            } catch (error) { console.error(error); }
        }

        function joinServer(jobId) {
            window.location.href = "roblox://experiences/start?placeId=606849621&gameInstanceId=" + jobId;
        }

        setInterval(fetchRobberies, 3000);
        fetchRobberies();
    </script>
</body>
</html>
