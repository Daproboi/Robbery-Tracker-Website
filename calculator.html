<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Trade Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.4);
            --green: #00ff88;
            --red: #ff3333;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 80px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 4000;
        }

        .nav-logo { font-weight: 800; font-size: 1.3rem; text-decoration: none; color: #fff; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-item { position: relative; height: 70px; display: flex; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nav-link:hover, .nav-item:hover .nav-link { color: #fff; }

        .dropdown {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; min-width: 180px; padding: 10px;
            opacity: 0; pointer-events: none; transition: 0.3s;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        .drop-link { display: block; padding: 10px; color: var(--text-dim); text-decoration: none; font-size: 0.75rem; font-weight: 600; border-radius: 8px; }
        .drop-link:hover { background: var(--card); color: #fff; }

        /* --- HUD --- */
        .hud-wrapper {
            position: sticky; top: 70px; z-index: 2000;
            padding: 20px 40px; background: rgba(3, 5, 8, 0.7);
            backdrop-filter: blur(20px); border-bottom: 1px solid var(--border);
        }
        .trade-hud { max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 30px; }
        .hud-side { display: flex; flex-direction: column; }
        .hud-side.right { text-align: right; }
        .hud-value { font-family: 'JetBrains Mono'; font-size: 2.2rem; font-weight: 800; color: var(--accent); }
        .swap-btn { width: 45px; height: 45px; border-radius: 50%; background: var(--card); border: 1px solid var(--border); color: #fff; cursor: pointer; font-size: 1.2rem; }

        /* --- LOGS --- */
        .logs-container { max-width: 1200px; margin: 30px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 20px; }
        .log-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 15px; min-height: 80px; }
        .log-entry { display: flex; align-items: center; gap: 12px; padding: 10px; background: var(--card); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px; }
        .log-img { width: 40px; height: 40px; border-radius: 8px; }
        .log-info { flex: 1; font-weight: 700; font-size: 0.85rem; }
        .log-remove { cursor: pointer; opacity: 0.5; font-size: 1.2rem; }

        /* --- DISCOVERY --- */
        .discovery-section { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .search-hub { background: var(--surface); border: 1px solid var(--border); padding: 25px; border-radius: 24px; margin-bottom: 40px; }
        .search-input { width: 100%; background: #000; border: 1px solid var(--border); padding: 15px 20px; border-radius: 12px; color: #fff; font-size: 1rem; margin-bottom: 20px; }
        
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .pill { padding: 10px 18px; border-radius: 10px; background: var(--card); border: 1px solid var(--border); color: var(--text-dim); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* --- GRID --- */
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .card-img { width: 70px; height: 70px; background: #000; border-radius: 12px; object-fit: contain; }
        .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; font-size: 0.8rem; }
        .btn-group { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 800; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .btn-o { background: var(--green); color: #000; }
        .btn-r { background: #fff; color: #000; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="robbery.html" class="nav-link">Robbery</a>
            <a href="sniper.html" class="nav-link">Sniper</a>
            <div class="nav-item">
                <a class="nav-link" style="color:#fff">Values ▼</a>
                <div class="dropdown">
                    <a href="calculator.html" class="drop-link">Value Calculator</a>
                    <a href="market.html" class="drop-link">Market Trends</a>
                    <a href="demand.html" class="drop-link">Demand List</a>
                </div>
            </div>
        </div>
        <div style="width: 40px;"></div>
    </nav>

    <div class="hud-wrapper">
        <div class="trade-hud">
            <div class="hud-side"><span class="hud-value" id="val-offering">$0</span></div>
            <button class="swap-btn" onclick="swapSides()">⇄</button>
            <div class="hud-side right"><span class="hud-value" id="val-requesting">$0</span></div>
        </div>
    </div>

    <div class="logs-container">
        <div class="log-box" id="list-offering"></div>
        <div class="log-box" id="list-requesting"></div>
    </div>

    <div class="discovery-section">
        <div class="search-hub">
            <input type="text" id="main-search" class="search-input" placeholder="Search items..." oninput="refreshDiscovery()">
            <div class="filter-row">
                <div class="pill active" data-type="cat" data-value="all" onclick="updateFilter(this)">All Items</div>
                <div class="pill" data-type="cat" data-value="vehicle" onclick="updateFilter(this)">Vehicles</div>
                <div class="pill" data-type="cat" data-value="rim" onclick="updateFilter(this)">Rims</div>
                <div class="pill" data-type="cat" data-value="furniture" onclick="updateFilter(this)">Furniture</div>
                <div style="flex:1"></div>
                <div class="pill active" data-type="sort" data-value="desc" onclick="updateFilter(this)">High Value</div>
                <div class="pill" data-type="sort" data-value="asc" onclick="updateFilter(this)">Low Value</div>
            </div>
        </div>
        <div class="item-grid" id="main-grid"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let offerList = [];
        let requestList = [];
        let activeCat = 'all';
        let activeSort = 'desc';

        function updateFilter(el) {
            const type = el.getAttribute('data-type');
            document.querySelectorAll(`.pill[data-type="${type}"]`).forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            
            if (type === 'cat') activeCat = el.getAttribute('data-value').toLowerCase();
            if (type === 'sort') activeSort = el.getAttribute('data-value');
            
            refreshDiscovery();
        }

        function refreshDiscovery() {
            const grid = document.getElementById('main-grid');
            const query = document.getElementById('main-search').value.toLowerCase();
            let pool = [];

            // Robust Build Logic
            for (let categoryKey in db) {
                // Check if this category matches activeCat (case-insensitive & partial match)
                const isAll = activeCat === 'all';
                const catMatch = categoryKey.toLowerCase().includes(activeCat);

                if (isAll || catMatch) {
                    db[categoryKey].forEach(item => {
                        if (item.name.toLowerCase().includes(query)) {
                            pool.push({...item, category: categoryKey});
                        }
                    });
                }
            }

            // Sort Logic
            pool.sort((a,b) => {
                return activeSort === 'desc' ? b.cash_value - a.cash_value : a.cash_value - b.cash_value;
            });

            // Render Logic
            grid.innerHTML = pool.length > 0 ? pool.map(i => `
                <div class="card">
                    <div style="display:flex; gap:15px; align-items:center;">
                        <img src="${i.image}" class="card-img" onerror="this.src='https://via.placeholder.com/80/000/333?text=?'">
                        <div>
                            <div style="font-size:0.6rem; color:var(--accent); font-weight:800;">${i.category}</div>
                            <h3 style="margin:0; font-size:1rem;">${i.name}</h3>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div>Value: <span style="color:var(--green)">$${i.cash_value.toLocaleString()}</span></div>
                        <div>Demand: ${i.demand || '—'}</div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-o" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'offer')">Offer</button>
                        <button class="btn btn-r" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'request')">Request</button>
                    </div>
                </div>
            `).join('') : '<div style="grid-column:1/-1; text-align:center; opacity:0.5;">No items found.</div>';
        }

        function addItem(name, side) {
            let found = null;
            for(let cat in db) {
                let match = db[cat].find(i => i.name === name);
                if(match) { found = {...match, uid: Math.random()}; break; }
            }
            if(side === 'offer') offerList.push(found);
            else requestList.push(found);
            updateUI();
        }

        function removeItem(uid, side) {
            if(side === 'offer') offerList = offerList.filter(i => i.uid !== uid);
            else requestList = requestList.filter(i => i.uid !== uid);
            updateUI();
        }

        function swapSides() {
            [offerList, requestList] = [requestList, offerList];
            updateUI();
        }

        function updateUI() {
            const total = list => list.reduce((a, b) => a + b.cash_value, 0);
            const render = (list, id, side) => {
                document.getElementById(id).innerHTML = list.map(i => `
                    <div class="log-entry">
                        <img src="${i.image}" class="log-img" onerror="this.src='https://via.placeholder.com/40/000/333?text=?'">
                        <div class="log-info">${i.name}<br><span style="color:var(--green)">$${i.cash_value.toLocaleString()}</span></div>
                        <div class="log-remove" onclick="removeItem(${i.uid}, '${side}')">×</div>
                    </div>
                `).join('');
            };
            render(offerList, 'list-offering', 'offer');
            render(requestList, 'list-requesting', 'request');
            document.getElementById('val-offering').innerText = `$${total(offerList).toLocaleString()}`;
            document.getElementById('val-requesting').innerText = `$${total(requestList).toLocaleString()}`;
        }

        window.onload = refreshDiscovery;
    </script>
</body>
</html>
