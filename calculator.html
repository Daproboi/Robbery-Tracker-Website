<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        * { box-sizing: border-box; transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: center;
            padding: 0 40px; z-index: 10000;
        }

        .nav-logo { position: absolute; left: 40px; font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }

        /* --- CALCULATOR UI --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        .result-panel {
            background: rgba(10, 12, 16, 0.85); backdrop-filter: blur(15px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 25px 40px; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 90px; z-index: 9000;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .status-container { display: flex; flex-direction: column; }
        .status-label { font-weight: 900; font-size: 2.5rem; text-transform: uppercase; font-style: italic; letter-spacing: -2px; line-height: 1; }
        .diff-text { font-family: 'JetBrains Mono'; font-weight: 600; font-size: 0.9rem; color: var(--text-dim); margin-top: 5px; }

        .item-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; margin-bottom: 40px;
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; position: relative; overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .img-container { width: 100%; height: 140px; background: #000; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card-details { padding: 12px; border-top: 1px solid var(--border); }
        .card-name { font-size: 0.85rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .val-num { font-family: 'JetBrains Mono'; color: var(--green); font-weight: 700; font-size: 0.85rem; }

        .remove-btn {
            position: absolute; top: 8px; right: 8px; background: rgba(255, 51, 51, 0.1); color: var(--red);
            border: none; width: 24px; height: 24px; border-radius: 50%; cursor: pointer; font-weight: 900;
            display: flex; align-items: center; justify-content: center; z-index: 10;
        }
        .remove-btn:hover { background: var(--red); color: white; transform: rotate(90deg); }

        .add-box {
            border: 2px dashed var(--border); border-radius: 18px; height: 210px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-dim); font-weight: 800; font-size: 0.75rem; gap: 4px;
        }
        .add-box:hover { border-color: var(--accent); color: white; background: rgba(0, 112, 243, 0.05); }

        /* --- PICKER --- */
        #pickerOverlay {
            position: fixed; inset: 0; background: rgba(3, 5, 8, 0.98); z-index: 11000;
            display: none; flex-direction: column; padding: 40px;
        }

        .search-container { max-width: 800px; margin: 0 auto 30px; width: 100%; display: flex; gap: 15px; }
        .search-bar { 
            flex: 1; background: var(--surface); border: 1px solid var(--border); 
            border-radius: 12px; padding: 15px 25px; color: white; font-size: 1rem;
        }

        .picker-results {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
            gap: 15px; overflow-y: auto; max-width: 1200px; margin: 0 auto; width: 100%;
        }

        .picker-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 15px; text-align: center; cursor: pointer;
        }
        .picker-card:hover { border-color: var(--accent); transform: scale(1.05); }

        .btn-ui { 
            background: var(--card); color: white; border: 1px solid var(--border); 
            padding: 12px 24px; border-radius: 12px; font-weight: 700; cursor: pointer; font-size: 0.8rem;
        }
        .btn-ui:hover { border-color: var(--accent); background: var(--surface); }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
    </nav>

    <div class="container">
        <div class="result-panel">
            <div class="status-container">
                <div class="status-label" id="status">EQUAL</div>
                <div class="diff-text" id="difference">Difference: $0 (0%)</div>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="btn-ui" onclick="swapSides()">Swap</button>
                <button class="btn-ui" style="color:var(--red);" onclick="clearAll()">Clear</button>
            </div>
        </div>

        <section>
            <h2 style="font-weight:900; font-size: 0.75rem; letter-spacing: 2px; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                YOUR OFFERING <span id="valA" style="color:var(--accent); font-family:'JetBrains Mono'; font-size: 1.1rem;">$0</span>
            </h2>
            <div class="item-grid" id="gridA">
                <div class="add-box" onclick="openPicker('A')"><h1>+</h1>ADD ITEM</div>
            </div>
        </section>

        <section>
            <h2 style="font-weight:900; font-size: 0.75rem; letter-spacing: 2px; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                THEIR OFFERING <span id="valB" style="color:var(--accent); font-family:'JetBrains Mono'; font-size: 1.1rem;">$0</span>
            </h2>
            <div class="item-grid" id="gridB">
                <div class="add-box" onclick="openPicker('B')"><h1>+</h1>ADD ITEM</div>
            </div>
        </section>
    </div>

    <div id="pickerOverlay">
        <div class="search-container">
            <input type="text" id="pSearch" class="search-bar" placeholder="Search item name..." oninput="renderPicker()">
            <button onclick="closePicker()" class="btn-ui" style="font-size: 1.2rem; padding: 0 25px;">×</button>
        </div>
        <div class="picker-results" id="pResults"></div>
    </div>

    <script>
        const db = [
            { name: "Torpedo", val: 40000000, img: "https://via.placeholder.com/150", cat: "Vehicle" },
            { name: "Arachnid", val: 25000000, img: "https://via.placeholder.com/150", cat: "Vehicle" },
            { name: "Mégalo", val: 15000000, img: "https://via.placeholder.com/150", cat: "Vehicle" },
            { name: "Void Rim", val: 12000000, img: "https://via.placeholder.com/150", cat: "Rim" },
            { name: "Blue Fire", val: 5000000, img: "https://via.placeholder.com/150", cat: "Texture" }
        ];

        let sideA = [];
        let sideB = [];
        let activeSide = 'A';

        function openPicker(side) {
            activeSide = side;
            document.getElementById('pickerOverlay').style.display = 'flex';
            document.getElementById('pSearch').value = '';
            renderPicker();
        }

        function closePicker() { document.getElementById('pickerOverlay').style.display = 'none'; }

        function renderPicker() {
            const query = document.getElementById('pSearch').value.toLowerCase();
            const res = document.getElementById('pResults');
            res.innerHTML = db.filter(i => i.name.toLowerCase().includes(query)).map(item => `
                <div class="picker-card" onclick="addItem(${JSON.stringify(item).replace(/"/g, '&quot;')})">
                    <img src="${item.img}" style="width:80px; height:80px; object-fit:contain;">
                    <div style="font-weight:700; margin-top:10px; font-size:0.8rem;">${item.name}</div>
                    <div style="color:var(--green); font-family:'JetBrains Mono'; font-size:0.75rem;">$${item.val.toLocaleString()}</div>
                </div>
            `).join('');
        }

        function addItem(item) {
            if (activeSide === 'A') sideA.push(item); else sideB.push(item);
            closePicker();
            updateUI();
        }

        function removeItem(side, index) {
            if (side === 'A') sideA.splice(index, 1); else sideB.splice(index, 1);
            updateUI();
        }

        function swapSides() { [sideA, sideB] = [sideB, sideA]; updateUI(); }
        function clearAll() { sideA = []; sideB = []; updateUI(); }

        function updateUI() {
            const renderGrid = (items, gridId, side) => {
                const grid = document.getElementById(gridId);
                grid.innerHTML = items.map((item, i) => `
                    <div class="item-card">
                        <button class="remove-btn" onclick="removeItem('${side}', ${i})">×</button>
                        <div class="img-container"><img src="${item.img}"></div>
                        <div class="card-details">
                            <div class="card-name">${item.name}</div>
                            <div class="val-num">$${item.val.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('') + `<div class="add-box" onclick="openPicker('${side}')"><h1>+</h1>ADD ITEM</div>`;
            };

            renderGrid(sideA, 'gridA', 'A');
            renderGrid(sideB, 'gridB', 'B');

            const totalA = sideA.reduce((s, i) => s + i.val, 0);
            const totalB = sideB.reduce((s, i) => s + i.val, 0);
            document.getElementById('valA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('valB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalB - totalA;
            const status = document.getElementById('status');
            const diffEl = document.getElementById('difference');
            
            if (totalA === 0 && totalB === 0) {
                status.innerText = "EQUAL"; status.style.color = "white";
                diffEl.innerText = "Add items to calculate";
            } else {
                const perc = totalA === 0 ? 100 : Math.round((diff / totalA) * 100);
                diffEl.innerText = `Difference: $${Math.abs(diff).toLocaleString()} (${perc > 0 ? '+' : ''}${perc}%)`;
                
                if (Math.abs(perc) <= 10) {
                    status.innerText = "FAIR TRADE"; status.style.color = "var(--green)";
                } else {
                    status.innerText = perc > 0 ? "BIG WIN (W)" : "OVERPAY (L)";
                    status.style.color = perc > 0 ? "var(--green)" : "var(--red)";
                }
            }
        }
    </script>
</body>
</html>
