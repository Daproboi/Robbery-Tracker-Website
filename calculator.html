<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Trade Calculator</title>
    <style>
        :root {
            --bg: #0a0c10; --panel: #0d1117; --card: #161b22; 
            --border: #30363d; --text-main: #f0f6fc; --text-dim: #8b949e; 
            --accent: #58a6ff; --green: #3fb950; --red: #f85149;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-top: 80px; }

        /* Navbar */
        .nav-top { position: fixed; top: 0; width: 100%; height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 10px; z-index: 1000; align-items: center; }
        .nav-item { position: relative; height: 100%; display: flex; align-items: center; }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 600; padding: 8px 16px; border-radius: 8px; transition: 0.2s; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
        .nav-link:hover, .nav-item:hover .nav-link { color: var(--text-main); background: #21262d; }
        .nav-active { color: var(--accent) !important; background: #21262d; }
        .dropdown-content { display: none; position: absolute; top: 55px; left: 0; background: var(--panel); min-width: 180px; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 1100; overflow: hidden; }
        .dropdown-content a { color: var(--text-dim); padding: 12px 16px; text-decoration: none; display: block; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .dropdown-content a:hover { background: #21262d; color: var(--accent); }
        .nav-item:hover .dropdown-content { display: block; }

        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .side-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-height: 450px; }
        .side-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .total-box { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        /* Item Cards with Images */
        .added-item { background: var(--card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; margin-bottom: 10px; display: flex; gap: 12px; align-items: center; }
        .calc-img { width: 50px; height: 50px; background: #000; border-radius: 6px; object-fit: contain; border: 1px solid var(--border); }
        
        .item-content { flex: 1; }
        .item-top { display: flex; justify-content: space-between; align-items: center; }
        .item-price { color: var(--green); font-weight: 700; font-size: 0.9rem; }

        /* Fixed Button Layout */
        .controls { display: flex; justify-content: space-between; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px solid #21262d; }
        .dupe-check { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; color: var(--text-dim); cursor: pointer; user-select: none; }
        .remove-btn { color: var(--red); background: #21262d; border: 1px solid var(--border); border-radius: 4px; padding: 4px 8px; cursor: pointer; font-weight: bold; font-size: 0.7rem; transition: 0.2s; }
        .remove-btn:hover { background: var(--red); color: white; }

        .add-area { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: white; outline: none; }
        .search-results { position: absolute; width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 8px; z-index: 10; max-height: 200px; overflow-y: auto; display: none; }
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); font-size: 0.9rem; display: flex; justify-content: space-between; align-items: center; }
        .search-item:hover { background: #21262d; color: var(--accent); }

        .verdict-card { margin-top: 30px; background: var(--card); border: 2px solid var(--border); border-radius: 15px; padding: 30px; text-align: center; }
        .verdict-text { font-size: 2.2rem; font-weight: 900; margin-bottom: 5px; }
        .win-loss-detail { font-size: 1.1rem; color: var(--text-dim); }
        .disclaimer { font-size: 0.7rem; color: #555; margin-top: 20px; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <div class="nav-item"><a href="index.html" class="nav-link">HOME</a></div>
        <div class="nav-item"><a href="tracker.html" class="nav-link">ROBBERY TRACKER</a></div>
        <div class="nav-item">
            <a href="values.html" class="nav-link nav-active">VALUES <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 4L5 7L8 4" stroke="currentColor" stroke-width="2" fill="none"/></svg></a>
            <div class="dropdown-content">
                <a href="values.html">ITEM VALUES</a>
                <a href="calculator.html">VALUE CALCULATOR</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Trade Calculator</h1>
        <div class="calc-grid">
            <div class="side-panel">
                <div class="side-header"><span>YOUR OFFER</span><span id="total-left" class="total-box">$0</span></div>
                <div class="add-area">
                    <input type="text" placeholder="Search item..." oninput="doSearch(this, 'left')">
                    <div id="res-left" class="search-results"></div>
                </div>
                <div id="list-left"></div>
            </div>
            <div class="side-panel">
                <div class="side-header"><span>THEIR OFFER</span><span id="total-right" class="total-box">$0</span></div>
                <div class="add-area">
                    <input type="text" placeholder="Search item..." oninput="doSearch(this, 'right')">
                    <div id="res-right" class="search-results"></div>
                </div>
                <div id="list-right"></div>
            </div>
        </div>

        <div class="verdict-card" id="v-card">
            <div class="verdict-text" id="v-text">ADD ITEMS TO START</div>
            <div class="win-loss-detail" id="v-detail">The calculator will compare the values for you.</div>
            <p class="disclaimer">NOTICE: Values are estimates. Trade at your own risk.</p>
        </div>
    </div>

    <script src="Values.js"></script>
    <script>
        let myOffer = [];
        let theirOffer = [];

        function doSearch(input, side) {
            const query = input.value.toLowerCase();
            const resDiv = document.getElementById(`res-${side}`);
            if (query.length < 1) { resDiv.style.display = 'none'; return; }

            let matches = [];
            Object.keys(db).forEach(cat => {
                db[cat].forEach(item => {
                    if (item.name.toLowerCase().includes(query)) matches.push({...item});
                });
            });

            resDiv.innerHTML = matches.slice(0, 5).map(item => `
                <div class="search-item" onclick="addItem('${item.name}', '${side}')">
                    <span>${item.name}</span>
                    <span style="color:var(--green)">$${item.cash_value.toLocaleString()}</span>
                </div>
            `).join('');
            resDiv.style.display = 'block';
        }

        function addItem(name, side) {
            let foundItem = null;
            Object.keys(db).forEach(cat => {
                const item = db[cat].find(i => i.name === name);
                if (item) foundItem = JSON.parse(JSON.stringify(item));
            });

            if (foundItem) {
                foundItem.isDuped = false;
                foundItem.uniqueId = Date.now() + Math.random();
                if (side === 'left') myOffer.push(foundItem);
                else theirOffer.push(foundItem);
            }
            document.querySelectorAll('input').forEach(i => i.value = '');
            document.querySelectorAll('.search-results').forEach(r => r.style.display = 'none');
            render();
        }

        function toggleDupe(id, side) {
            const list = (side === 'left') ? myOffer : theirOffer;
            const item = list.find(i => i.uniqueId === id);
            if (item) item.isDuped = !item.isDuped;
            render();
        }

        function removeItem(id, side) {
            if (side === 'left') myOffer = myOffer.filter(i => i.uniqueId !== id);
            else theirOffer = theirOffer.filter(i => i.uniqueId !== id);
            render();
        }

        function render() {
            renderSide('left', myOffer);
            renderSide('right', theirOffer);
            updateVerdict();
        }

        function renderSide(side, items) {
            const container = document.getElementById(`list-${side}`);
            const totalBox = document.getElementById(`total-${side}`);
            let total = 0;

            container.innerHTML = items.map(item => {
                const price = item.isDuped ? (item.duped_value || item.cash_value) : item.cash_value;
                total += price;
                const img = item.image ? item.image : 'images/placeholder.png';

                return `
                    <div class="added-item">
                        <img src="${img}" class="calc-img" onerror="this.src='images/placeholder.png';">
                        <div class="item-content">
                            <div class="item-top">
                                <strong>${item.name}</strong>
                                <span class="item-price">$${price.toLocaleString()}</span>
                            </div>
                            <div class="controls">
                                <label class="dupe-check">
                                    <input type="checkbox" ${item.isDuped ? 'checked' : ''} onchange="toggleDupe(${item.uniqueId}, '${side}')"> Duped?
                                </label>
                                <button class="remove-btn" onclick="removeItem(${item.uniqueId}, '${side}')">REMOVE</button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            totalBox.innerText = `$${total.toLocaleString()}`;
        }

        function updateVerdict() {
            const getPrice = i => i.isDuped ? (i.duped_value || i.cash_value) : i.cash_value;
            const myTotal = myOffer.reduce((sum, i) => sum + getPrice(i), 0);
            const theirTotal = theirOffer.reduce((sum, i) => sum + getPrice(i), 0);
            const vText = document.getElementById('v-text');
            const vDetail = document.getElementById('v-detail');
            const vCard = document.getElementById('v-card');

            if (myTotal === 0 && theirTotal === 0) return;

            const diff = theirTotal - myTotal;
            if (diff > 0) {
                vText.innerText = "WIN!"; vText.style.color = "var(--green)";
                vDetail.innerText = `You are gaining $${diff.toLocaleString()} in value.`;
                vCard.style.borderColor = "var(--green)";
            } else if (diff < 0) {
                vText.innerText = "LOSS!"; vText.style.color = "var(--red)";
                vDetail.innerText = `You are losing $${Math.abs(diff).toLocaleString()} in value.`;
                vCard.style.borderColor = "var(--red)";
            } else {
                vText.innerText = "FAIR TRADE"; vText.style.color = "var(--accent)";
                vDetail.innerText = "The values are equal.";
                vCard.style.borderColor = "var(--accent)";
            }
        }
    </script>
</body>
</html>
