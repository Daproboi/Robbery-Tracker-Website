<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }
        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* --- CALC UI --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        .result-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 90px; z-index: 4000;
        }

        .status-big { font-weight: 900; font-size: 1.8rem; font-style: italic; text-transform: uppercase; }
        .btn-group { display: flex; gap: 10px; }
        .control-btn { 
            background: var(--card); border: 1px solid var(--border); color: white;
            padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 800; font-size: 0.8rem;
        }

        .item-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; margin-top: 25px; margin-bottom: 50px;
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; position: relative; overflow: hidden;
        }

        .img-container { width: 100%; height: 200px; background: #000; display: flex; align-items: center; justify-content: center; }
        .img-container img { width: 80%; height: 80%; object-fit: contain; }

        .card-details { padding: 20px; }
        .card-name { font-size: 1.2rem; font-weight: 800; margin-bottom: 10px; }
        .val-num { font-family: 'JetBrains Mono'; color: var(--green); font-weight: 800; }

        .remove-icon {
            position: absolute; top: 10px; right: 10px; background: var(--red); color: white;
            border: none; width: 35px; height: 35px; border-radius: 8px; cursor: pointer; font-weight: 900;
        }

        .add-box {
            border: 3px dashed var(--border); border-radius: 24px; height: 330px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-dim); font-weight: 800; gap: 10px;
        }

        /* --- GIANT PICKER --- */
        #pickerOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: none; flex-direction: column; padding: 30px;
        }

        .picker-controls { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .search-row { display: flex; gap: 15px; }
        .search-giant { flex-grow: 1; background: var(--surface); border: 2px solid var(--border); border-radius: 15px; padding: 20px; color: white; font-size: 1.2rem; }
        
        .filter-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .sort-select { background: var(--card); color: white; border: 1px solid var(--border); padding: 10px; border-radius: 8px; font-weight: 700; }

        .picker-results {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px; overflow-y: auto; padding-bottom: 50px;
        }

        .picker-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 15px;
            padding: 15px; text-align: center; cursor: pointer;
        }
        .picker-card img { width: 100px; height: 100px; object-fit: contain; margin-bottom: 10px; }
        .picker-card:hover { border-color: var(--accent); }

    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="values.html" class="nav-link">Value List</a>
            <a href="calculator.html" class="nav-link" style="color:white">Value Calculator</a>
        </div>
    </nav>

    <div class="container">
        <div class="result-panel">
            <div>
                <div class="status-big" id="status">EQUAL</div>
                <div id="difference" style="color:var(--text-dim); font-weight:700;">Difference: $0</div>
            </div>
            <div class="btn-group">
                <button class="control-btn" onclick="swapSides()">Swap Sides</button>
                <button class="control-btn" style="color:var(--red)" onclick="clearAll()">Clear All</button>
            </div>
        </div>

        <div class="side-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--border); padding-bottom:10px;">
            <h2 style="margin:0; font-style:italic; font-weight:900;">YOUR SIDE</h2>
            <div id="valA" style="font-family:'JetBrains Mono'; font-size:1.5rem; color:var(--green); font-weight:800;">$0</div>
        </div>
        <div class="item-grid" id="gridA">
            <div class="add-box" onclick="openPicker('A')"><h1>+</h1>ADD ITEM</div>
        </div>

        <div class="side-header" style="display:flex; justify-content:space-between; align-items:center; border-bottom:2px solid var(--border); padding-bottom:10px;">
            <h2 style="margin:0; font-style:italic; font-weight:900;">THEIR SIDE</h2>
            <div id="valB" style="font-family:'JetBrains Mono'; font-size:1.5rem; color:var(--green); font-weight:800;">$0</div>
        </div>
        <div class="item-grid" id="gridB">
            <div class="add-box" onclick="openPicker('B')"><h1>+</h1>ADD ITEM</div>
        </div>
    </div>

    <div id="pickerOverlay">
        <div class="picker-controls">
            <div class="search-row">
                <input type="text" id="pSearch" class="search-giant" placeholder="Search any item..." oninput="renderPicker()">
                <button onclick="closePicker()" style="background:var(--red); color:white; border:none; padding:0 30px; border-radius:15px; font-weight:900; cursor:pointer;">X</button>
            </div>
            <div class="filter-row">
                <select id="sortType" class="sort-select" onchange="renderPicker()">
                    <option value="val_desc">Price: High to Low</option>
                    <option value="val_asc">Price: Low to High</option>
                    <option value="alpha_asc">Alphabetical: A-Z</option>
                </select>
                <select id="catFilter" class="sort-select" onchange="renderPicker()">
                    <option value="All">All Categories</option>
                    </select>
            </div>
        </div>
        <div class="picker-results" id="pResults"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let sideA = [];
        let sideB = [];
        let activeSide = 'A';

        // Auto-fill Categories in the dropdown
        function initCategories() {
            const filter = document.getElementById('catFilter');
            for(let cat in db) {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.innerText = cat;
                filter.appendChild(opt);
            }
        }
        initCategories();

        function openPicker(side) {
            activeSide = side;
            document.getElementById('pickerOverlay').style.display = 'flex';
            renderPicker();
        }

        function closePicker() { document.getElementById('pickerOverlay').style.display = 'none'; }

        function renderPicker() {
            const query = document.getElementById('pSearch').value.toLowerCase();
            const sort = document.getElementById('sortType').value;
            const catF = document.getElementById('catFilter').value;
            const res = document.getElementById('pResults');
            res.innerHTML = '';

            let all = [];
            // This grabs EVERYTHING in the database
            for(let cat in db) {
                db[cat].forEach(item => {
                    if(catF === 'All' || cat === catF) {
                        all.push({...item, cat});
                    }
                });
            }

            // Apply Sort
            if(sort === 'val_desc') all.sort((a,b) => b.cash_value - a.cash_value);
            if(sort === 'val_asc') all.sort((a,b) => a.cash_value - b.cash_value);
            if(sort === 'alpha_asc') all.sort((a,b) => a.name.localeCompare(b.name));

            all.filter(i => i.name.toLowerCase().includes(query)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'picker-card';
                div.innerHTML = `
                    <img src="${item.image}">
                    <div style="color:var(--accent); font-size:0.6rem; font-weight:800;">${item.cat}</div>
                    <div style="font-weight:800; font-size:0.9rem;">${item.name}</div>
                    <div style="font-family:'JetBrains Mono'; color:var(--green);">$${item.cash_value.toLocaleString()}</div>
                `;
                div.onclick = () => {
                    if (activeSide === 'A') sideA.push(item);
                    else sideB.push(item);
                    closePicker();
                    updateUI();
                };
                res.appendChild(div);
            });
        }

        function removeItem(side, index) {
            if (side === 'A') sideA.splice(index, 1);
            else sideB.splice(index, 1);
            updateUI();
        }

        function clearAll() { sideA = []; sideB = []; updateUI(); }
        function swapSides() { [sideA, sideB] = [sideB, sideA]; updateUI(); }

        function updateUI() {
            const draw = (items, gridId, side) => {
                const grid = document.getElementById(gridId);
                let html = items.map((item, i) => `
                    <div class="item-card">
                        <button class="remove-icon" onclick="removeItem('${side}', ${i})">×</button>
                        <div class="img-container"><img src="${item.image}"></div>
                        <div class="card-details">
                            <div class="card-name">${item.name}</div>
                            <div class="val-num">$${item.cash_value.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
                html += `<div class="add-box" onclick="openPicker('${side}')"><h1>+</h1>ADD ITEM</div>`;
                grid.innerHTML = html;
            };

            draw(sideA, 'gridA', 'A');
            draw(sideB, 'gridB', 'B');

            const totalA = sideA.reduce((s, i) => s + i.cash_value, 0);
            const totalB = sideB.reduce((s, i) => s + i.cash_value, 0);
            document.getElementById('valA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('valB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalA - totalB;
            const status = document.getElementById('status');
            document.getElementById('difference').innerText = `Difference: $${Math.abs(diff).toLocaleString()}`;

            if (totalA === 0 && totalB === 0) { status.innerText = "EQUAL"; status.style.color = "white"; }
            else if (Math.abs(diff) < (Math.max(totalA, totalB) * 0.12)) { status.innerText = "FAIR TRADE"; status.style.color = "var(--green)"; }
            else { status.innerText = diff > 0 ? "A OVERPAYING" : "B OVERPAYING"; status.style.color = "var(--red)"; }
        }
    </script>
</body>
</html>
