<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Calculator | Jailbreak Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.3);
            --green: #00ff88;
            --red: #ff3333;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 80px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 60px; z-index: 5000;
        }

        .nav-logo { font-weight: 800; font-size: 1.5rem; text-decoration: none; color: #fff; letter-spacing: -1.5px; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 40px; align-items: center; }
        .nav-link { 
            text-decoration: none; color: var(--text-dim); font-size: 0.85rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-link:hover { color: #fff; }
        .nav-link.active { color: var(--accent); }

        /* --- CALCULATOR HUD --- */
        .hud-wrapper {
            position: sticky; top: 70px; z-index: 4000;
            padding: 25px 0; background: rgba(3, 5, 8, 0.7);
            backdrop-filter: blur(30px); border-bottom: 1px solid var(--border);
        }

        .trade-hud {
            max-width: 1200px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; gap: 60px; padding: 0 20px;
        }

        .hud-stat-box { text-align: center; }
        .hud-label { 
            font-size: 0.65rem; font-weight: 800; color: var(--text-dim); 
            text-transform: uppercase; letter-spacing: 3px; margin-bottom: 8px;
        }
        .hud-value { 
            font-family: 'JetBrains Mono'; font-size: 3rem; font-weight: 800; 
            color: var(--green); text-shadow: 0 0 30px rgba(0, 255, 136, 0.3); 
        }

        .hud-divider {
            height: 50px; width: 1px; background: var(--border);
        }

        /* --- CONTENT LAYOUT --- */
        .main-layout {
            max-width: 1400px; margin: 40px auto;
            display: grid; grid-template-columns: 350px 1fr;
            gap: 40px; padding: 0 40px;
        }

        /* LEFT: SELECTED LIST */
        .sidebar { position: sticky; top: 220px; height: fit-content; }
        .section-label { font-weight: 800; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; margin-bottom: 20px; display: block; }

        .calc-list-container {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; min-height: 400px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }

        .empty-state {
            height: 300px; display: flex; align-items: center; justify-content: center;
            text-align: center; color: var(--text-dim); font-size: 0.9rem; font-style: italic;
        }

        .item-row {
            display: flex; align-items: center; gap: 15px; padding: 12px;
            background: var(--card); border-radius: 16px; border: 1px solid var(--border);
            margin-bottom: 12px; animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        .item-row img { width: 45px; height: 45px; object-fit: contain; background: #000; border-radius: 8px; }
        .item-row-info { flex: 1; }
        .item-row-name { font-size: 0.85rem; font-weight: 700; margin-bottom: 2px; }
        .item-row-price { font-size: 0.75rem; color: var(--green); font-family: 'JetBrains Mono'; }
        .item-row-remove { cursor: pointer; color: var(--red); font-size: 1.2rem; padding: 5px; opacity: 0.6; }
        .item-row-remove:hover { opacity: 1; }

        /* RIGHT: DISCOVERY & OPTIONS */
        .discovery-pane { display: flex; flex-direction: column; gap: 30px; }

        .search-area {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 28px; padding: 30px;
        }

        .search-input {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 18px 25px; border-radius: 16px; color: #fff; font-size: 1.1rem;
            margin-bottom: 25px;
        }

        .filter-options { display: flex; gap: 10px; flex-wrap: wrap; }
        .option-pill {
            padding: 12px 24px; border-radius: 14px; background: var(--card);
            border: 1px solid var(--border); color: var(--text-dim);
            font-size: 0.75rem; font-weight: 800; text-transform: uppercase; cursor: pointer;
        }
        .option-pill.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 8px 20px var(--accent-glow); }
        .option-pill:hover:not(.active) { border-color: var(--accent); color: #fff; }

        /* ITEM GRID */
        .item-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 24px;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
            position: relative; overflow: hidden;
        }
        .item-card:hover { border-color: var(--accent); transform: translateY(-5px); }

        .card-img-container {
            width: 100%; height: 160px; background: #000;
            border-radius: 18px; display: flex; align-items: center; justify-content: center;
            padding: 15px; border: 1px solid rgba(255,255,255,0.03);
        }
        .card-img { max-width: 100%; max-height: 100%; object-fit: contain; }

        .card-meta { display: flex; justify-content: space-between; align-items: flex-start; }
        .card-cat { font-size: 0.6rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        .card-val { font-family: 'JetBrains Mono'; color: var(--green); font-weight: 700; font-size: 1rem; }

        .add-btn {
            width: 100%; padding: 14px; border-radius: 14px; background: #fff;
            color: #000; border: none; font-weight: 800; font-size: 0.75rem;
            text-transform: uppercase; cursor: pointer;
        }
        .add-btn:hover { background: var(--accent); color: #fff; }

        /* BUTTONS */
        .clear-btn {
            width: 100%; padding: 15px; margin-top: 20px; background: transparent;
            border: 1px solid var(--red); color: var(--red); border-radius: 14px;
            font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 0.7rem;
        }
        .clear-btn:hover { background: var(--red); color: #fff; }

        /* CUSTOM SCROLLBAR */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--card); border-radius: 10px; border: 2px solid var(--bg); }
        ::-webkit-scrollbar-thumb:hover { background: var(--border); }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="index.html" class="nav-link">Trade HUD</a>
            <a href="calculator.html" class="nav-link active">Calculator</a>
            <a href="market.html" class="nav-link">Value List</a>
        </div>
        <div style="width: 100px;"></div>
    </nav>

    <div class="hud-wrapper">
        <div class="trade-hud">
            <div class="hud-stat-box">
                <div class="hud-label">Items Added</div>
                <div class="hud-value" id="count-display" style="color: #fff; text-shadow: none;">0</div>
            </div>
            <div class="hud-divider"></div>
            <div class="hud-stat-box">
                <div class="hud-label">Total Trade Value</div>
                <div class="hud-value" id="total-display">$0</div>
            </div>
            <div class="hud-divider"></div>
            <div class="hud-stat-box">
                <div class="hud-label">Value Status</div>
                <div class="hud-value" id="status-display" style="font-size: 1.5rem; color: var(--text-dim);">Empty</div>
            </div>
        </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <span class="section-label">Your Calculation</span>
            <div class="calc-list-container" id="calc-list">
                <div class="empty-state">No items added yet.<br>Select items from the right to begin.</div>
            </div>
            <button class="clear-btn" onclick="clearAll()">Clear Calculation</button>
        </div>

        <div class="discovery-pane">
            <div class="search-area">
                <input type="text" id="item-search" class="search-input" placeholder="Search item name (e.g. Torpedo, Beam...)" oninput="refreshItems()">
                
                <span class="section-label" style="margin-bottom: 12px;">Value Options</span>
                <div class="filter-options">
                    <div class="option-pill active" data-cat="all" onclick="filterCat('all', this)">All Items</div>
                    <div class="option-pill" data-cat="vehicle" onclick="filterCat('vehicle', this)">Vehicles</div>
                    <div class="option-pill" data-cat="rim" onclick="filterCat('rim', this)">Rims</div>
                    <div class="option-pill" data-cat="furniture" onclick="filterCat('furniture', this)">Furniture</div>
                    <div class="option-pill" data-cat="skin" onclick="filterCat('skin', this)">Skins/Textures</div>
                    <div class="option-pill" data-cat="spoiler" onclick="filterCat('spoiler', this)">Spoilers</div>
                </div>
            </div>

            <div class="item-grid" id="item-grid">
                </div>
        </div>
    </div>

    <script src="Values.js"></script>
    <script>
        let currentCalculation = [];
        let activeFilter = 'all';

        function filterCat(cat, el) {
            activeFilter = cat;
            document.querySelectorAll('.option-pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            refreshItems();
        }

        function refreshItems() {
            const grid = document.getElementById('item-grid');
            const query = document.getElementById('item-search').value.toLowerCase();
            let html = '';

            // Using "fuzzy" logic to ensure 'vehicle' matches 'Vehicles', etc.
            for (let category in db) {
                const isMatch = activeFilter === 'all' || category.toLowerCase().includes(activeFilter);
                
                if (isMatch) {
                    db[category].forEach(item => {
                        if (item.name.toLowerCase().includes(query)) {
                            html += `
                                <div class="item-card">
                                    <div class="card-meta">
                                        <span class="card-cat">${category}</span>
                                        <span class="card-val">$${item.cash_value.toLocaleString()}</span>
                                    </div>
                                    <div class="card-img-container">
                                        <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/150/000/333?text=?'">
                                    </div>
                                    <h3 style="margin: 5px 0; font-size: 1rem;">${item.name}</h3>
                                    <button class="add-btn" onclick="addToCalc('${item.name.replace(/'/g, "\\'")}', ${item.cash_value}, '${item.image}')">Add to List</button>
                                </div>
                            `;
                        }
                    });
                }
            }
            grid.innerHTML = html || '<div style="grid-column:1/-1; text-align:center; padding:100px; opacity:0.3;">No items found.</div>';
        }

        function addToCalc(name, price, img) {
            currentCalculation.push({ name, price, img, id: Date.now() });
            updateUI();
        }

        function removeFromCalc(id) {
            currentCalculation = currentCalculation.filter(item => item.id !== id);
            updateUI();
        }

        function clearAll() {
            if(confirm('Are you sure you want to clear your calculation?')) {
                currentCalculation = [];
                updateUI();
            }
        }

        function updateUI() {
            const list = document.getElementById('calc-list');
            const totalEl = document.getElementById('total-display');
            const countEl = document.getElementById('count-display');
            const statusEl = document.getElementById('status-display');
            
            let total = 0;

            if (currentCalculation.length === 0) {
                list.innerHTML = `<div class="empty-state">No items added yet.<br>Select items from the right to begin.</div>`;
                statusEl.innerText = "Empty";
                statusEl.style.color = "var(--text-dim)";
            } else {
                list.innerHTML = currentCalculation.map(item => {
                    total += item.price;
                    return `
                        <div class="item-row">
                            <img src="${item.img}" onerror="this.src='https://via.placeholder.com/45/000/333?text=?'">
                            <div class="item-row-info">
                                <div class="item-row-name">${item.name}</div>
                                <div class="item-row-price">$${item.price.toLocaleString()}</div>
                            </div>
                            <div class="item-row-remove" onclick="removeFromCalc(${item.id})">×</div>
                        </div>
                    `;
                }).join('');
                
                statusEl.innerText = total > 10000000 ? "High Tier" : "Active";
                statusEl.style.color = "var(--accent)";
            }

            totalEl.innerText = `$${total.toLocaleString()}`;
            countEl.innerText = currentCalculation.length;
        }

        // Initialize on load
        window.onload = refreshItems;
    </script>
</body>
</html>
