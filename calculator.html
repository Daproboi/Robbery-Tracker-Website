<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Value Calculator | Jailbreak Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.3);
            --green: #00ff88;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 90px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }

        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.8rem; font-weight: 700; text-transform: uppercase; cursor: pointer; }
        .nav-link:hover { color: #fff; }

        /* --- CALCULATOR LAYOUT --- */
        .calc-container {
            max-width: 1300px; margin: 0 auto; padding: 0 20px;
            display: grid; grid-template-columns: 1fr 380px; gap: 30px;
        }

        /* LEFT SIDE: ITEM PICKER */
        .item-picker-section {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; height: calc(100vh - 120px);
            display: flex; flex-direction: column;
        }

        .search-bar {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 15px 20px; border-radius: 12px; color: #fff; margin-bottom: 15px;
        }

        /* QUICK VALUE TABS (This is what you were missing) */
        .value-tabs {
            display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px;
        }
        .v-tab {
            white-space: nowrap; padding: 8px 16px; background: var(--card);
            border: 1px solid var(--border); border-radius: 8px;
            font-size: 0.7rem; font-weight: 800; color: var(--text-dim);
            cursor: pointer; text-transform: uppercase;
        }
        .v-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        .picker-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px; overflow-y: auto; flex: 1; padding-right: 5px;
        }

        /* RIGHT SIDE: THE CALCULATION */
        .trade-summary {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; padding: 25px; position: sticky; top: 90px;
            height: fit-content;
        }

        .summary-header { border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 15px; }
        .summary-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; }
        
        .total-display {
            background: rgba(0,0,0,0.3); padding: 20px; border-radius: 16px;
            text-align: center; margin-bottom: 20px;
        }
        .total-val { font-family: 'JetBrains Mono'; font-size: 2rem; color: var(--green); font-weight: 800; }

        /* ITEM CARDS IN PICKER */
        .mini-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 12px; text-align: center; cursor: pointer;
        }
        .mini-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .mini-img { width: 100%; height: 100px; object-fit: contain; margin-bottom: 10px; }
        .mini-name { font-size: 0.8rem; font-weight: 700; margin-bottom: 5px; }
        .mini-price { font-size: 0.75rem; color: var(--green); font-family: 'JetBrains Mono'; }

    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="index.html" class="nav-link">Trade HUD</a>
            <a href="market.html" class="nav-link">Values</a>
        </div>
    </nav>

    <div class="calc-container">
        <div class="item-picker-section">
            <input type="text" id="calc-search" class="search-bar" placeholder="Search items to add..." oninput="renderPicker()">
            
            <div class="value-tabs" id="value-tabs">
                <div class="v-tab active" onclick="setCalcCat('all', this)">All</div>
                <div class="v-tab" onclick="setCalcCat('vehicle', this)">Vehicles</div>
                <div class="v-tab" onclick="setCalcCat('rim', this)">Rims</div>
                <div class="v-tab" onclick="setCalcCat('furniture', this)">Furniture</div>
                <div class="v-tab" onclick="setCalcCat('skin', this)">Skins</div>
            </div>

            <div class="picker-grid" id="picker-grid">
                </div>
        </div>

        <div class="trade-summary">
            <div class="summary-header">
                <div class="summary-title">Calculator Total</div>
                <div style="font-size: 0.7rem; color: var(--text-dim);">Live Value Evaluation</div>
            </div>

            <div class="total-display">
                <div style="font-size: 0.6rem; text-transform: uppercase; margin-bottom: 5px;">Current Value</div>
                <div class="total-val" id="calc-total">$0</div>
            </div>

            <div id="added-items-list">
                </div>
            
            <button style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; color:#fff; font-weight:800; cursor:pointer; margin-top:20px;">
                CLEAR ALL
            </button>
        </div>
    </div>

    <script src="Values.js"></script>
    <script>
        let selectedItems = [];
        let currentCalcCat = 'all';

        function setCalcCat(cat, el) {
            currentCalcCat = cat;
            document.querySelectorAll('.v-tab').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            renderPicker();
        }

        function renderPicker() {
            const grid = document.getElementById('picker-grid');
            const search = document.getElementById('calc-search').value.toLowerCase();
            let html = '';

            for (let category in db) {
                if (currentCalcCat !== 'all' && !category.toLowerCase().includes(currentCalcCat)) continue;

                db[category].forEach(item => {
                    if (item.name.toLowerCase().includes(search)) {
                        html += `
                            <div class="mini-card" onclick="addToCalc('${item.name.replace(/'/g, "\\'")}', ${item.cash_value})">
                                <img src="${item.image}" class="mini-img" onerror="this.src='https://via.placeholder.com/100/000/333?text=?'">
                                <div class="mini-name">${item.name}</div>
                                <div class="mini-price">$${item.cash_value.toLocaleString()}</div>
                            </div>
                        `;
                    }
                });
            }
            grid.innerHTML = html || '<div style="grid-column:1/-1; text-align:center; padding:20px; opacity:0.5;">No items found.</div>';
        }

        function addToCalc(name, price) {
            selectedItems.push({ name, price, id: Date.now() });
            updateCalcUI();
        }

        function removeFromCalc(id) {
            selectedItems = selectedItems.filter(i => i.id !== id);
            updateCalcUI();
        }

        function updateCalcUI() {
            const list = document.getElementById('added-items-list');
            const totalEl = document.getElementById('calc-total');
            
            let total = 0;
            list.innerHTML = selectedItems.map(i => {
                total += i.price;
                return `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:10px; background:rgba(255,255,255,0.05); border-radius:8px; margin-bottom:8px; font-size:0.8rem;">
                        <span>${i.name}</span>
                        <span style="color:var(--red); cursor:pointer; font-weight:800;" onclick="removeFromCalc(${i.id})">×</span>
                    </div>
                `;
            }).join('');

            totalEl.innerText = `$${total.toLocaleString()}`;
        }

        window.onload = renderPicker;
    </script>
</body>
</html>
