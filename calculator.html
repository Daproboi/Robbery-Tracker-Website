<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Trade Calculator</title>
    <style>
        :root {
            --bg: #0a0c10; --panel: #0d1117; --card: #161b22; 
            --border: #30363d; --text-main: #f0f6fc; --text-dim: #8b949e; 
            --accent: #58a6ff; --green: #3fb950; --red: #f85149;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-top: 80px; }

        .nav-top { position: fixed; top: 0; width: 100%; height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 10px; z-index: 1000; align-items: center; }
        .nav-item { position: relative; height: 100%; display: flex; align-items: center; }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 600; padding: 8px 16px; border-radius: 8px; font-size: 0.9rem; display: flex; align-items: center; gap: 6px; }
        .nav-item:hover .nav-link { color: var(--text-main); background: #21262d; }
        
        .dropdown-content { display: none; position: absolute; top: 55px; left: 0; background: var(--panel); min-width: 180px; border: 1px solid var(--border); border-radius: 8px; z-index: 1100; }
        .nav-item:hover .dropdown-content { display: block; }
        .dropdown-content a { color: var(--text-dim); padding: 12px 16px; text-decoration: none; display: block; font-size: 0.85rem; }

        .container { max-width: 1100px; margin: auto; padding: 20px; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .side-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-height: 500px; }
        
        .side-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .total-box { font-size: 1.5rem; font-weight: 800; color: var(--accent); }

        /* --- FIXED ITEM CARD --- */
        .added-item { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 10px; 
            margin-bottom: 12px; 
            padding: 12px;
            display: flex;
            flex-direction: column; /* Stacked for safety */
            gap: 10px;
        }

        .item-main-row {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .calc-img { 
            width: 60px; 
            height: 60px; 
            background: #000; 
            border-radius: 8px; 
            object-fit: contain; 
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .item-info {
            flex-grow: 1;
        }

        .item-name { font-weight: 700; font-size: 1rem; display: block; margin-bottom: 2px; }
        .item-price { color: var(--green); font-weight: 800; font-size: 0.95rem; }

        /* Actions Row (Bottom of card) */
        .item-actions {
            display: flex;
            justify-content: space-between; /* Pushes toggle left, remove button right */
            align-items: center;
            padding-top: 10px;
            border-top: 1px solid #21262d;
        }

        .dupe-label { 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 0.8rem; 
            color: var(--text-dim); 
            cursor: pointer;
        }

        .remove-btn { 
            background: #2a1215; 
            color: #ff7b72; 
            border: 1px solid #442326; 
            padding: 5px 12px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: bold; 
            cursor: pointer; 
        }
        .remove-btn:hover { background: var(--red); color: white; }

        /* Search area */
        .add-area { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: white; }
        .search-results { position: absolute; width: 100%; background: var(--card); border: 1px solid var(--border); z-index: 10; max-height: 250px; overflow-y: auto; display: none; border-radius: 8px; margin-top: 5px;}
        .search-item { padding: 10px; cursor: pointer; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }

        /* Verdict bar */
        .verdict-card { margin-top: 30px; background: var(--card); border: 2px solid var(--border); border-radius: 15px; padding: 25px; text-align: center; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <div class="nav-item"><a href="index.html" class="nav-link">HOME</a></div>
        <div class="nav-item"><a href="tracker.html" class="nav-link">ROBBERY TRACKER</a></div>
        <div class="nav-item">
            <a href="values.html" class="nav-link">VALUES</a>
            <div class="dropdown-content">
                <a href="values.html">ITEM VALUES</a>
                <a href="calculator.html">VALUE CALCULATOR</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Trade Calculator</h1>
        <div class="calc-grid">
            <div class="side-panel">
                <div class="side-header"><span>YOUR OFFER</span><span id="total-left" class="total-box">$0</span></div>
                <div class="add-area">
                    <input type="text" placeholder="Type item name..." oninput="doSearch(this, 'left')">
                    <div id="res-left" class="search-results"></div>
                </div>
                <div id="list-left"></div>
            </div>
            <div class="side-panel">
                <div class="side-header"><span>THEIR OFFER</span><span id="total-right" class="total-box">$0</span></div>
                <div class="add-area">
                    <input type="text" placeholder="Type item name..." oninput="doSearch(this, 'right')">
                    <div id="res-right" class="search-results"></div>
                </div>
                <div id="list-right"></div>
            </div>
        </div>

        <div class="verdict-card" id="v-card">
            <h2 id="v-text">ADD ITEMS</h2>
            <p id="v-detail">Compare values to see if the trade is fair.</p>
        </div>
    </div>

    <script src="Values.js"></script>
    <script>
        let myOffer = [];
        let theirOffer = [];

        function doSearch(input, side) {
            const query = input.value.toLowerCase();
            const resDiv = document.getElementById(`res-${side}`);
            if (query.length < 1) { resDiv.style.display = 'none'; return; }

            let matches = [];
            for (let cat in db) {
                db[cat].forEach(item => {
                    if (item.name.toLowerCase().includes(query)) matches.push({...item});
                });
            }

            resDiv.innerHTML = matches.slice(0, 6).map(item => `
                <div class="search-item" onclick="addItem('${item.name.replace(/'/g, "\\'")}', '${side}')">
                    <span>${item.name}</span>
                    <span style="color:var(--green)">$${(item.cash_value || 0).toLocaleString()}</span>
                </div>
            `).join('');
            resDiv.style.display = 'block';
        }

        function addItem(name, side) {
            let itemData = null;
            for (let cat in db) {
                let found = db[cat].find(i => i.name === name);
                if (found) { itemData = JSON.parse(JSON.stringify(found)); break; }
            }

            if (itemData) {
                itemData.isDuped = false;
                itemData.uid = Date.now() + Math.random();
                if (side === 'left') myOffer.push(itemData);
                else theirOffer.push(itemData);
            }
            render();
            document.querySelectorAll('.search-results').forEach(r => r.style.display = 'none');
            document.querySelectorAll('input').forEach(i => i.value = '');
        }

        function removeItem(uid, side) {
            if (side === 'left') myOffer = myOffer.filter(i => i.uid !== uid);
            else theirOffer = theirOffer.filter(i => i.uid !== uid);
            render();
        }

        function toggleDupe(uid, side) {
            const arr = (side === 'left') ? myOffer : theirOffer;
            const item = arr.find(i => i.uid === uid);
            if (item) item.isDuped = !item.isDuped;
            render();
        }

        function render() {
            renderSide('left', myOffer);
            renderSide('right', theirOffer);
            updateVerdict();
        }

        function renderSide(side, items) {
            const container = document.getElementById(`list-${side}`);
            const totalDisplay = document.getElementById(`total-${side}`);
            let total = 0;

            container.innerHTML = items.map(item => {
                const price = item.isDuped ? (item.duped_value || item.cash_value) : item.cash_value;
                total += price;
                // Important: Uses 'image' property from your database
                const imgSrc = item.image ? item.image : ''; 

                return `
                    <div class="added-item">
                        <div class="item-main-row">
                            <img src="${imgSrc}" class="calc-img" onerror="this.src='https://via.placeholder.com/60/161b22/8b949e?text=?';">
                            <div class="item-info">
                                <span class="item-name">${item.name}</span>
                                <span class="item-price">$${price.toLocaleString()}</span>
                            </div>
                        </div>
                        <div class="item-actions">
                            <label class="dupe-label">
                                <input type="checkbox" ${item.isDuped ? 'checked' : ''} onchange="toggleDupe(${item.uid}, '${side}')"> 
                                Duped?
                            </label>
                            <button class="remove-btn" onclick="removeItem(${item.uid}, '${side}')">REMOVE</button>
                        </div>
                    </div>
                `;
            }).join('');
            totalDisplay.innerText = `$${total.toLocaleString()}`;
        }

        function updateVerdict() {
            const getVal = (i) => i.isDuped ? (i.duped_value || i.cash_value) : i.cash_value;
            const myT = myOffer.reduce((s, i) => s + getVal(i), 0);
            const thT = theirOffer.reduce((s, i) => s + getVal(i), 0);
            
            const vText = document.getElementById('v-text');
            const vDetail = document.getElementById('v-detail');
            const vCard = document.getElementById('v-card');

            if (myT === 0 && thT === 0) {
                vText.innerText = "ADD ITEMS";
                vCard.style.borderColor = "var(--border)";
                return;
            }

            const diff = thT - myT;
            if (diff > 0) {
                vText.innerText = "WIN"; vText.style.color = "var(--green)";
                vDetail.innerText = `You gain $${diff.toLocaleString()}`;
            } else if (diff < 0) {
                vText.innerText = "LOSS"; vText.style.color = "var(--red)";
                vDetail.innerText = `You lose $${Math.abs(diff).toLocaleString()}`;
            } else {
                vText.innerText = "FAIR"; vText.style.color = "var(--accent)";
                vDetail.innerText = "Values are equal";
            }
        }
    </script>
</body>
</html>
