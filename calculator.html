<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Trade Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.4);
            --green: #00ff88;
            --red: #ff3333;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 80px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 60px; z-index: 4000;
        }

        .nav-logo { font-weight: 800; font-size: 1.3rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 35px; align-items: center; }
        .nav-item { position: relative; height: 70px; display: flex; align-items: center; }
        .nav-link { 
            text-decoration: none; color: var(--text-dim); font-size: 0.85rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-link:hover, .nav-item:hover .nav-link { color: #fff; }

        .dropdown {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; min-width: 200px; padding: 10px;
            opacity: 0; pointer-events: none; transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
        }
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        
        .drop-link {
            display: flex; justify-content: space-between; padding: 12px 15px; color: var(--text-dim);
            text-decoration: none; font-size: 0.8rem; font-weight: 600; border-radius: 10px;
        }
        .drop-link:hover { background: var(--card); color: #fff; }

        /* --- TRADE HUD --- */
        .hud-wrapper {
            position: sticky; top: 70px; z-index: 2000;
            padding: 25px 60px; background: rgba(3, 5, 8, 0.7);
            backdrop-filter: blur(25px); border-bottom: 1px solid var(--border);
        }

        .trade-hud {
            max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 40px;
        }

        .hud-side { display: flex; flex-direction: column; }
        .hud-side.right { text-align: right; }
        .hud-label { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 5px; }
        .hud-value { font-family: 'JetBrains Mono'; font-size: 2.5rem; font-weight: 800; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        
        .swap-btn {
            width: 50px; height: 50px; border-radius: 50%; background: var(--card);
            border: 1px solid var(--border); color: #fff; cursor: pointer;
            font-size: 1.3rem; display: flex; align-items: center; justify-content: center;
        }
        .swap-btn:hover { border-color: var(--accent); transform: rotate(180deg) scale(1.1); box-shadow: 0 0 15px var(--accent-glow); }

        /* --- LOGS --- */
        .logs-container { max-width: 1400px; margin: 40px auto; display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 0 60px; }
        .log-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 24px; padding: 20px; min-height: 100px; }
        
        .log-entry {
            display: flex; align-items: center; gap: 15px; padding: 12px;
            background: var(--card); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 12px;
        }
        .log-img { width: 45px; height: 45px; border-radius: 10px; background: #000; }
        .log-info { flex: 1; font-weight: 700; font-size: 0.9rem; }
        .log-price { font-family: 'JetBrains Mono'; color: var(--green); font-size: 0.8rem; }
        .log-remove { cursor: pointer; opacity: 0.4; font-size: 1.5rem; padding-right: 5px; }
        .log-remove:hover { color: var(--red); opacity: 1; }

        /* --- DISCOVERY & FILTERS --- */
        .discovery-section { max-width: 1400px; margin: 80px auto; padding: 0 60px; }
        
        .search-hub {
            background: var(--surface); border: 1px solid var(--border);
            padding: 30px; border-radius: 28px; margin-bottom: 50px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }
        
        .search-input {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 20px 25px; border-radius: 16px; color: #fff; font-size: 1.1rem; margin-bottom: 25px;
        }
        .search-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px var(--accent-glow); }

        .filter-row { display: flex; gap: 12px; flex-wrap: wrap; }
        .pill {
            padding: 12px 22px; border-radius: 12px; background: var(--card);
            border: 1px solid var(--border); color: var(--text-dim);
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .pill:hover { border-color: #fff; color: #fff; }
        .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 5px 15px var(--accent-glow); }

        /* --- ITEM GRID --- */
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 24px;
            padding: 25px; display: flex; flex-direction: column; gap: 20px;
        }
        .card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.5); }
        
        .card-header { display: flex; gap: 20px; align-items: center; }
        .card-img { width: 90px; height: 90px; background: #000; border-radius: 16px; object-fit: contain; border: 1px solid var(--border); }
        .card-title h3 { margin: 0; font-size: 1.2rem; font-weight: 800; }
        
        .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; background: rgba(0,0,0,0.3); padding: 15px; border-radius: 16px; }
        .stat { display: flex; flex-direction: column; gap: 2px; }
        .stat label { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        .stat span { font-size: 0.9rem; font-family: 'JetBrains Mono'; font-weight: 700; }

        .btn-group { display: flex; gap: 12px; }
        .btn { flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 800; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; }
        .btn-o { background: var(--green); color: #000; }
        .btn-r { background: #fff; color: #000; }
        .btn:hover { transform: scale(1.03); filter: brightness(1.1); }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="robbery.html" class="nav-link">Robbery</a>
            <a href="sniper.html" class="nav-link">Sniper</a>
            <div class="nav-item">
                <a href="#" class="nav-link" style="color: #fff">Values ▼</a>
                <div class="dropdown">
                    <a href="calculator.html" class="drop-link">Value Calculator <span>→</span></a>
                    <a href="market.html" class="drop-link">Market Trends <span>→</span></a>
                    <a href="demand.html" class="drop-link">Demand List <span>→</span></a>
                </div>
            </div>
        </div>
        <div style="width: 100px;"></div>
    </nav>

    <div class="hud-wrapper">
        <div class="trade-hud">
            <div class="hud-side">
                <span class="hud-label">You Offering</span>
                <span class="hud-value" id="val-offering">$0</span>
            </div>
            <button class="swap-btn" onclick="swapSides()">⇄</button>
            <div class="hud-side right">
                <span class="hud-label">They Requesting</span>
                <span class="hud-value" id="val-requesting">$0</span>
            </div>
        </div>
    </div>

    <div class="logs-container">
        <div class="log-box" id="list-offering"></div>
        <div class="log-box" id="list-requesting"></div>
    </div>

    <div class="discovery-section">
        <div class="search-hub">
            <input type="text" id="main-search" class="search-input" placeholder="Search for vehicles, rims, or furniture..." oninput="refreshDiscovery()">
            
            <div class="filter-row">
                <div class="pill active" data-type="cat" data-value="all" onclick="updateFilter(this)">All Items</div>
                <div class="pill" data-type="cat" data-value="Vehicles" onclick="updateFilter(this)">Vehicles</div>
                <div class="pill" data-type="cat" data-value="Rims" onclick="updateFilter(this)">Rims</div>
                <div class="pill" data-type="cat" data-value="Furniture" onclick="updateFilter(this)">Furniture</div>
                
                <div style="flex: 1;"></div>

                <div class="pill active" data-type="sort" data-value="desc" onclick="updateFilter(this)">Price High</div>
                <div class="pill" data-type="sort" data-value="asc" onclick="updateFilter(this)">Price Low</div>
            </div>
        </div>

        <div class="item-grid" id="main-grid"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let offerList = [];
        let requestList = [];
        let activeCat = 'all';
        let activeSort = 'desc';

        // Fix: Unified Filter Handler
        function updateFilter(el) {
            const type = el.getAttribute('data-type');
            const val = el.getAttribute('data-value');

            // Deactivate others in the same group
            document.querySelectorAll(`.pill[data-type="${type}"]`).forEach(p => p.classList.remove('active'));
            el.classList.add('active');

            if (type === 'cat') activeCat = val;
            if (type === 'sort') activeSort = val;

            refreshDiscovery();
        }

        function refreshDiscovery() {
            const grid = document.getElementById('main-grid');
            const query = document.getElementById('main-search').value.toLowerCase();
            let pool = [];

            // 1. Build Pool
            for (let cat in db) {
                if (activeCat !== 'all' && cat !== activeCat) continue;
                db[cat].forEach(i => pool.push({...i, category: cat}));
            }

            // 2. Filter by Search
            pool = pool.filter(i => i.name.toLowerCase().includes(query));

            // 3. Sort
            if (activeSort === 'desc') pool.sort((a,b) => b.cash_value - a.cash_value);
            else pool.sort((a,b) => a.cash_value - b.cash_value);

            // 4. Render
            grid.innerHTML = pool.map(i => `
                <div class="card">
                    <div class="card-header">
                        <img src="${i.image}" class="card-img" onerror="this.src='https://via.placeholder.com/90/000/333?text=?'">
                        <div class="card-title">
                            <div style="font-size:0.65rem; color:var(--accent); font-weight:800; text-transform:uppercase; letter-spacing:1px;">${i.category}</div>
                            <h3>${i.name}</h3>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="stat"><label>Value</label><span style="color:var(--green)">$${i.cash_value.toLocaleString()}</span></div>
                        <div class="stat"><label>Demand</label><span>${i.demand || '—'}</span></div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-o" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'offer')">Offer</button>
                        <button class="btn btn-r" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'request')">Request</button>
                    </div>
                </div>
            `).join('');
        }

        function addItem(name, side) {
            let found = null;
            for(let cat in db) {
                let match = db[cat].find(i => i.name === name);
                if(match) { found = {...match, uid: Math.random()}; break; }
            }
            if(side === 'offer') offerList.push(found);
            else requestList.push(found);
            updateUI();
        }

        function removeItem(uid, side) {
            if(side === 'offer') offerList = offerList.filter(i => i.uid !== uid);
            else requestList = requestList.filter(i => i.uid !== uid);
            updateUI();
        }

        function swapSides() {
            [offerList, requestList] = [requestList, offerList];
            updateUI();
        }

        function updateUI() {
            const render = (list, id, side) => {
                document.getElementById(id).innerHTML = list.map(i => `
                    <div class="log-entry">
                        <img src="${i.image}" class="log-img" onerror="this.src='https://via.placeholder.com/45/000/333?text=?'">
                        <div class="log-info">${i.name}<br><span class="log-price">$${i.cash_value.toLocaleString()}</span></div>
                        <div class="log-remove" onclick="removeItem(${i.uid}, '${side}')">×</div>
                    </div>
                `).join('');
            };
            render(offerList, 'list-offering', 'offer');
            render(requestList, 'list-requesting', 'request');
            
            const total = list => list.reduce((a, b) => a + b.cash_value, 0);
            document.getElementById('val-offering').innerText = `$${total(offerList).toLocaleString()}`;
            document.getElementById('val-requesting').innerText = `$${total(requestList).toLocaleString()}`;
        }

        window.onload = refreshDiscovery;
    </script>
</body>
</html>
