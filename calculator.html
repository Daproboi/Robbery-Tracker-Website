HTML
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #05070a;
            --surface: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --accent: #58a6ff;
            --green: #238636;
            --red: #da3633;
            --text-main: #f0f6fc;
            --text-dim: #8b949e;
            --glow: 0 0 20px rgba(88, 166, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 80px; line-height: 1.5;
            overflow-x: hidden;
        }

        /* --- NAVIGATION --- */
        .nav-top { 
            position: fixed; top: 0; width: 100%; height: 70px; 
            background: rgba(13, 17, 23, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; padding: 0 40px; z-index: 3000; box-sizing: border-box;
        }
        .nav-logo { font-weight: 800; font-size: 1.4rem; color: #fff; text-decoration: none; display: flex; align-items: center; gap: 8px; }
        .nav-logo span { color: var(--accent); }
        .nav-center { display: flex; gap: 30px; position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .nav-link:hover { color: var(--accent); }

        .container { max-width: 1400px; margin: auto; padding: 0 30px; }

        /* --- THE COMMAND HUD --- */
        .trade-hud {
            position: sticky; top: 90px; z-index: 2000;
            background: rgba(13, 17, 23, 0.95); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 16px; padding: 25px; 
            margin-bottom: 40px; box-shadow: var(--glow); 
            display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; gap: 40px;
        }

        .hud-side { display: flex; flex-direction: column; gap: 5px; }
        .hud-label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .hud-value { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 800; color: var(--accent); }
        .hud-stats { display: flex; gap: 20px; font-size: 0.75rem; border-top: 1px solid var(--border); padding-top: 10px; margin-top: 5px; }
        .stat-item b { color: var(--text-main); }

        .hud-center { text-align: center; }
        .swap-circle { 
            width: 50px; height: 50px; border-radius: 50%; background: var(--card); 
            border: 1px solid var(--border); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; transition: 0.3s; font-size: 1.2rem;
        }
        .swap-circle:hover { border-color: var(--accent); transform: rotate(180deg); box-shadow: 0 0 15px rgba(88, 166, 255, 0.3); }

        /* --- LOG ENTRIES --- */
        .trade-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 60px; }
        .log-box { display: flex; flex-direction: column; gap: 10px; min-height: 50px; }
        .log-entry { 
            display: flex; align-items: center; gap: 15px; background: var(--card); 
            padding: 12px 18px; border-radius: 12px; border: 1px solid var(--border);
            animation: slideIn 0.3s ease-out;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .log-img { width: 45px; height: 45px; object-fit: contain; border-radius: 8px; background: #000; border: 1px solid var(--border); }
        .log-info { flex: 1; }
        .log-info h4 { margin: 0; font-size: 0.9rem; font-weight: 700; }
        .log-info p { margin: 0; font-size: 0.8rem; color: var(--green); font-family: 'JetBrains Mono'; }
        
        .remove-btn { color: var(--text-dim); cursor: pointer; font-size: 1.2rem; border: none; background: none; padding: 0 5px; transition: 0.2s; }
        .remove-btn:hover { color: var(--red); }

        /* --- COMMAND BAR FILTERS --- */
        .section-title { font-size: 1.1rem; font-weight: 800; margin-bottom: 20px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 15px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .filter-hud { 
            background: rgba(13, 17, 23, 0.6); backdrop-filter: blur(10px);
            border: 1px solid var(--border); padding: 10px; border-radius: 14px;
            display: flex; gap: 10px; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .search-wrap { flex: 3; position: relative; display: flex; align-items: center; }
        .search-input { 
            width: 100%; background: rgba(5, 7, 10, 0.8); border: 1px solid var(--border); 
            padding: 14px 20px 14px 45px; border-radius: 10px; color: #fff; font-size: 0.95rem; transition: 0.3s;
        }
        .search-wrap::before { content: "🔍"; position: absolute; left: 18px; font-size: 0.9rem; opacity: 0.4; }
        .search-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 15px rgba(88, 166, 255, 0.1); }

        .select-box { flex: 1; position: relative; }
        select { 
            width: 100%; appearance: none; background: rgba(22, 27, 34, 0.8); border: 1px solid var(--border); 
            color: var(--text-dim); padding: 0 15px; height: 100%; border-radius: 10px; cursor: pointer; 
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        select:hover { border-color: var(--text-dim); color: #fff; }
        .select-box::after { content: "▼"; font-size: 0.5rem; position: absolute; right: 15px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0.5; }

        /* --- ITEM CARDS --- */
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 25px; padding-bottom: 100px; }
        .item-card { 
            background: var(--surface); border: 1px solid var(--border); border-radius: 16px; 
            padding: 20px; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative; overflow: hidden;
        }
        .item-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        .card-top { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 20px; }
        .card-img { width: 90px; height: 90px; background: #000; border-radius: 12px; object-fit: contain; border: 1px solid var(--border); }
        .card-meta h3 { margin: 0 0 5px 0; font-size: 1.1rem; font-weight: 800; color: #fff; }
        .type-tag { font-size: 0.6rem; color: var(--accent); font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }

        .card-data { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; margin-bottom: 20px;
        }
        .data-pt span { display: block; font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 2px; }
        .data-pt b { font-size: 0.85rem; color: #fff; }
        .val-glow { color: var(--green) !important; font-family: 'JetBrains Mono'; }

        .card-actions { display: flex; gap: 10px; }
        .btn-main { 
            flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: 800; 
            font-size: 0.7rem; text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .btn-offer { background: var(--green); color: #fff; }
        .btn-request { background: var(--card); color: #adbac7; border: 1px solid var(--border); }
        .btn-offer:hover { filter: brightness(1.2); transform: scale(1.02); }
        .btn-request:hover { background: var(--border); color: #fff; }

        .badge-lim { position: absolute; top: 12px; right: 12px; background: #f2a600; color: #000; padding: 3px 8px; border-radius: 5px; font-size: 0.6rem; font-weight: 900; }
        
        .dupe-check { display: flex; align-items: center; gap: 6px; cursor: pointer; font-size: 0.7rem; color: var(--text-dim); font-weight: 600; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-center">
            <a href="index.html" class="nav-link">HOME</a>
            <a href="tracker.html" class="nav-link">TRACKER</a>
            <a href="calculator.html" class="nav-link" style="color: var(--accent)">CALCULATOR</a>
        </div>
    </nav>

    <div class="container">
        
        <div class="trade-hud">
            <div class="hud-side">
                <span class="hud-label">You Offering</span>
                <span class="hud-value" id="total-offering">$0</span>
                <div class="hud-stats">
                    <span class="stat-item">Items: <b id="count-offering">0</b></span>
                    <span class="stat-item">Clean: <b id="clean-offering">$0</b></span>
                </div>
            </div>

            <div class="hud-center">
                <button class="swap-circle" onclick="swapSides()" title="Swap Sides">⇄</button>
                <div style="margin-top:12px; cursor:pointer; color:var(--red); font-size:0.65rem; font-weight:800; letter-spacing:1px;" onclick="clearAll()">RESET SYSTEM</div>
            </div>

            <div class="hud-side" style="text-align: right;">
                <span class="hud-label">Their Requesting</span>
                <span class="hud-value" id="total-requesting">$0</span>
                <div class="hud-stats" style="justify-content: flex-end;">
                    <span class="stat-item">Items: <b id="count-requesting">0</b></span>
                    <span class="stat-item">Clean: <b id="clean-requesting">$0</b></span>
                </div>
            </div>
        </div>

        <div class="trade-columns">
            <div id="list-offering" class="log-box"></div>
            <div id="list-requesting" class="log-box"></div>
        </div>

        <div class="section-title">Market Database</div>
        
        <div class="filter-hud">
            <div class="search-wrap">
                <input type="text" id="search-input" class="search-input" placeholder="Search by item name..." oninput="updateDiscovery()">
            </div>
            
            <div class="select-box">
                <select id="sort-value" onchange="updateDiscovery()">
                    <option value="cash-high">Price: High to Low</option>
                    <option value="cash-low">Price: Low to High</option>
                    <option value="name-az">Name: A - Z</option>
                </select>
            </div>

            <div class="select-box">
                <select id="filter-cat" onchange="updateDiscovery()">
                    <option value="all">Category: All</option>
                    <option value="Vehicles">Vehicles</option>
                    <option value="Rims">Rims</option>
                    <option value="Furniture">Furniture</option>
                </select>
            </div>
        </div>

        <div class="item-grid" id="discovery-grid"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let offering = [];
        let requesting = [];

        function updateDiscovery() {
            const grid = document.getElementById('discovery-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            const valSort = document.getElementById('sort-value').value;
            const catFilter = document.getElementById('filter-cat').value;

            let items = [];
            for (let cat in db) {
                if (catFilter !== 'all' && cat !== catFilter) continue;
                db[cat].forEach(i => items.push({...i, category: cat}));
            }

            items = items.filter(i => i.name.toLowerCase().includes(search));

            if (valSort === 'cash-high') items.sort((a,b) => b.cash_value - a.cash_value);
            if (valSort === 'cash-low') items.sort((a,b) => a.cash_value - b.cash_value);
            if (valSort === 'name-az') items.sort((a,b) => a.name.localeCompare(b.name));

            grid.innerHTML = items.map(i => `
                <div class="item-card">
                    ${i.limited ? '<div class="badge-lim">LIMITED</div>' : ''}
                    <div class="card-top">
                        <img src="${i.image}" class="card-img" onerror="this.src='https://via.placeholder.com/90/000/333?text=?'">
                        <div class="card-meta">
                            <span class="type-tag">${i.category}</span>
                            <h3>${i.name}</h3>
                        </div>
                    </div>
                    
                    <div class="card-data">
                        <div class="data-pt"><span>Value</span><b class="val-glow">$${i.cash_value.toLocaleString()}</b></div>
                        <div class="data-pt"><span>Dupe</span><b>$${(i.duped_value || 0).toLocaleString()}</b></div>
                        <div class="data-pt"><span>Demand</span><b>${i.demand || '—'}</b></div>
                        <div class="data-pt"><span>Trend</span><b>${i.trend || 'Stable'}</b></div>
                    </div>

                    <div class="card-actions">
                        <button class="btn-main btn-offer" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'offering')">Offer</button>
                        <button class="btn-main btn-request" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'requesting')">Request</button>
                    </div>
                </div>
            `).join('');
        }

        function addItem(name, side) {
            let item = null;
            for (let cat in db) {
                let found = db[cat].find(i => i.name === name);
                if (found) { item = {...found, uid: Math.random(), isDuped: false}; break; }
            }
            if (side === 'offering') offering.push(item);
            else requesting.push(item);
            renderLogs();
        }

        function toggleDupe(uid, side) {
            const list = (side === 'offering') ? offering : requesting;
            const item = list.find(i => i.uid === uid);
            if (item) item.isDuped = !item.isDuped;
            renderLogs();
        }

        function removeItem(uid, side) {
            if (side === 'offering') offering = offering.filter(i => i.uid !== uid);
            else requesting = requesting.filter(i => i.uid !== uid);
            renderLogs();
        }

        function swapSides() {
            [offering, requesting] = [requesting, offering];
            renderLogs();
        }

        function clearAll() {
            if(confirm("Clear current trade session?")) {
                offering = []; requesting = [];
                renderLogs();
            }
        }

        function renderLogs() {
            updateColumn('offering', offering);
            updateColumn('requesting', requesting);
        }

        function updateColumn(side, items) {
            const list = document.getElementById(`list-${side}`);
            let total = 0, cleanT = 0;

            list.innerHTML = items.map(i => {
                const val = i.isDuped ? (i.duped_value || i.cash_value) : i.cash_value;
                total += val;
                if (!i.isDuped) cleanT += val;

                return `
                <div class="log-entry">
                    <img src="${i.image}" class="log-img" onerror="this.src='https://via.placeholder.com/45/000/333?text=?'">
                    <div class="log-info">
                        <h4>${i.name}</h4>
                        <p>$${val.toLocaleString()}</p>
                    </div>
                    <label class="dupe-check">
                        <input type="checkbox" ${i.isDuped ? 'checked' : ''} onchange="toggleDupe(${i.uid}, '${side}')"> Duped
                    </label>
                    <button class="remove-btn" onclick="removeItem(${i.uid}, '${side}')">×</button>
                </div>`;
            }).join('');

            document.getElementById(`total-${side}`).innerText = `$${total.toLocaleString()}`;
            document.getElementById(`count-${side}`).innerText = items.length;
            document.getElementById(`clean-${side}`).innerText = `$${cleanT.toLocaleString()}`;
        }

        window.onload = updateDiscovery;
    </script>
</body>
</html>
