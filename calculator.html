<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Professional Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.06);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.4);
            --green: #00ff88;
            --red: #ff3333;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px; padding-bottom: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
        }

        /* --- RESTORED NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.8); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 4000;
        }

        .nav-logo { font-weight: 800; font-size: 1.2rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 30px; align-items: center; }
        .nav-item { position: relative; }
        .nav-link { 
            text-decoration: none; color: var(--text-dim); font-size: 0.8rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .nav-link:hover, .nav-link.active { color: #fff; }

        /* Dropdown Logic */
        .dropdown {
            position: absolute; top: 100%; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; min-width: 160px; padding: 10px;
            opacity: 0; pointer-events: none; transition: 0.3s;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        .drop-link {
            display: block; padding: 10px; color: var(--text-dim);
            text-decoration: none; font-size: 0.75rem; font-weight: 600; border-radius: 8px;
        }
        .drop-link:hover { background: var(--card); color: var(--accent); }

        /* --- THE COMMAND CENTER (HUD) --- */
        .hud-wrapper {
            position: sticky; top: 70px; z-index: 2000;
            padding: 20px 40px; background: rgba(3, 5, 8, 0.6);
            backdrop-filter: blur(25px); border-bottom: 1px solid var(--border);
        }

        .trade-hud {
            max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; gap: 60px;
        }

        .hud-side { display: flex; flex-direction: column; }
        .hud-side.right { text-align: right; }
        .hud-label { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .hud-value { font-family: 'JetBrains Mono'; font-size: 2.2rem; font-weight: 800; color: var(--accent); }
        
        .swap-btn {
            width: 50px; height: 50px; border-radius: 50%; background: var(--card);
            border: 1px solid var(--border); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.2rem;
        }
        .swap-btn:hover { border-color: var(--accent); transform: rotate(180deg); }

        /* --- LOGS --- */
        .logs-container {
            max-width: 1400px; margin: 30px auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; padding: 0 40px;
        }
        .log-box { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 20px; padding: 15px; min-height: 80px; }
        
        .log-entry {
            display: flex; align-items: center; gap: 12px; padding: 10px;
            background: var(--card); border-radius: 12px; border: 1px solid var(--border); margin-bottom: 10px;
        }
        .log-img { width: 40px; height: 40px; border-radius: 8px; }
        .log-info { flex: 1; font-weight: 700; font-size: 0.85rem; }
        .log-price { font-family: 'JetBrains Mono'; color: var(--green); font-size: 0.75rem; }
        .log-remove { cursor: pointer; opacity: 0.5; font-size: 1.2rem; }
        .log-remove:hover { color: var(--red); opacity: 1; }

        /* --- DATABASE & FILTERS --- */
        .discovery-section { max-width: 1400px; margin: 60px auto; padding: 0 40px; }
        .search-hub {
            background: var(--surface); border: 1px solid var(--border);
            padding: 25px; border-radius: 24px; margin-bottom: 40px;
        }
        .search-input {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 18px 25px; border-radius: 14px; color: #fff; font-size: 1rem; margin-bottom: 20px;
        }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .pill {
            padding: 10px 18px; border-radius: 10px; background: var(--card);
            border: 1px solid var(--border); color: var(--text-dim);
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* --- ITEM GRID --- */
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; display: flex; flex-direction: column; gap: 15px;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .card-header { display: flex; gap: 15px; align-items: center; }
        .card-img { width: 80px; height: 80px; background: #000; border-radius: 12px; object-fit: contain; }
        .card-title h3 { margin: 0; font-size: 1.1rem; }
        
        .card-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: rgba(0,0,0,0.2); padding: 12px; border-radius: 12px; }
        .stat { display: flex; flex-direction: column; }
        .stat label { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; font-weight: 800; }
        .stat span { font-size: 0.8rem; font-family: 'JetBrains Mono'; }

        .btn-group { display: flex; gap: 10px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 800; font-size: 0.7rem; cursor: pointer; text-transform: uppercase; }
        .btn-o { background: var(--green); color: #000; }
        .btn-r { background: #fff; color: #000; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <a href="robbery.html" class="nav-link">Robbery</a>
            <a href="sniper.html" class="nav-link">Sniper</a>
            <div class="nav-item">
                <a href="#" class="nav-link active">Values ▼</a>
                <div class="dropdown">
                    <a href="calculator.html" class="drop-link">Value Calculator</a>
                    <a href="market.html" class="drop-link">Market Trends</a>
                    <a href="demand.html" class="drop-link">Demand List</a>
                </div>
            </div>
        </div>
        <div style="width: 100px;"></div> </nav>

    <div class="hud-wrapper">
        <div class="trade-hud">
            <div class="hud-side">
                <span class="hud-label">You Offering</span>
                <span class="hud-value" id="val-offering">$0</span>
            </div>
            <button class="swap-btn" onclick="swapSides()">⇄</button>
            <div class="hud-side right">
                <span class="hud-label">They Requesting</span>
                <span class="hud-value" id="val-requesting">$0</span>
            </div>
        </div>
    </div>

    <div class="logs-container">
        <div class="log-box" id="list-offering"></div>
        <div class="log-box" id="list-requesting"></div>
    </div>

    <div class="discovery-section">
        <div class="search-hub">
            <input type="text" id="main-search" class="search-input" placeholder="Search market items..." oninput="refreshDiscovery()">
            <div class="filter-row">
                <div class="pill active" onclick="setCat('all', this)">All</div>
                <div class="pill" onclick="setCat('Vehicles', this)">Vehicles</div>
                <div class="pill" onclick="setCat('Rims', this)">Rims</div>
                <div class="pill" onclick="setSort('desc', this)">Value High</div>
                <div class="pill" onclick="setSort('asc', this)">Value Low</div>
            </div>
        </div>

        <div class="item-grid" id="main-grid"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let offerList = [];
        let requestList = [];
        let activeCat = 'all';
        let activeSort = 'desc';

        function refreshDiscovery() {
            const grid = document.getElementById('main-grid');
            const query = document.getElementById('main-search').value.toLowerCase();
            let pool = [];

            for (let cat in db) {
                if (activeCat !== 'all' && cat !== activeCat) continue;
                db[cat].forEach(i => pool.push({...i, category: cat}));
            }

            pool = pool.filter(i => i.name.toLowerCase().includes(query));
            if (activeSort === 'desc') pool.sort((a,b) => b.cash_value - a.cash_value);
            else pool.sort((a,b) => a.cash_value - b.cash_value);

            grid.innerHTML = pool.map(i => `
                <div class="card">
                    <div class="card-header">
                        <img src="${i.image}" class="card-img">
                        <div class="card-title">
                            <div style="font-size:0.6rem; color:var(--accent); font-weight:800;">${i.category}</div>
                            <h3>${i.name}</h3>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="stat"><label>Value</label><span>$${i.cash_value.toLocaleString()}</span></div>
                        <div class="stat"><label>Demand</label><span>${i.demand || '—'}</span></div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-o" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'offer')">Offer</button>
                        <button class="btn btn-r" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'request')">Request</button>
                    </div>
                </div>
            `).join('');
        }

        function addItem(name, side) {
            let found = null;
            for(let cat in db) {
                let match = db[cat].find(i => i.name === name);
                if(match) { found = {...match, uid: Math.random()}; break; }
            }
            if(side === 'offer') offerList.push(found);
            else requestList.push(found);
            updateUI();
        }

        function removeItem(uid, side) {
            if(side === 'offer') offerList = offerList.filter(i => i.uid !== uid);
            else requestList = requestList.filter(i => i.uid !== uid);
            updateUI();
        }

        function swapSides() {
            [offerList, requestList] = [requestList, offerList];
            updateUI();
        }

        function updateUI() {
            const render = (list, id, side) => {
                document.getElementById(id).innerHTML = list.map(i => `
                    <div class="log-entry">
                        <img src="${i.image}" class="log-img">
                        <div class="log-info">${i.name}<br><span class="log-price">$${i.cash_value.toLocaleString()}</span></div>
                        <div class="log-remove" onclick="removeItem(${i.uid}, '${side}')">×</div>
                    </div>
                `).join('');
            };
            render(offerList, 'list-offering', 'offer');
            render(requestList, 'list-requesting', 'request');
            
            const total = list => list.reduce((a, b) => a + b.cash_value, 0);
            document.getElementById('val-offering').innerText = `$${total(offerList).toLocaleString()}`;
            document.getElementById('val-requesting').innerText = `$${total(requestList).toLocaleString()}`;
        }

        function setCat(cat, el) {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active'); activeCat = cat; refreshDiscovery();
        }
        function setSort(sort, el) {
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active'); activeSort = sort; refreshDiscovery();
        }

        window.onload = refreshDiscovery;
    </script>
</body>
</html>
