<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <style>
        :root {
            --bg: #010409;
            --panel: #0d1117;
            --card: #161b22;
            --border: #30363d;
            --text-main: #e6edf3;
            --text-dim: #7d8590;
            --accent: #2f81f7;
            --green: #238636;
            --red: #da3633;
            --orange: #d29922;
            --shadow: 0 8px 24px rgba(0,0,0,0.5);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; 
            background: var(--bg); color: var(--text-main); margin: 0; 
            padding-top: 80px; scroll-behavior: smooth;
        }

        /* --- NAVIGATION --- */
        .nav-top { 
            position: fixed; top: 0; width: 100%; height: 65px; 
            background: rgba(13, 17, 23, 0.8); backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border); display: flex; 
            align-items: center; padding: 0 30px; z-index: 2000; 
            justify-content: space-between; box-sizing: border-box;
        }
        .nav-left { font-weight: 800; color: var(--accent); font-size: 1.3rem; letter-spacing: -0.5px; }
        .nav-center { display: flex; gap: 25px; position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.2s; }
        .nav-link:hover { color: var(--accent); }

        .container { max-width: 1400px; margin: auto; padding: 0 20px; }

        /* --- STICKY CALCULATOR SECTION --- */
        .sticky-calc {
            position: sticky; top: 80px; z-index: 1000;
            background: var(--bg); padding-bottom: 20px;
        }

        .trade-header { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }
        .action-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text-main); 
            padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; 
            font-weight: 700; transition: 0.2s; box-shadow: var(--shadow);
        }
        .action-btn:hover { background: #21262d; border-color: var(--text-dim); }

        .calculator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .log-column { 
            background: var(--panel); border: 1px solid var(--border); 
            border-radius: 12px; padding: 20px; box-shadow: var(--shadow);
        }
        .log-title { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .log-title h2 { margin: 0; font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
        .total-display { font-size: 1.6rem; font-weight: 800; color: var(--accent); font-family: 'Roboto Mono', monospace; }

        .stats-bar { display: flex; gap: 25px; margin-bottom: 15px; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
        .stat-val { color: var(--text-main); font-size: 0.85rem; }

        /* --- LIST ENTRIES --- */
        .log-item { 
            display: flex; align-items: center; gap: 12px; padding: 10px; 
            background: #161b22; border-radius: 8px; margin-bottom: 8px; 
            border: 1px solid transparent; transition: 0.2s;
        }
        .log-item:hover { border-color: var(--border); background: #1c2128; }
        .log-item img { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; }
        .log-item-info { flex: 1; font-size: 0.85rem; font-weight: 600; }
        .log-item-info small { color: var(--green); font-family: monospace; font-size: 0.9rem; }
        .remove-log { color: var(--text-dim); cursor: pointer; font-size: 1.2rem; transition: 0.2s; padding: 0 10px; }
        .remove-log:hover { color: var(--red); }

        /* --- DISCOVERY FILTERS --- */
        .filter-section { margin-top: 40px; }
        .filter-bar { 
            display: flex; gap: 15px; background: var(--panel); 
            padding: 20px; border-radius: 12px; border: 1px solid var(--border); 
            margin-bottom: 30px; align-items: center;
        }
        .filter-group { display: flex; flex-direction: column; gap: 8px; flex: 1; }
        .filter-group label { font-size: 0.65rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        
        select, .search-input { 
            background: var(--bg); border: 1px solid var(--border); color: white; 
            padding: 12px; border-radius: 8px; font-size: 0.9rem; outline: none;
        }
        select:focus, .search-input:focus { border-color: var(--accent); }

        /* --- ITEM GRID --- */
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .item-card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px; 
            padding: 16px; display: flex; flex-direction: column; gap: 15px; 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: relative; overflow: hidden;
        }
        .item-card:hover { 
            transform: translateY(-5px); border-color: #444c56; 
            box-shadow: 0 12px 40px rgba(0,0,0,0.6);
        }
        
        .card-header { display: flex; gap: 15px; align-items: center; }
        .card-img { 
            width: 85px; height: 85px; object-fit: contain; 
            background: radial-gradient(circle, #1c2128 0%, #0d1117 100%); 
            border-radius: 10px; border: 1px solid var(--border); 
        }
        .card-title-area h3 { margin: 0; font-size: 1.1rem; font-weight: 800; color: #fff; }
        .cat-badge { font-size: 0.6rem; color: var(--accent); font-weight: 700; text-transform: uppercase; }

        .metrics-container { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px; 
            background: rgba(1, 4, 9, 0.4); padding: 12px; border-radius: 8px;
        }
        .m-box { display: flex; flex-direction: column; gap: 2px; }
        .m-lbl { font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .m-v { font-size: 0.85rem; font-weight: 700; color: #f0f6fc; }
        .m-v.cash { color: #3fb950; font-family: monospace; }

        /* --- BUTTONS --- */
        .card-btns { display: flex; gap: 10px; }
        .btn { 
            flex: 1; padding: 12px; border-radius: 8px; font-size: 0.75rem; 
            font-weight: 800; cursor: pointer; text-transform: uppercase; 
            border: 1px solid transparent; transition: 0.2s;
        }
        .btn-o { background: var(--green); color: white; }
        .btn-o:hover { background: #2ea043; transform: scale(1.02); }
        .btn-r { background: #21262d; color: var(--text-main); border-color: var(--border); }
        .btn-r:hover { background: #30363d; border-color: #8b949e; }

        /* Flags */
        .f-tag { position: absolute; top: 10px; right: 10px; font-size: 0.6rem; padding: 4px 8px; border-radius: 20px; font-weight: 900; }
        .f-lim { background: #f2a600; color: #000; box-shadow: 0 0 10px rgba(242,166,0,0.3); }

    </style>
</head>
<body>

    <nav class="nav-top">
        <div class="nav-left">Jailbreak Hub</div>
        <div class="nav-center">
            <a href="index.html" class="nav-link">HOME</a>
            <a href="tracker.html" class="nav-link">TRACKER</a>
            <a href="values.html" class="nav-link" style="color:var(--accent)">VALUE CALCULATOR</a>
        </div>
        <div></div>
    </nav>

    <div class="container">
        
        <div class="sticky-calc">
            <div class="trade-header">
                <button class="action-btn" onclick="swapSides()">⇄ SWAP SIDES</button>
                <button class="action-btn" onclick="clearAll()" style="color:var(--red)">RESET</button>
            </div>

            <div class="calculator-grid">
                <div class="log-column">
                    <div class="log-title">
                        <h2>OFFERING</h2>
                        <span class="total-display" id="total-offering">$0</span>
                    </div>
                    <div class="stats-bar">
                        <span>Items: <span class="stat-val" id="count-offering">0</span></span>
                        <span>Clean: <span class="stat-val" id="clean-offering" style="color:var(--green)">$0</span></span>
                        <span>Duped: <span class="stat-val" id="dupe-offering" style="color:var(--red)">$0</span></span>
                    </div>
                    <div id="list-offering"></div>
                </div>

                <div class="log-column">
                    <div class="log-title">
                        <h2>REQUESTING</h2>
                        <span class="total-display" id="total-requesting">$0</span>
                    </div>
                    <div class="stats-bar">
                        <span>Items: <span class="stat-val" id="count-requesting">0</span></span>
                        <span>Clean: <span class="stat-val" id="clean-requesting" style="color:var(--green)">$0</span></span>
                        <span>Duped: <span class="stat-val" id="dupe-requesting" style="color:var(--red)">$0</span></span>
                    </div>
                    <div id="list-requesting"></div>
                </div>
            </div>
        </div>

        <section class="filter-section">
            <div class="filter-bar">
                <div class="filter-group" style="flex: 2;">
                    <label>Search Database</label>
                    <input type="text" id="search-input" class="search-input" placeholder="Search by item name..." oninput="updateDiscovery()">
                </div>
                <div class="filter-group">
                    <label>Value Order</label>
                    <select id="sort-value" onchange="updateDiscovery()">
                        <option value="cash-high">Highest Value</option>
                        <option value="cash-low">Lowest Value</option>
                        <option value="dupe-high">Highest Dupe</option>
                        <option value="random">Shuffle</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Category</label>
                    <select id="filter-cat" onchange="updateDiscovery()">
                        <option value="all">All Items</option>
                        <option value="Vehicles">Vehicles</option>
                        <option value="Rims">Rims</option>
                    </select>
                </div>
            </div>

            <div class="item-grid" id="discovery-grid"></div>
        </section>
    </div>

    <script src="Values.js"></script>
    <script>
        let offering = [];
        let requesting = [];

        function updateDiscovery() {
            const grid = document.getElementById('discovery-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            const valSort = document.getElementById('sort-value').value;
            const catFilter = document.getElementById('filter-cat').value;

            let items = [];
            for (let cat in db) {
                if (catFilter !== 'all' && cat !== catFilter) continue;
                db[cat].forEach(i => items.push({...i, category: cat}));
            }

            items = items.filter(i => i.name.toLowerCase().includes(search));

            if (valSort === 'cash-high') items.sort((a,b) => b.cash_value - a.cash_value);
            if (valSort === 'cash-low') items.sort((a,b) => a.cash_value - b.cash_value);
            if (valSort === 'dupe-high') items.sort((a,b) => (b.duped_value || 0) - (a.duped_value || 0));
            if (valSort === 'random') items.sort(() => Math.random() - 0.5);

            grid.innerHTML = items.map(i => `
                <div class="item-card">
                    ${i.limited ? '<div class="f-tag f-lim">LIMITED</div>' : ''}
                    <div class="card-header">
                        <img src="${i.image}" class="card-img" onerror="this.src='https://via.placeholder.com/85/161b22/8b949e?text=?'">
                        <div class="card-title-area">
                            <span class="cat-badge">${i.category}</span>
                            <h3>${i.name}</h3>
                        </div>
                    </div>
                    
                    <div class="metrics-container">
                        <div class="m-box"><span class="m-lbl">Clean Value</span><span class="m-v cash">$${i.cash_value.toLocaleString()}</span></div>
                        <div class="m-box"><span class="m-lbl">Dupe Value</span><span class="m-v">$${(i.duped_value || 0).toLocaleString()}</span></div>
                        <div class="m-box"><span class="m-lbl">Demand</span><span class="m-v">${i.demand || '—'}</span></div>
                        <div class="m-box"><span class="m-lbl">Trend</span><span class="m-v">${i.trend || '—'}</span></div>
                    </div>

                    <div class="card-btns">
                        <button class="btn btn-o" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'offering')">Offer</button>
                        <button class="btn btn-r" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'requesting')">Request</button>
                    </div>
                </div>
            `).join('');
        }

        function addItem(name, side) {
            let item = null;
            for (let cat in db) {
                let found = db[cat].find(i => i.name === name);
                if (found) { item = {...found, uid: Math.random(), isDuped: false}; break; }
            }
            if (side === 'offering') offering.push(item);
            else requesting.push(item);
            renderLogs();
        }

        function toggleDupe(uid, side) {
            const list = (side === 'offering') ? offering : requesting;
            const item = list.find(i => i.uid === uid);
            if (item) item.isDuped = !item.isDuped;
            renderLogs();
        }

        function removeItem(uid, side) {
            if (side === 'offering') offering = offering.filter(i => i.uid !== uid);
            else requesting = requesting.filter(i => i.uid !== uid);
            renderLogs();
        }

        function swapSides() {
            [offering, requesting] = [requesting, offering];
            renderLogs();
        }

        function clearAll() {
            offering = []; requesting = [];
            renderLogs();
        }

        function renderLogs() {
            updateColumn('offering', offering);
            updateColumn('requesting', requesting);
        }

        function updateColumn(side, items) {
            const list = document.getElementById(`list-${side}`);
            let total = 0, cleanT = 0, dupeT = 0;

            list.innerHTML = items.map(i => {
                const val = i.isDuped ? (i.duped_value || i.cash_value) : i.cash_value;
                total += val;
                if (i.isDuped) dupeT += val; else cleanT += val;

                return `
                <div class="log-item">
                    <img src="${i.image}" onerror="this.src='https://via.placeholder.com/40/161b22/8b949e?text=?'">
                    <div class="log-item-info">
                        ${i.name} <br>
                        <small>$${val.toLocaleString()}</small>
                        <input type="checkbox" style="margin-left:8px" ${i.isDuped ? 'checked' : ''} onchange="toggleDupe(${i.uid}, '${side}')">
                    </div>
                    <span class="remove-log" onclick="removeItem(${i.uid}, '${side}')">×</span>
                </div>`;
            }).join('');

            document.getElementById(`total-${side}`).innerText = `$${total.toLocaleString()}`;
            document.getElementById(`count-${side}`).innerText = items.length;
            document.getElementById(`clean-${side}`).innerText = `$${cleanT.toLocaleString()}`;
            document.getElementById(`dupe-${side}`).innerText = `$${dupeT.toLocaleString()}`;
        }

        window.onload = updateDiscovery;
    </script>
</body>
</html>
