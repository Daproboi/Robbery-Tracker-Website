<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.1);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            min-height: 100vh;
        }

        /* --- RESTORED NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }
        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-item { position: relative; height: 70px; display: flex; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .nav-link:hover, .nav-item:hover .nav-link { color: #fff; }

        .dropdown {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; min-width: 220px; padding: 10px;
            opacity: 0; pointer-events: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 6000;
        }
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        .drop-link { display: flex; flex-direction: column; padding: 12px; color: var(--text-dim); text-decoration: none; font-size: 0.75rem; border-radius: 8px; font-weight: 600; margin-bottom: 4px; }
        .drop-link:hover { background: var(--card); color: #fff; }

        /* --- CALCULATOR UI --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px; }

        .result-panel {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 30px; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 90px; z-index: 4000;
        }

        .status-big { font-weight: 900; font-size: 2rem; font-style: italic; text-transform: uppercase; }
        .diff-big { font-family: 'JetBrains Mono'; color: var(--text-dim); font-size: 1.1rem; }

        .btn-group { display: flex; gap: 12px; }
        .control-btn { 
            background: var(--card); border: 1px solid var(--border); color: white;
            padding: 15px 25px; border-radius: 12px; cursor: pointer; font-weight: 800; text-transform: uppercase;
        }
        .control-btn:hover { background: var(--accent); }

        /* --- ITEM SECTIONS --- */
        .trade-zone { display: flex; flex-direction: column; gap: 50px; padding-bottom: 100px; }
        
        .side-header { 
            display: flex; justify-content: space-between; align-items: flex-end; 
            border-bottom: 3px solid var(--border); padding-bottom: 15px;
        }
        .side-title { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .side-val { font-family: 'JetBrains Mono'; font-size: 2.5rem; color: var(--green); font-weight: 800; }

        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; margin-top: 25px;
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 24px; position: relative; overflow: hidden;
        }

        .img-container {
            width: 100%; height: 220px; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .img-container img { width: 85%; height: 85%; object-fit: contain; }

        .card-details { padding: 20px; }
        .card-cat { color: var(--accent); font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        .card-name { font-size: 1.3rem; font-weight: 800; margin: 5px 0 15px 0; }
        
        .val-row {
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .val-label { font-size: 0.65rem; color: var(--text-dim); font-weight: 800; }
        .val-num { font-family: 'JetBrains Mono'; color: var(--green); font-weight: 800; font-size: 1.1rem; }

        .remove-icon {
            position: absolute; top: 15px; right: 15px;
            background: var(--red); color: white; border: none;
            width: 35px; height: 35px; border-radius: 10px; cursor: pointer; font-weight: 900;
        }

        .add-box {
            border: 3px dashed var(--border); border-radius: 24px;
            height: 350px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-dim); font-weight: 800; gap: 15px;
        }
        .add-box:hover { border-color: var(--accent); color: white; }

        /* --- FULL SCREEN PICKER --- */
        #pickerOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: none; flex-direction: column; padding: 40px;
        }

        .picker-header { display: flex; gap: 20px; margin-bottom: 30px; }
        .search-giant {
            flex-grow: 1; background: var(--surface); border: 2px solid var(--border);
            border-radius: 20px; padding: 25px; color: white; font-size: 1.5rem; outline: none;
        }
        .close-giant {
            background: var(--red); color: white; border: none;
            padding: 0 40px; border-radius: 20px; font-weight: 900; cursor: pointer; font-size: 1.2rem;
        }

        .picker-results {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 25px; overflow-y: auto; padding-bottom: 100px;
        }

        .picker-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; padding: 20px; text-align: center; cursor: pointer;
        }
        .picker-card img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; }
        .picker-card:hover { border-color: var(--accent); background: var(--surface); }

    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <div class="nav-item">
                <a class="nav-link">Seasons ▼</a>
                <div class="dropdown">
                    <a href="contracts.html" class="drop-link">Season Contracts</a>
                    <a href="prizes.html" class="drop-link">Season Rewards</a>
                </div>
            </div>
            <div class="nav-item">
                <a class="nav-link" style="color: #fff;">Values ▼</a>
                <div class="dropdown">
                    <a href="values.html" class="drop-link">Value List</a>
                    <a href="calculator.html" class="drop-link">Value Calculator</a>
                </div>
            </div>
            <a href="pity.html" class="nav-link">Pity Calc</a>
        </div>
    </nav>

    <div class="container">
        <div class="result-panel">
            <div>
                <div class="status-big" id="status">EQUAL</div>
                <div class="diff-big" id="difference">Difference: $0</div>
            </div>
            <div class="btn-group">
                <button class="control-btn" onclick="swapSides()">Swap Sides</button>
                <button class="control-btn" style="color:var(--red)" onclick="clearAll()">Clear All</button>
            </div>
        </div>

        <div class="trade-zone">
            <section>
                <div class="side-header">
                    <h2 class="side-title">Your Side</h2>
                    <div class="side-val" id="valA">$0</div>
                </div>
                <div class="item-grid" id="gridA">
                    <div class="add-box" onclick="openPicker('A')">
                        <span style="font-size: 4rem;">+</span>
                        ADD ITEM
                    </div>
                </div>
            </section>

            <section>
                <div class="side-header">
                    <h2 class="side-title">Their Side</h2>
                    <div class="side-val" id="valB">$0</div>
                </div>
                <div class="item-grid" id="gridB">
                    <div class="add-box" onclick="openPicker('B')">
                        <span style="font-size: 4rem;">+</span>
                        ADD ITEM
                    </div>
                </div>
            </section>
        </div>
    </div>

    <div id="pickerOverlay">
        <div class="picker-header">
            <input type="text" id="pSearch" class="search-giant" placeholder="Search item name..." oninput="renderPicker()">
            <button class="close-giant" onclick="closePicker()">CLOSE</button>
        </div>
        <div class="picker-results" id="pResults"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let sideA = [];
        let sideB = [];
        let activeSide = 'A';

        function openPicker(side) {
            activeSide = side;
            document.getElementById('pickerOverlay').style.display = 'flex';
            document.getElementById('pSearch').value = '';
            renderPicker();
        }

        function closePicker() { document.getElementById('pickerOverlay').style.display = 'none'; }

        function renderPicker() {
            const query = document.getElementById('pSearch').value.toLowerCase();
            const res = document.getElementById('pResults');
            res.innerHTML = '';

            let all = [];
            for(let cat in db) {
                db[cat].forEach(item => all.push({...item, cat}));
            }

            all.filter(i => i.name.toLowerCase().includes(query)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'picker-card';
                div.innerHTML = `
                    <img src="${item.image}">
                    <div style="color:var(--accent); font-size:0.7rem; font-weight:800;">${item.cat}</div>
                    <div style="font-size:1.2rem; font-weight:800; margin:10px 0;">${item.name}</div>
                    <div style="font-family:'JetBrains Mono'; color:var(--green); font-weight:800;">$${item.cash_value.toLocaleString()}</div>
                `;
                div.onclick = () => {
                    if (activeSide === 'A') sideA.push(item);
                    else sideB.push(item);
                    closePicker();
                    updateUI();
                };
                res.appendChild(div);
            });
        }

        function removeItem(side, index) {
            if (side === 'A') sideA.splice(index, 1);
            else sideB.splice(index, 1);
            updateUI();
        }

        function clearAll() { sideA = []; sideB = []; updateUI(); }
        function swapSides() { [sideA, sideB] = [sideB, sideA]; updateUI(); }

        function updateUI() {
            const draw = (items, gridId, side) => {
                const grid = document.getElementById(gridId);
                let html = items.map((item, i) => `
                    <div class="item-card">
                        <button class="remove-icon" onclick="removeItem('${side}', ${i})">×</button>
                        <div class="img-container"><img src="${item.image}"></div>
                        <div class="card-details">
                            <span class="card-cat">${item.cat}</span>
                            <div class="card-name">${item.name}</div>
                            <div class="val-row">
                                <span class="val-label">TOTAL VALUE</span>
                                <span class="val-num">$${item.cash_value.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                html += `<div class="add-box" onclick="openPicker('${side}')"><span style="font-size: 4rem;">+</span>ADD ITEM</div>`;
                grid.innerHTML = html;
            };

            draw(sideA, 'gridA', 'A');
            draw(sideB, 'gridB', 'B');

            const totalA = sideA.reduce((s, i) => s + i.cash_value, 0);
            const totalB = sideB.reduce((s, i) => s + i.cash_value, 0);
            document.getElementById('valA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('valB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalA - totalB;
            const status = document.getElementById('status');
            document.getElementById('difference').innerText = `Difference: $${Math.abs(diff).toLocaleString()}`;

            if (totalA === 0 && totalB === 0) { status.innerText = "EQUAL"; status.style.color = "white"; }
            else if (Math.abs(diff) < (Math.max(totalA, totalB) * 0.1)) { status.innerText = "FAIR TRADE"; status.style.color = "var(--green)"; }
            else { status.innerText = diff > 0 ? "A OVERPAYING" : "B OVERPAYING"; status.style.color = "var(--red)"; }
        }
    </script>
</body>
</html>
