<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Professional Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.06);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.4);
            --green: #00ff88;
            --red: #ff3333;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --panel-blur: blur(25px);
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-bottom: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            background-attachment: fixed;
        }

        /* --- THE COMMAND CENTER (HUD) --- */
        .hud-wrapper {
            position: sticky; top: 0; z-index: 2000;
            padding: 20px 40px; background: rgba(3, 5, 8, 0.6);
            backdrop-filter: var(--panel-blur); border-bottom: 1px solid var(--border);
        }

        .trade-hud {
            max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; gap: 60px;
        }

        .hud-side { display: flex; flex-direction: column; gap: 4px; }
        .hud-side.right { text-align: right; }
        
        .hud-label { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 2px; }
        .hud-value { 
            font-family: 'JetBrains Mono'; font-size: 2.4rem; font-weight: 800; 
            color: var(--text-main); text-shadow: 0 0 30px rgba(255,255,255,0.1); 
        }
        .side-offering .hud-value { color: var(--accent); text-shadow: 0 0 30px var(--accent-glow); }
        
        .fairness-meter {
            display: flex; flex-direction: column; align-items: center; gap: 8px;
        }
        .verdict-tag {
            padding: 6px 16px; border-radius: 100px; font-size: 0.7rem; font-weight: 800;
            text-transform: uppercase; letter-spacing: 1px; background: var(--card); border: 1px solid var(--border);
        }

        .swap-btn {
            width: 54px; height: 54px; border-radius: 50%; background: var(--card);
            border: 1px solid var(--border); color: #fff; cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.4rem;
        }
        .swap-btn:hover { transform: rotate(180deg) scale(1.1); border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }

        /* --- THE LOGS SECTION --- */
        .logs-container {
            max-width: 1400px; margin: 40px auto;
            display: grid; grid-template-columns: 1fr 1fr; gap: 40px; padding: 0 40px;
        }

        .log-box { 
            background: rgba(255,255,255,0.02); border: 1px solid var(--border);
            border-radius: 24px; padding: 20px; min-height: 120px;
        }

        .log-entry {
            display: flex; align-items: center; gap: 16px; padding: 12px;
            background: var(--card); border-radius: 16px; border: 1px solid var(--border);
            margin-bottom: 12px; animation: slideIn 0.3s cubic-bezier(0.18, 0.89, 0.32, 1.28);
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        .log-img { width: 50px; height: 50px; border-radius: 10px; background: #000; }
        .log-info { flex: 1; }
        .log-name { font-weight: 700; font-size: 0.9rem; margin-bottom: 2px; }
        .log-price { font-family: 'JetBrains Mono'; font-size: 0.8rem; color: var(--green); }
        .log-remove { cursor: pointer; opacity: 0.3; font-size: 1.4rem; padding: 0 10px; }
        .log-remove:hover { opacity: 1; color: var(--red); }

        /* --- THE DISCOVERY (FILTERS) --- */
        .discovery-header {
            max-width: 1400px; margin: 80px auto 40px auto; padding: 0 40px;
        }

        .search-hub {
            display: flex; flex-direction: column; gap: 24px;
            background: var(--surface); border: 1px solid var(--border);
            padding: 30px; border-radius: 32px; box-shadow: 0 40px 80px rgba(0,0,0,0.4);
        }

        .search-bar-wrap { position: relative; }
        .search-bar-wrap input {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 20px 20px 20px 60px; border-radius: 18px; color: #fff;
            font-size: 1.1rem; font-weight: 500;
        }
        .search-bar-wrap::before { content: '🔍'; position: absolute; left: 25px; top: 50%; transform: translateY(-50%); opacity: 0.5; }
        .search-bar-wrap input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 4px var(--accent-glow); }

        .filter-row { display: flex; align-items: center; gap: 30px; flex-wrap: wrap; }
        .pill-box { display: flex; gap: 8px; }
        .pill {
            padding: 10px 20px; border-radius: 12px; background: #1a1f26;
            border: 1px solid var(--border); color: var(--text-dim);
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase; cursor: pointer;
        }
        .pill:hover { color: #fff; border-color: #fff; }
        .pill.active { background: var(--accent); color: #fff; border-color: var(--accent); box-shadow: 0 4px 15px var(--accent-glow); }

        /* --- ITEM CARDS --- */
        .item-grid {
            max-width: 1400px; margin: 0 auto;
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px; padding: 0 40px;
        }

        .card {
            background: var(--card); border: 1px solid var(--border); border-radius: 28px;
            padding: 24px; position: relative; overflow: hidden;
            display: flex; flex-direction: column; gap: 20px;
        }
        .card:hover { transform: translateY(-10px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }

        .card-visual { display: flex; gap: 20px; align-items: center; }
        .card-img { width: 100px; height: 100px; object-fit: contain; background: #000; border-radius: 20px; border: 1px solid var(--border); }
        .card-title h3 { margin: 0; font-size: 1.2rem; font-weight: 800; letter-spacing: -0.5px; }
        .card-cat { font-size: 0.65rem; font-weight: 800; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

        .card-stats {
            display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
        }
        .stat-item { background: rgba(0,0,0,0.3); padding: 12px; border-radius: 16px; border: 1px solid var(--border); }
        .stat-item label { display: block; font-size: 0.6rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; margin-bottom: 4px; }
        .stat-item span { font-family: 'JetBrains Mono'; font-size: 0.9rem; font-weight: 700; }

        .card-btns { display: flex; gap: 12px; }
        .btn {
            flex: 1; padding: 14px; border-radius: 14px; border: none; font-weight: 800;
            font-size: 0.75rem; text-transform: uppercase; cursor: pointer;
        }
        .btn-add-offer { background: var(--green); color: #020408; }
        .btn-add-request { background: #fff; color: #020408; }
        .btn:hover { transform: scale(1.03); filter: brightness(1.1); }

    </style>
</head>
<body>

    <div class="hud-wrapper">
        <div class="trade-hud">
            <div class="hud-side side-offering">
                <span class="hud-label">Your Offering</span>
                <span class="hud-value" id="val-offering">$0</span>
                <div class="hud-stats">
                    <span>Items: <b id="count-offering">0</b></span>
                    <span>Demand Avg: <b id="dem-offering">0</b></span>
                </div>
            </div>

            <div class="fairness-meter">
                <div class="verdict-tag" id="trade-verdict">Empty Trade</div>
                <button class="swap-btn" onclick="swapSides()">⇄</button>
                <div style="font-size: 0.6rem; color: var(--red); cursor: pointer; font-weight: 800;" onclick="clearAll()">RESET SYSTEM</div>
            </div>

            <div class="hud-side right side-requesting">
                <span class="hud-label">Their Requesting</span>
                <span class="hud-value" id="val-requesting">$0</span>
                <div class="hud-stats">
                    <span>Demand Avg: <b id="dem-requesting">0</b></span>
                    <span>Items: <b id="count-requesting">0</b></span>
                </div>
            </div>
        </div>
    </div>

    <div class="logs-container">
        <div class="log-box" id="list-offering"></div>
        <div class="log-box" id="list-requesting"></div>
    </div>

    <div class="discovery-header">
        <div class="search-hub">
            <div class="search-bar-wrap">
                <input type="text" id="main-search" placeholder="Filter through market database..." oninput="refreshDiscovery()">
            </div>
            
            <div class="filter-row">
                <div class="pill-box" id="cat-pills">
                    <div class="pill active" onclick="setCat('all', this)">All Items</div>
                    <div class="pill" onclick="setCat('Vehicles', this)">Vehicles</div>
                    <div class="pill" onclick="setCat('Rims', this)">Rims</div>
                    <div class="pill" onclick="setCat('Furniture', this)">Furniture</div>
                </div>

                <div style="flex: 1;"></div>

                <div class="pill-box" id="sort-pills">
                    <div class="pill active" onclick="setSort('desc', this)">Value High</div>
                    <div class="pill" onclick="setSort('asc', this)">Value Low</div>
                    <div class="pill" onclick="setSort('az', this)">A-Z</div>
                </div>
            </div>
        </div>
    </div>

    <div class="item-grid" id="main-grid"></div>

    <script src="Values.js"></script>
    <script>
        let offerList = [];
        let requestList = [];
        let activeCat = 'all';
        let activeSort = 'desc';

        // --- CORE LOGIC ---
        function refreshDiscovery() {
            const grid = document.getElementById('main-grid');
            const query = document.getElementById('main-search').value.toLowerCase();
            let pool = [];

            for (let category in db) {
                if (activeCat !== 'all' && category !== activeCat) continue;
                db[category].forEach(item => pool.push({...item, category}));
            }

            pool = pool.filter(i => i.name.toLowerCase().includes(query));

            if (activeSort === 'desc') pool.sort((a,b) => b.cash_value - a.cash_value);
            if (activeSort === 'asc') pool.sort((a,b) => a.cash_value - b.cash_value);
            if (activeSort === 'az') pool.sort((a,b) => a.name.localeCompare(b.name));

            grid.innerHTML = pool.map(item => `
                <div class="card">
                    <div class="card-visual">
                        <img src="${item.image}" class="card-img" onerror="this.src='https://via.placeholder.com/100/000/333?text=?'">
                        <div class="card-title">
                            <span class="card-cat">${item.category}</span>
                            <h3>${item.name}</h3>
                        </div>
                    </div>
                    <div class="card-stats">
                        <div class="stat-item"><label>Market Value</label><span style="color:var(--green)">$${item.cash_value.toLocaleString()}</span></div>
                        <div class="stat-item"><label>Demand</label><span>${item.demand || '5/10'}</span></div>
                        <div class="stat-item"><label>Dupe Value</label><span>$${(item.duped_value || 0).toLocaleString()}</span></div>
                        <div class="stat-item"><label>Trend</label><span style="color:${item.trend === 'Rising' ? 'var(--green)' : 'white'}">${item.trend || 'Stable'}</span></div>
                    </div>
                    <div class="card-btns">
                        <button class="btn btn-add-offer" onclick="pushItem('${item.name.replace(/'/g, "\\'")}', 'offer')">Offer</button>
                        <button class="btn btn-add-request" onclick="pushItem('${item.name.replace(/'/g, "\\'")}', 'request')">Request</button>
                    </div>
                </div>
            `).join('');
        }

        function pushItem(name, side) {
            let found = null;
            for(let cat in db) {
                let match = db[cat].find(i => i.name === name);
                if(match) { found = {...match, uid: Date.now() + Math.random()}; break; }
            }
            if(side === 'offer') offerList.push(found);
            else requestList.push(found);
            updateUI();
        }

        function removeItem(uid, side) {
            if(side === 'offer') offerList = offerList.filter(i => i.uid !== uid);
            else requestList = requestList.filter(i => i.uid !== uid);
            updateUI();
        }

        function swapSides() {
            [offerList, requestList] = [requestList, offerList];
            updateUI();
        }

        function clearAll() {
            offerList = []; requestList = [];
            updateUI();
        }

        function updateUI() {
            renderList('list-offering', offerList, 'offer');
            renderList('list-requesting', requestList, 'request');
            calculateTotals();
        }

        function renderList(id, list, side) {
            const container = document.getElementById(id);
            container.innerHTML = list.map(item => `
                <div class="log-entry">
                    <img src="${item.image}" class="log-img">
                    <div class="log-info">
                        <div class="log-name">${item.name}</div>
                        <div class="log-price">$${item.cash_value.toLocaleString()}</div>
                    </div>
                    <div class="log-remove" onclick="removeItem(${item.uid}, '${side}')">×</div>
                </div>
            `).join('');
        }

        function calculateTotals() {
            const sum = list => list.reduce((a, b) => a + b.cash_value, 0);
            const valO = sum(offerList);
            const valR = sum(requestList);

            document.getElementById('val-offering').innerText = `$${valO.toLocaleString()}`;
            document.getElementById('val-requesting').innerText = `$${valR.toLocaleString()}`;
            document.getElementById('count-offering').innerText = offerList.length;
            document.getElementById('count-requesting').innerText = requestList.length;

            const verdict = document.getElementById('trade-verdict');
            if (valO === 0 && valR === 0) {
                verdict.innerText = "Empty Trade"; verdict.style.color = "var(--text-dim)";
            } else if (valO > valR * 1.2) {
                verdict.innerText = "L (Overpaying)"; verdict.style.color = var(--red);
            } else if (valR > valO * 1.2) {
                verdict.innerText = "Big Win (W)"; verdict.style.color = var(--green);
            } else {
                verdict.innerText = "Fair Trade"; verdict.style.color = var(--accent);
            }
        }

        function setCat(cat, el) {
            document.querySelectorAll('#cat-pills .pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active'); activeCat = cat; refreshDiscovery();
        }

        function setSort(sort, el) {
            document.querySelectorAll('#sort-pills .pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active'); activeSort = sort; refreshDiscovery();
        }

        window.onload = refreshDiscovery;
    </script>
</body>
</html>
