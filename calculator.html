<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 90px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }
        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 25px; align-items: center; }
        .nav-item { position: relative; height: 70px; display: flex; align-items: center; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }
        .nav-link:hover, .nav-item:hover .nav-link { color: #fff; }

        .dropdown {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; min-width: 220px; padding: 10px;
            opacity: 0; pointer-events: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 6000;
        }
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        .drop-link { display: flex; flex-direction: column; padding: 12px; color: var(--text-dim); text-decoration: none; font-size: 0.75rem; border-radius: 8px; font-weight: 600; margin-bottom: 4px; }
        .drop-link:hover { background: var(--card); color: #fff; }

        /* --- CALCULATOR LAYOUT --- */
        .container { max-width: 1400px; margin: 0 auto; padding: 0 20px 100px; }
        
        .result-bar {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 24px; padding: 30px; text-align: center; margin-bottom: 30px;
            position: sticky; top: 90px; z-index: 4000; backdrop-filter: blur(10px);
        }

        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        
        .trade-box { display: flex; flex-direction: column; gap: 20px; }

        .box-header {
            display: flex; justify-content: space-between; align-items: center;
            background: var(--surface); border: 1px solid var(--border);
            padding: 20px 25px; border-radius: 20px;
        }

        .value-counter { font-family: 'JetBrains Mono'; font-size: 1.8rem; color: var(--green); font-weight: 800; }

        /* --- MATCHING ITEM CARDS --- */
        .item-slots { 
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 20px; 
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; overflow: hidden; position: relative;
            display: flex; flex-direction: column;
        }

        .img-container {
            width: 100%; height: 160px; background: #000;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 1px solid var(--border);
        }
        .img-small { width: 70%; height: 70%; object-fit: contain; }

        .card-content { padding: 15px; }
        .item-cat { color: var(--accent); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; margin-bottom: 4px; display: block; }
        .card-content h3 { margin: 0 0 10px 0; font-size: 1rem; font-weight: 800; }

        .data-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 8px 10px; background: rgba(0,0,0,0.2); border-radius: 8px; margin-bottom: 5px;
        }
        .d-label { font-size: 0.55rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        .d-val { font-family: 'JetBrains Mono'; font-weight: 700; font-size: 0.85rem; color: var(--green); }

        .remove-btn {
            position: absolute; top: 10px; right: 10px;
            background: var(--red); color: white; border: none;
            width: 24px; height: 24px; border-radius: 6px;
            cursor: pointer; font-weight: 900; z-index: 10;
        }

        .slot-empty {
            border: 2px dashed var(--border); border-radius: 20px;
            height: 150px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-dim); font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 0.7rem; gap: 10px;
        }
        .slot-empty:hover { border-color: var(--accent); background: rgba(255,255,255,0.02); color: #fff; }

        /* --- MODAL --- */
        #modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; align-items: center; justify-content: center; z-index: 9999;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--surface); border: 1px solid var(--border);
            width: 90%; max-width: 500px; border-radius: 24px; padding: 25px;
            max-height: 70vh; display: flex; flex-direction: column;
        }
        .search-input {
            width: 100%; background: #000; border: 1px solid var(--border);
            padding: 15px; border-radius: 12px; color: #fff; margin-bottom: 15px; outline: none;
        }
        .search-results { overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
        .search-item {
            padding: 10px; background: var(--card); border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
        }
        .search-item:hover { background: var(--accent); }

        .fairness-badge {
            display: inline-block; padding: 10px 40px; border-radius: 100px;
            background: #000; border: 1px solid var(--border);
            font-weight: 900; font-size: 1.4rem; margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <a href="index.html" class="nav-link">Home</a>
            <div class="nav-item">
                <a class="nav-link">Seasons ▼</a>
                <div class="dropdown">
                    <a href="contracts.html" class="drop-link">Season Contracts</a>
                    <a href="prizes.html" class="drop-link">Season Rewards</a>
                </div>
            </div>
            <div class="nav-item">
                <a class="nav-link" style="color: #fff;">Values ▼</a>
                <div class="dropdown">
                    <a href="values.html" class="drop-link">Value List</a>
                    <a href="calculator.html" class="drop-link">Value Calculator</a>
                </div>
            </div>
            <a href="pity.html" class="nav-link">Pity Calc</a>
        </div>
    </nav>

    <div class="container">
        <div class="result-bar">
            <div class="fairness-badge" id="status">EQUAL</div>
            <div style="font-size: 0.9rem; color: var(--text-dim); font-weight: 700;" id="difference">Difference: $0</div>
        </div>

        <div class="calc-grid">
            <div class="trade-box">
                <div class="box-header">
                    <h2 class="font-bold uppercase tracking-widest text-xs">Your Side</h2>
                    <div class="value-counter" id="valA">$0</div>
                </div>
                <div class="item-slots" id="slotsA"></div>
                <div class="slot-empty" onclick="openSearch('A')">
                    <span style="font-size: 2rem;">+</span>
                    Add Item
                </div>
            </div>

            <div class="trade-box">
                <div class="box-header">
                    <h2 class="font-bold uppercase tracking-widest text-xs">Their Side</h2>
                    <div class="value-counter" id="valB">$0</div>
                </div>
                <div class="item-slots" id="slotsB"></div>
                <div class="slot-empty" onclick="openSearch('B')">
                    <span style="font-size: 2rem;">+</span>
                    Add Item
                </div>
            </div>
        </div>
    </div>

    <div id="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2 style="font-weight: 800; text-transform: uppercase; font-style: italic;">Select Item</h2>
                <button onclick="closeSearch()" style="background:none; border:none; color:var(--red); font-weight:800; cursor:pointer;">CLOSE</button>
            </div>
            <input type="text" id="modalSearch" class="search-input" placeholder="Search Database..." oninput="filterModal()">
            <div id="modalResults" class="search-results"></div>
        </div>
    </div>

    <script src="Values.js"></script>
    <script>
        let sideA = [];
        let sideB = [];
        let activeSide = 'A';

        function openSearch(side) {
            activeSide = side;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalSearch').value = '';
            document.getElementById('modalSearch').focus();
            filterModal();
        }

        function closeSearch() { document.getElementById('modal').style.display = 'none'; }

        function filterModal() {
            const query = document.getElementById('modalSearch').value.toLowerCase();
            const results = document.getElementById('modalResults');
            results.innerHTML = '';

            let allItems = [];
            for(let cat in db) {
                db[cat].forEach(item => allItems.push({...item, category: cat}));
            }

            const filtered = allItems.filter(i => i.name.toLowerCase().includes(query)).slice(0, 15);

            filtered.forEach(item => {
                const div = document.createElement('div');
                div.className = 'search-item';
                div.innerHTML = `
                    <div style="display:flex; align-items:center; gap:10px;">
                        <img src="${item.image}" style="width: 30px; height: 30px; object-fit: contain;">
                        <span style="font-weight:700; font-size:0.9rem;">${item.name}</span>
                    </div>
                    <span style="font-family:'JetBrains Mono'; color:var(--green); font-size:0.8rem;">$${(item.cash_value || 0).toLocaleString()}</span>
                `;
                div.onclick = () => {
                    if (activeSide === 'A') sideA.push(item);
                    else sideB.push(item);
                    closeSearch();
                    updateUI();
                };
                results.appendChild(div);
            });
        }

        function removeItem(side, index) {
            if (side === 'A') sideA.splice(index, 1);
            else sideB.splice(index, 1);
            updateUI();
        }

        function updateUI() {
            const renderSlots = (items, containerId, sideKey) => {
                const container = document.getElementById(containerId);
                container.innerHTML = items.map((item, index) => `
                    <div class="item-card">
                        <button class="remove-btn" onclick="removeItem('${sideKey}', ${index})">×</button>
                        <div class="img-container">
                            <img src="${item.image}" class="img-small" onerror="this.src='https://via.placeholder.com/150/000/333?text=?'">
                        </div>
                        <div class="card-content">
                            <span class="item-cat">${item.category}</span>
                            <h3>${item.name}</h3>
                            <div class="data-item">
                                <span class="d-label">Value</span>
                                <span class="d-val">$${(item.cash_value || 0).toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
            };

            renderSlots(sideA, 'slotsA', 'A');
            renderSlots(sideB, 'slotsB', 'B');

            const totalA = sideA.reduce((sum, item) => sum + (item.cash_value || 0), 0);
            const totalB = sideB.reduce((sum, item) => sum + (item.cash_value || 0), 0);

            document.getElementById('valA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('valB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalA - totalB;
            const status = document.getElementById('status');
            const diffEl = document.getElementById('difference');

            diffEl.innerText = `Difference: $${Math.abs(diff).toLocaleString()}`;

            if (totalA === 0 && totalB === 0) {
                status.innerText = "EQUAL";
                status.style.color = "white";
            } else if (Math.abs(diff) < (Math.max(totalA, totalB) * 0.15)) {
                status.innerText = "FAIR TRADE";
                status.style.color = "var(--green)";
            } else if (diff > 0) {
                status.innerText = "SIDE A OVERPAYING";
                status.style.color = "var(--red)";
            } else {
                status.innerText = "SIDE B OVERPAYING";
                status.style.color = "var(--red)";
            }
        }
    </script>
</body>
</html>
