<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.12);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        * { box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            min-height: 100vh;
        }

        /* --- HEADER NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.95); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 9000;
        }
        .nav-logo { font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }
        
        .nav-links { display: flex; gap: 5px; align-items: center; }
        
        .nav-item { position: relative; height: 70px; display: flex; align-items: center; padding: 0 12px; }
        
        .nav-link { 
            text-decoration: none; color: var(--text-dim); font-size: 0.75rem; 
            font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; 
            cursor: pointer; transition: color 0.2s;
        }

        .nav-item:hover .nav-link { color: #fff; }

        /* DROPDOWNS */
        .dropdown {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; min-width: 200px; padding: 8px;
            opacity: 0; pointer-events: none; transition: all 0.2s;
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
        }
        
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        
        .drop-link { 
            display: block; padding: 12px 16px; color: var(--text-dim); 
            text-decoration: none; font-size: 0.75rem; font-weight: 600; 
            border-radius: 8px;
        }
        
        .drop-link:hover { background: var(--card); color: #fff; }

        /* --- CALCULATOR CONTENT --- */
        .container { max-width: 1600px; margin: 0 auto; padding: 0 20px; }

        .result-panel {
            background: var(--surface); border: 2px solid var(--border);
            border-radius: 20px; padding: 25px; margin-bottom: 30px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 85px; z-index: 4000;
        }

        /* --- FORCED 5 PER LINE --- */
        .item-grid { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 20px; margin-bottom: 40px;
        }

        /* Screen Scaling */
        @media (max-width: 1300px) { .item-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 850px) { .item-grid { grid-template-columns: repeat(2, 1fr); } }

        .item-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 20px; position: relative; overflow: hidden;
        }
        .img-container { width: 100%; height: 180px; background: #000; display: flex; align-items: center; justify-content: center; }
        .img-container img { width: 85%; height: 85%; object-fit: contain; }
        .card-details { padding: 15px; }
        .card-name { font-size: 1rem; font-weight: 800; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .val-num { font-family: 'JetBrains Mono'; color: var(--green); font-weight: 800; }

        .remove-btn {
            position: absolute; top: 8px; right: 8px; background: var(--red); color: white;
            border: none; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-weight: 900;
        }

        .add-box {
            border: 3px dashed var(--border); border-radius: 20px; height: 260px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-dim); font-weight: 800; font-size: 1rem;
        }

        /* --- PICKER --- */
        #pickerOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: none; flex-direction: column; padding: 40px;
        }
        .search-giant { 
            width: 100%; background: var(--surface); border: 3px solid var(--border); 
            border-radius: 15px; padding: 25px; color: white; font-size: 1.5rem; font-weight: 700; margin-bottom: 20px;
        }
        .picker-results {
            display: grid; grid-template-columns: repeat(5, 1fr); 
            gap: 20px; overflow-y: auto;
        }

        .btn-action { 
            background: var(--card); color: white; border: 1px solid var(--border); 
            padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <div class="nav-item">
                <a href="index.html" class="nav-link">Home</a>
            </div>
            
            <div class="nav-item">
                <span class="nav-link">Seasons ▼</span>
                <div class="dropdown">
                    <a href="contracts.html" class="drop-link">Season Contracts</a>
                    <a href="prizes.html" class="drop-link">Season Rewards</a>
                </div>
            </div>

            <div class="nav-item">
                <span class="nav-link" style="color:#fff">Values ▼</span>
                <div class="dropdown">
                    <a href="values.html" class="drop-link">Value List</a>
                    <a href="calculator.html" class="drop-link">Value Calculator</a>
                </div>
            </div>

            <div class="nav-item">
                <a href="tracker.html" class="nav-link">Robbery Tracker</a>
            </div>

            <div class="nav-item">
                <a href="pity.html" class="nav-link">Pity Calc</a>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="result-panel">
            <div>
                <div style="font-weight:900; font-size:1.8rem; font-style:italic;" id="status">EQUAL</div>
                <div id="difference" style="color:var(--text-dim); font-weight:700;">Difference: $0</div>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-action" onclick="swapSides()">Swap Sides</button>
                <button class="btn-action" style="color:var(--red)" onclick="clearAll()">Clear All</button>
            </div>
        </div>

        <h2 style="font-style:italic; font-weight:900; border-bottom: 2px solid var(--border); padding-bottom:10px;">
            YOUR SIDE <span id="valA" style="float:right; color:var(--green); font-family:'JetBrains Mono';">$0</span>
        </h2>
        <div class="item-grid" id="gridA">
            <div class="add-box" onclick="openPicker('A')"><h1>+</h1>ADD ITEM</div>
        </div>

        <h2 style="font-style:italic; font-weight:900; border-bottom: 2px solid var(--border); padding-bottom:10px;">
            THEIR SIDE <span id="valB" style="float:right; color:var(--green); font-family:'JetBrains Mono';">$0</span>
        </h2>
        <div class="item-grid" id="gridB">
            <div class="add-box" onclick="openPicker('B')"><h1>+</h1>ADD ITEM</div>
        </div>
    </div>

    <div id="pickerOverlay">
        <div class="picker-header">
            <div style="display:flex; gap:15px;">
                <input type="text" id="pSearch" class="search-giant" placeholder="Search for any item..." oninput="renderPicker()">
                <button onclick="closePicker()" class="btn-action" style="background:var(--red); height:75px; padding:0 30px;">CLOSE</button>
            </div>
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <select id="sortType" class="btn-action" onchange="renderPicker()">
                    <option value="val_desc">Price: High to Low</option>
                    <option value="val_asc">Price: Low to High</option>
                    <option value="alpha_asc">A-Z</option>
                </select>
                <select id="catFilter" class="btn-action" onchange="renderPicker()">
                    <option value="All">All Categories</option>
                </select>
            </div>
        </div>
        <div class="picker-results" id="pResults"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let sideA = [];
        let sideB = [];
        let activeSide = 'A';

        function init() {
            const catMenu = document.getElementById('catFilter');
            if (typeof db !== 'undefined') {
                for(let cat in db) {
                    const opt = document.createElement('option');
                    opt.value = cat; opt.innerText = cat;
                    catMenu.appendChild(opt);
                }
            }
        }
        init();

        function openPicker(side) {
            activeSide = side;
            document.getElementById('pickerOverlay').style.display = 'flex';
            renderPicker();
        }

        function closePicker() { document.getElementById('pickerOverlay').style.display = 'none'; }

        function renderPicker() {
            const query = document.getElementById('pSearch').value.toLowerCase();
            const sort = document.getElementById('sortType').value;
            const catF = document.getElementById('catFilter').value;
            const res = document.getElementById('pResults');
            res.innerHTML = '';

            let list = [];
            if (typeof db !== 'undefined') {
                for(let cat in db) {
                    db[cat].forEach(item => {
                        if(catF === 'All' || cat === catF) list.push({...item, cat});
                    });
                }
            }

            if(sort === 'val_desc') list.sort((a,b) => b.cash_value - a.cash_value);
            else if(sort === 'val_asc') list.sort((a,b) => a.cash_value - b.cash_value);
            else list.sort((a,b) => a.name.localeCompare(b.name));

            list.filter(i => i.name.toLowerCase().includes(query)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'item-card'; // Reuse same large card style
                div.style.cursor = 'pointer';
                div.innerHTML = `
                    <div class="img-container"><img src="${item.image}"></div>
                    <div class="card-details">
                        <div style="color:var(--accent); font-size:0.6rem; font-weight:800;">${item.cat}</div>
                        <div class="card-name">${item.name}</div>
                        <div class="val-num">$${item.cash_value.toLocaleString()}</div>
                    </div>
                `;
                div.onclick = () => {
                    if (activeSide === 'A') sideA.push(item);
                    else sideB.push(item);
                    closePicker();
                    updateUI();
                };
                res.appendChild(div);
            });
        }

        function removeItem(side, index) {
            if (side === 'A') sideA.splice(index, 1);
            else sideB.splice(index, 1);
            updateUI();
        }

        function clearAll() { sideA = []; sideB = []; updateUI(); }
        function swapSides() { [sideA, sideB] = [sideB, sideA]; updateUI(); }

        function updateUI() {
            const draw = (items, gridId, side) => {
                const grid = document.getElementById(gridId);
                let html = items.map((item, i) => `
                    <div class="item-card">
                        <button class="remove-btn" onclick="removeItem('${side}', ${i})">×</button>
                        <div class="img-container"><img src="${item.image}"></div>
                        <div class="card-details">
                            <div class="card-name">${item.name}</div>
                            <div class="val-num">$${item.cash_value.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
                html += `<div class="add-box" onclick="openPicker('${side}')"><h1>+</h1>ADD</div>`;
                grid.innerHTML = html;
            };

            draw(sideA, 'gridA', 'A');
            draw(sideB, 'gridB', 'B');

            const totalA = sideA.reduce((s, i) => s + (i.cash_value || 0), 0);
            const totalB = sideB.reduce((s, i) => s + (i.cash_value || 0), 0);
            document.getElementById('valA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('valB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalA - totalB;
            const status = document.getElementById('status');
            document.getElementById('difference').innerText = `Difference: $${Math.abs(diff).toLocaleString()}`;

            if (totalA === 0 && totalB === 0) { status.innerText = "EQUAL"; status.style.color = "white"; }
            else if (Math.abs(diff) < (Math.max(totalA, totalB) * 0.12)) { status.innerText = "FAIR TRADE"; status.style.color = "var(--green)"; }
            else { status.innerText = diff > 0 ? "A OVERPAYING" : "B OVERPAYING"; status.style.color = "var(--red)"; }
        }
    </script>
</body>
</html>
