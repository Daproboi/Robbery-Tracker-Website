<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Trade Analytics</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020408;
            --surface: #0a0c10;
            --card: #12151a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --accent-glow: rgba(0, 112, 243, 0.3);
            --green: #00df82;
            --red: #ff4d4d;
            --text-main: #ffffff;
            --text-dim: #8899a6;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 90px; overflow-x: hidden;
        }

        /* --- THE HUD (TOTALS) --- */
        .trade-hud {
            position: sticky; top: 20px; z-index: 2000;
            background: rgba(10, 12, 16, 0.7); backdrop-filter: blur(20px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 20px 40px; margin: 0 30px 40px 30px;
            display: grid; grid-template-columns: 1fr auto 1fr;
            align-items: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .hud-side { display: flex; flex-direction: column; }
        .hud-label { font-size: 0.65rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 4px; }
        .hud-value { font-family: 'JetBrains Mono'; font-size: 2rem; font-weight: 800; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); }
        .hud-stats { display: flex; gap: 15px; font-size: 0.7rem; color: var(--text-dim); }
        .hud-stats b { color: var(--text-main); }

        .swap-btn { 
            width: 48px; height: 48px; border-radius: 14px; background: var(--card);
            border: 1px solid var(--border); color: #fff; cursor: pointer;
            transition: 0.3s; font-size: 1.2rem;
        }
        .swap-btn:hover { border-color: var(--accent); background: var(--accent); transform: rotate(180deg); }

        /* --- MODERN FILTER BAR --- */
        .filter-container {
            margin: 40px 30px;
            display: flex; flex-direction: column; gap: 20px;
        }

        .search-area { position: relative; width: 100%; }
        .search-input {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            padding: 18px 25px 18px 55px; border-radius: 16px; color: #fff;
            font-size: 1rem; transition: 0.3s; box-sizing: border-box;
        }
        .search-area::before { content: "🔍"; position: absolute; left: 22px; top: 50%; transform: translateY(-50%); opacity: 0.4; }
        .search-input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 4px var(--accent-glow); }

        /* Pill Selectors (Instead of 1990s Dropdowns) */
        .pill-group { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
        .pill-label { font-size: 0.7rem; font-weight: 800; color: var(--text-dim); text-transform: uppercase; margin-right: 10px; }
        
        .pill {
            background: var(--card); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 10px; color: var(--text-dim);
            font-size: 0.75rem; font-weight: 600; cursor: pointer; transition: 0.2s;
        }
        .pill:hover { border-color: var(--text-main); color: var(--text-main); }
        .pill.active { background: var(--accent); border-color: var(--accent); color: #fff; }

        /* --- GRID --- */
        .item-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); 
            gap: 20px; padding: 0 30px 100px 30px; 
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; transition: 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative; overflow: hidden;
        }
        .item-card:hover { transform: translateY(-5px); border-color: var(--accent); box-shadow: 0 10px 30px rgba(0,0,0,0.4); }

        .card-header { display: flex; gap: 15px; margin-bottom: 20px; }
        .card-img { width: 80px; height: 80px; background: #000; border-radius: 14px; object-fit: contain; }
        .card-title h3 { margin: 0; font-size: 1.1rem; font-weight: 800; }
        .card-cat { font-size: 0.6rem; color: var(--accent); font-weight: 800; text-transform: uppercase; }

        .card-metrics {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            background: rgba(0,0,0,0.3); padding: 12px; border-radius: 14px; margin-bottom: 15px;
        }
        .metric { display: flex; flex-direction: column; gap: 2px; }
        .metric span { font-size: 0.55rem; color: var(--text-dim); text-transform: uppercase; font-weight: 700; }
        .metric b { font-size: 0.85rem; font-family: 'JetBrains Mono'; }

        .btn-group { display: flex; gap: 10px; }
        .btn { 
            flex: 1; padding: 12px; border-radius: 12px; border: none; 
            font-weight: 800; font-size: 0.7rem; text-transform: uppercase; cursor: pointer; transition: 0.2s;
        }
        .btn-o { background: var(--green); color: #000; }
        .btn-r { background: #fff; color: #000; }
        .btn:hover { opacity: 0.9; transform: scale(1.02); }

        /* Trade Logs (Vertical Minimalist) */
        .trade-logs { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin: 0 30px 40px 30px; }
        .log-item { 
            display: flex; align-items: center; gap: 15px; background: var(--card); 
            padding: 10px 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 8px;
        }
        .log-item img { width: 40px; height: 40px; }
        .log-item-info { flex: 1; font-size: 0.8rem; font-weight: 700; }
        .remove-btn { cursor: pointer; opacity: 0.5; font-size: 1.2rem; }
        .remove-btn:hover { opacity: 1; color: var(--red); }

    </style>
</head>
<body>

    <div class="trade-hud">
        <div class="hud-side">
            <span class="hud-label">Your Offer</span>
            <span class="hud-value" id="total-offering">$0</span>
            <div class="hud-stats">
                <span>Items: <b id="count-offering">0</b></span>
                <span>Clean: <b id="clean-offering">$0</b></span>
            </div>
        </div>
        <button class="swap-btn" onclick="swapSides()">⇄</button>
        <div class="hud-side" style="text-align: right;">
            <span class="hud-label">Their Requesting</span>
            <span class="hud-value" id="total-requesting">$0</span>
            <div class="hud-stats" style="justify-content: flex-end;">
                <span>Clean: <b id="clean-requesting">$0</b></span>
                <span>Items: <b id="count-requesting">0</b></span>
            </div>
        </div>
    </div>

    <div class="trade-logs">
        <div id="list-offering"></div>
        <div id="list-requesting"></div>
    </div>

    <div class="filter-container">
        <div class="search-area">
            <input type="text" id="search-input" class="search-input" placeholder="Find an item..." oninput="updateDiscovery()">
        </div>

        <div class="pill-group" id="cat-filters">
            <span class="pill-label">Category:</span>
            <div class="pill active" onclick="setCategory('all', this)">All</div>
            <div class="pill" onclick="setCategory('Vehicles', this)">Vehicles</div>
            <div class="pill" onclick="setCategory('Rims', this)">Rims</div>
            <div class="pill" onclick="setCategory('Furniture', this)">Furniture</div>
        </div>

        <div class="pill-group" id="sort-filters">
            <span class="pill-label">Sort By:</span>
            <div class="pill active" onclick="setSort('high', this)">Value High</div>
            <div class="pill" onclick="setSort('low', this)">Value Low</div>
            <div class="pill" onclick="setSort('az', this)">A-Z</div>
        </div>
    </div>

    <div class="item-grid" id="discovery-grid"></div>

    <script src="Values.js"></script>
    <script>
        let offering = [];
        let requesting = [];
        let currentCat = 'all';
        let currentSort = 'high';

        function setCategory(cat, el) {
            document.querySelectorAll('#cat-filters .pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            currentCat = cat;
            updateDiscovery();
        }

        function setSort(sort, el) {
            document.querySelectorAll('#sort-filters .pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            currentSort = sort;
            updateDiscovery();
        }

        function updateDiscovery() {
            const grid = document.getElementById('discovery-grid');
            const search = document.getElementById('search-input').value.toLowerCase();

            let items = [];
            for (let cat in db) {
                if (currentCat !== 'all' && cat !== currentCat) continue;
                db[cat].forEach(i => items.push({...i, category: cat}));
            }

            items = items.filter(i => i.name.toLowerCase().includes(search));

            if (currentSort === 'high') items.sort((a,b) => b.cash_value - a.cash_value);
            if (currentSort === 'low') items.sort((a,b) => a.cash_value - b.cash_value);
            if (currentSort === 'az') items.sort((a,b) => a.name.localeCompare(b.name));

            grid.innerHTML = items.map(i => `
                <div class="item-card">
                    <div class="card-header">
                        <img src="${i.image}" class="card-img">
                        <div class="card-title">
                            <span class="card-cat">${i.category}</span>
                            <h3>${i.name}</h3>
                        </div>
                    </div>
                    <div class="card-metrics">
                        <div class="metric"><span>Clean Value</span><b style="color:var(--green)">$${i.cash_value.toLocaleString()}</b></div>
                        <div class="metric"><span>Dupe Value</span><b>$${(i.duped_value || 0).toLocaleString()}</b></div>
                        <div class="metric"><span>Demand</span><b>${i.demand || '—'}</b></div>
                        <div class="metric"><span>Trend</span><b>${i.trend || 'Stable'}</b></div>
                    </div>
                    <div class="btn-group">
                        <button class="btn btn-o" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'offering')">Add Offer</button>
                        <button class="btn btn-r" onclick="addItem('${i.name.replace(/'/g, "\\'")}', 'requesting')">Add Request</button>
                    </div>
                </div>
            `).join('');
        }

        // ... [Include your addItem, removeItem, renderLogs functions from previous script here] ...
        // (Keeping it concise, reuse the logic from the last response)
        
        function addItem(name, side) {
            let item = null;
            for (let cat in db) {
                let found = db[cat].find(i => i.name === name);
                if (found) { item = {...found, uid: Math.random(), isDuped: false}; break; }
            }
            if (side === 'offering') offering.push(item);
            else requesting.push(item);
            renderLogs();
        }

        function removeItem(uid, side) {
            if (side === 'offering') offering = offering.filter(i => i.uid !== uid);
            else requesting = requesting.filter(i => i.uid !== uid);
            renderLogs();
        }

        function swapSides() {
            [offering, requesting] = [requesting, offering];
            renderLogs();
        }

        function renderLogs() {
            updateColumn('offering', offering);
            updateColumn('requesting', requesting);
        }

        function updateColumn(side, items) {
            const list = document.getElementById(`list-${side}`);
            let total = 0, cleanT = 0;
            list.innerHTML = items.map(i => {
                total += i.cash_value;
                cleanT += i.cash_value;
                return `
                <div class="log-item">
                    <img src="${i.image}">
                    <div class="log-item-info">${i.name}<br><small style="color:var(--green)">$${i.cash_value.toLocaleString()}</small></div>
                    <span class="remove-btn" onclick="removeItem(${i.uid}, '${side}')">×</span>
                </div>`;
            }).join('');
            document.getElementById(`total-${side}`).innerText = `$${total.toLocaleString()}`;
            document.getElementById(`count-${side}`).innerText = items.length;
            document.getElementById(`clean-${side}`).innerText = `$${cleanT.toLocaleString()}`;
        }

        window.onload = updateDiscovery;
    </script>
</body>
</html>
