<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Professional Calculator</title>
    <script src="values.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 80px;
        }

        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }

        /* --- TOP NAV --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: space-between; padding: 0 40px; z-index: 5000;
        }
        .nav-logo { font-weight: 800; font-size: 1.4rem; color: #fff; text-decoration: none; }
        .nav-logo span { color: var(--accent); }

        /* --- STATUS BAR --- */
        .status-bar {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 15px; padding: 25px; text-align: center; margin-bottom: 40px;
        }
        #status-text { font-size: 2.2rem; font-weight: 900; margin: 0; }

        /* --- TRADE SECTIONS --- */
        .trade-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .side-header { 
            display: flex; justify-content: space-between; align-items: flex-end;
            margin-bottom: 15px; border-bottom: 2px solid var(--border); padding-bottom: 10px;
        }
        .side-total { color: var(--accent); font-family: 'JetBrains Mono'; font-size: 1.5rem; }

        .item-slots { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); 
            gap: 15px; min-height: 250px; 
        }

        .slot-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 12px;
            padding: 10px; text-align: center; position: relative;
        }
        .slot-card img { width: 100%; height: 80px; object-fit: contain; }
        .remove-btn { position: absolute; top: 5px; right: 5px; color: var(--red); cursor: pointer; font-weight: bold; }

        .add-trigger {
            border: 2px dashed var(--border); border-radius: 12px; height: 135px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; font-weight: 800; color: var(--text-dim);
        }

        /* --- ITEM PICKER OVERLAY --- */
        #pickerOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: none; flex-direction: column;
        }
        .picker-header { padding: 30px 50px; background: var(--surface); border-bottom: 1px solid var(--border); }
        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 20px; }
        .filter-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text-dim);
            padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 0.8rem;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        /* 4 ITEMS PER ROW GRID */
        .picker-body { flex: 1; overflow-y: auto; padding: 40px 50px; }
        .picker-grid { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 25px; 
        }

        .item-choice {
            background: var(--card); border: 1px solid var(--border); border-radius: 16px;
            padding: 20px; text-align: center; cursor: pointer; transition: 0.2s;
        }
        .item-choice:hover { border-color: var(--accent); transform: translateY(-5px); }
        .item-choice img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; }
        .item-choice .name { font-weight: 800; font-size: 1rem; margin-bottom: 8px; }
        .item-choice .val { color: var(--green); font-family: 'JetBrains Mono'; font-weight: 700; }
        
        .badge-container { display: flex; justify-content: center; gap: 5px; margin-top: 10px; flex-wrap: wrap; }
        .stat-badge { background: rgba(255,255,255,0.05); font-size: 0.7rem; padding: 3px 8px; border-radius: 4px; color: var(--text-dim); }
        .demand-high { color: var(--green); border: 1px solid rgba(0, 255, 136, 0.2); }

        /* --- FOOTER --- */
        .footer {
            margin-top: 80px; padding: 60px 40px; background: var(--surface);
            border-top: 1px solid var(--border); text-align: center; color: var(--text-dim);
        }
        .footer-links { margin-bottom: 20px; display: flex; justify-content: center; gap: 30px; }
        .footer-links a { color: white; text-decoration: none; font-weight: 700; font-size: 0.9rem; }

    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="#" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div style="display:flex; gap:25px;">
            <a href="#" style="color:white; text-decoration:none; font-weight:700;">Calculator</a>
            <a href="#" style="color:var(--text-dim); text-decoration:none; font-weight:700;">Values</a>
        </div>
    </nav>

    <div class="container">
        <div class="status-bar">
            <h1 id="status-text">START TRADE</h1>
            <p id="diff-text" style="color: var(--text-dim); font-weight: 700; margin-top: 10px;">Difference: $0</p>
        </div>

        <div class="trade-grid">
            <section>
                <div class="side-header">
                    <span style="font-weight: 800; letter-spacing: 1px;">YOUR OFFER</span>
                    <span class="side-total" id="totalA">$0</span>
                </div>
                <div class="item-slots" id="slotsA">
                    <div class="add-trigger" onclick="openPicker('A')">ADD ITEM</div>
                </div>
            </section>

            <section>
                <div class="side-header">
                    <span style="font-weight: 800; letter-spacing: 1px;">THEIR REQUEST</span>
                    <span class="side-total" id="totalB">$0</span>
                </div>
                <div class="item-slots" id="slotsB">
                    <div class="add-trigger" onclick="openPicker('B')">ADD ITEM</div>
                </div>
            </section>
        </div>
    </div>

    <footer class="footer">
        <div class="footer-links">
            <a href="#">Privacy</a>
            <a href="#">Terms</a>
            <a href="#">Contact</a>
        </div>
        <p>Jailbreak Hub is a community project and not affiliated with Badimo or Roblox.</p>
        <p>&copy; 2026 Jailbreak Hub Trading</p>
    </footer>

    <div id="pickerOverlay">
        <div class="picker-header">
            <div style="display:flex; gap:20px;">
                <input type="text" id="pSearch" placeholder="Search item name..." style="flex:1; padding:15px; border-radius:10px; border:1px solid var(--border); background:var(--card); color:white;" oninput="drawPickerItems()">
                <button onclick="closePicker()" style="background:var(--red); color:white; border:none; padding:0 30px; border-radius:10px; font-weight:800; cursor:pointer;">CLOSE</button>
            </div>
            <div class="filter-row" id="filterContainer"></div>
        </div>
        <div class="picker-body">
            <div class="picker-grid" id="pickerGrid"></div>
        </div>
    </div>

    <script>
        // Combine all data from values.js for the picker
        // IMPORTANT: Ensure your values.js has these variable names defined!
        const allCategories = {
            "Vehicles": typeof vehicleData !== 'undefined' ? vehicleData : [],
            "Hyperchromes": typeof hyperchromeData !== 'undefined' ? hyperchromeData : [],
            "Skins": typeof weaponSkinData !== 'undefined' ? weaponSkinData : [],
            "Drifts": typeof driftData !== 'undefined' ? driftData : [],
            "Furniture": typeof furnitureData !== 'undefined' ? furnitureData : [],
            "Rims": typeof rimData !== 'undefined' ? rimData : [],
            "Body Colors": typeof bodyColorData !== 'undefined' ? bodyColorData : []
        };

        let currentSide = 'A';
        let currentFilter = 'Vehicles';
        let tradeA = [];
        let tradeB = [];

        function openPicker(side) {
            currentSide = side;
            document.getElementById('pickerOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden';
            renderFilterButtons();
            drawPickerItems();
        }

        function closePicker() {
            document.getElementById('pickerOverlay').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function renderFilterButtons() {
            const container = document.getElementById('filterContainer');
            container.innerHTML = Object.keys(allCategories).map(cat => `
                <button class="filter-btn ${currentFilter === cat ? 'active' : ''}" onclick="setFilter('${cat}')">${cat.toUpperCase()}</button>
            `).join('');
        }

        function setFilter(cat) {
            currentFilter = cat;
            renderFilterButtons();
            drawPickerItems();
        }

        function drawPickerItems() {
            const grid = document.getElementById('pickerGrid');
            const search = document.getElementById('pSearch').value.toLowerCase();
            const items = allCategories[currentFilter] || [];

            grid.innerHTML = items
                .filter(i => i.name.toLowerCase().includes(search))
                .map(item => `
                    <div class="item-choice" onclick="addItemToTrade('${item.name}', ${item.cash_value}, '${item.image || ''}', ${item.duped_value || item.cash_value})">
                        <img src="${item.image || 'https://via.placeholder.com/140/0a0c10/FFFFFF?text=' + item.name}">
                        <div class="name">${item.name}</div>
                        <div class="val">$${(item.cash_value || 0).toLocaleString()}</div>
                        <div class="badge-container">
                            <span class="stat-badge">Duped: $${(item.duped_value || 0).toLocaleString()}</span>
                            <span class="stat-badge demand-high">Demand: 🔥</span>
                        </div>
                    </div>
                `).join('');
        }

        function addItemToTrade(name, val, img, duped) {
            const item = { name, val, img, duped };
            if(currentSide === 'A') tradeA.push(item);
            else tradeB.push(item);
            closePicker();
            updateMainUI();
        }

        function removeFromTrade(side, index) {
            if(side === 'A') tradeA.splice(index, 1);
            else tradeB.splice(index, 1);
            updateMainUI();
        }

        function updateMainUI() {
            const renderSlots = (list, containerId, side) => {
                const container = document.getElementById(containerId);
                let html = list.map((item, idx) => `
                    <div class="slot-card">
                        <span class="remove-btn" onclick="removeFromTrade('${side}', ${idx})">×</span>
                        <img src="${item.img || 'https://via.placeholder.com/100/11141a/FFFFFF?text=' + item.name}">
                        <div style="font-size:0.75rem; font-weight:800; margin-top:5px;">${item.name}</div>
                    </div>
                `).join('');
                html += `<div class="add-trigger" onclick="openPicker('${side}')">+</div>`;
                container.innerHTML = html;
            };

            renderSlots(tradeA, 'slotsA', 'A');
            renderSlots(tradeB, 'slotsB', 'B');

            const totalA = tradeA.reduce((sum, item) => sum + item.val, 0);
            const totalB = tradeB.reduce((sum, item) => sum + item.val, 0);

            document.getElementById('totalA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('totalB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalA - totalB;
            const status = document.getElementById('status-text');
            document.getElementById('diff-text').innerText = `Difference: $${Math.abs(diff).toLocaleString()}`;

            if(totalA === 0 && totalB === 0) {
                status.innerText = "START TRADE";
                status.style.color = "white";
            } else if (Math.abs(diff) < (Math.max(totalA, totalB) * 0.1)) {
                status.innerText = "FAIR TRADE";
                status.style.color = "var(--green)";
            } else if (diff > 0) {
                status.innerText = "OVERPAYING";
                status.style.color = "var(--red)";
            } else {
                status.innerText = "WINNING";
                status.style.color = "var(--green)";
            }
        }
    </script>
</body>
</html>
