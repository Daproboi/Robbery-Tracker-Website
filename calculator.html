<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Trade Calculator</title>
    <style>
        :root {
            --bg: #0a0c10; --panel: #0d1117; --card: #161b22; 
            --border: #30363d; --text-main: #f0f6fc; --text-dim: #8b949e; 
            --accent: #58a6ff; --green: #3fb950; --red: #f85149;
        }
        body { font-family: sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-top: 80px; }

        /* Navbar */
        .nav-top { position: fixed; top: 0; width: 100%; height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; justify-content: center; gap: 10px; z-index: 1000; align-items: center; }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 600; padding: 8px 16px; font-size: 0.9rem; }
        .nav-active { color: var(--accent); background: #21262d; border-radius: 8px; }

        .container { max-width: 1000px; margin: auto; padding: 20px; }
        .calc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .side-panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; min-height: 500px; }
        
        .side-header { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border); padding-bottom: 10px; }
        .total-box { font-size: 1.4rem; font-weight: 800; color: var(--accent); }

        /* --- THE FIXED ITEM CARD --- */
        .trade-item-card { 
            background: var(--card) !important; 
            border: 1px solid var(--border) !important; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            padding: 15px;
            display: block; /* Force block layout */
        }

        .item-top-section {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 12px;
        }

        .item-image-box {
            width: 60px;
            height: 60px;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
            border: 1px solid var(--border);
        }

        .item-image-box img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .item-info-text {
            flex-grow: 1;
        }

        .item-name-label { font-weight: bold; font-size: 1.1rem; display: block; }
        .item-value-label { color: var(--green); font-weight: 700; }

        /* THE BUTTON ROW - Guaranteed separation */
        .item-bottom-actions {
            display: flex !important;
            justify-content: space-between !important; 
            align-items: center !important;
            border-top: 1px solid var(--border);
            padding-top: 12px;
            margin-top: 5px;
        }

        .dupe-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            color: var(--text-dim);
        }

        .btn-remove {
            background: #3d1b1e;
            color: #ff7b72;
            border: 1px solid #6e2e33;
            padding: 6px 14px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-remove:hover { background: var(--red); color: white; }

        /* Search area */
        .search-box { width: 100%; padding: 12px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: white; margin-bottom: 10px; }
        .results-dropdown { background: var(--card); border: 1px solid var(--border); position: absolute; width: 300px; z-index: 100; border-radius: 8px; display: none; }
        .res-row { padding: 10px; border-bottom: 1px solid var(--border); cursor: pointer; }
        .res-row:hover { background: var(--accent); color: black; }

        .verdict-box { margin-top: 30px; background: var(--card); border: 2px solid var(--border); border-radius: 12px; padding: 30px; text-align: center; }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-link">HOME</a>
        <a href="tracker.html" class="nav-link">TRACKER</a>
        <a href="values.html" class="nav-link nav-active">CALCULATOR</a>
    </nav>

    <div class="container">
        <h1>Trade Calculator</h1>
        <div class="calc-grid">
            <div class="side-panel">
                <div class="side-header"><span>YOU</span> <span id="total-l" class="total-box">$0</span></div>
                <input type="text" class="search-box" placeholder="Search..." oninput="search(this, 'l')">
                <div id="drop-l" class="results-dropdown"></div>
                <div id="list-l"></div>
            </div>
            <div class="side-panel">
                <div class="side-header"><span>THEM</span> <span id="total-r" class="total-box">$0</span></div>
                <input type="text" class="search-box" placeholder="Search..." oninput="search(this, 'r')">
                <div id="drop-r" class="results-dropdown"></div>
                <div id="list-r"></div>
            </div>
        </div>

        <div class="verdict-box" id="v-box">
            <h2 id="v-title">ADD ITEMS</h2>
            <p id="v-sub">Compare values to see if the trade is fair.</p>
        </div>
    </div>

    <script src="Values.js"></script>
    <script>
        let sideL = [];
        let sideR = [];

        function search(el, side) {
            const val = el.value.toLowerCase();
            const drop = document.getElementById(`drop-${side}`);
            if (val.length < 1) { drop.style.display = 'none'; return; }
            
            let html = '';
            for (let cat in db) {
                db[cat].forEach(item => {
                    if (item.name.toLowerCase().includes(val)) {
                        html += `<div class="res-row" onclick="add('${item.name.replace(/'/g, "\\'")}', '${side}')">${item.name}</div>`;
                    }
                });
            }
            drop.innerHTML = html;
            drop.style.display = 'block';
        }

        function add(name, side) {
            let item = null;
            for (let cat in db) {
                let found = db[cat].find(i => i.name === name);
                if (found) { item = {...found, uid: Math.random(), isDuped: false}; break; }
            }
            if (item) {
                if (side === 'l') sideL.push(item); else sideR.push(item);
                render();
            }
            document.querySelectorAll('.results-dropdown').forEach(d => d.style.display = 'none');
            document.querySelectorAll('.search-box').forEach(i => i.value = '');
        }

        function remove(uid, side) {
            if (side === 'l') sideL = sideL.filter(i => i.uid !== uid);
            else sideR = sideR.filter(i => i.uid !== uid);
            render();
        }

        function toggle(uid, side) {
            const list = side === 'l' ? sideL : sideR;
            const item = list.find(i => i.uid === uid);
            if (item) item.isDuped = !item.isDuped;
            render();
        }

        function render() {
            updateSide('l', sideL);
            updateSide('r', sideR);
            calc();
        }

        function updateSide(side, items) {
            const container = document.getElementById(`list-${side}`);
            let total = 0;
            container.innerHTML = items.map(i => {
                const val = i.isDuped ? (i.duped_value || i.cash_value) : i.cash_value;
                total += val;
                // Check if your Values.js uses 'image' or 'img'
                const imgSource = i.image || i.img || ''; 

                return `
                <div class="trade-item-card">
                    <div class="item-top-section">
                        <div class="item-image-box">
                            <img src="${imgSource}" onerror="this.src='https://via.placeholder.com/60/161b22/8b949e?text=?'">
                        </div>
                        <div class="item-info-text">
                            <span class="item-name-label">${i.name}</span>
                            <span class="item-value-label">$${val.toLocaleString()}</span>
                        </div>
                    </div>
                    <div class="item-bottom-actions">
                        <label class="dupe-wrapper">
                            <input type="checkbox" ${i.isDuped ? 'checked' : ''} onchange="toggle(${i.uid}, '${side}')"> Duped?
                        </label>
                        <button class="btn-remove" onclick="remove(${i.uid}, '${side}')">REMOVE</button>
                    </div>
                </div>`;
            }).join('');
            document.getElementById(`total-${side}`).innerText = `$${total.toLocaleString()}`;
        }

        function calc() {
            const getPrice = i => i.isDuped ? (i.duped_value || i.cash_value) : i.cash_value;
            const tL = sideL.reduce((a, b) => a + getPrice(b), 0);
            const tR = sideR.reduce((a, b) => a + getPrice(b), 0);
            const title = document.getElementById('v-title');
            const sub = document.getElementById('v-sub');

            if (tL === 0 && tR === 0) return;
            const diff = tR - tL;
            if (diff > 0) {
                title.innerText = "WIN"; title.style.color = "var(--green)";
                sub.innerText = `You gain $${diff.toLocaleString()}`;
            } else if (diff < 0) {
                title.innerText = "LOSS"; title.style.color = "var(--red)";
                sub.innerText = `You lose $${Math.abs(diff).toLocaleString()}`;
            } else {
                title.innerText = "FAIR"; title.style.color = "var(--accent)";
                sub.innerText = "Equal value trade.";
            }
        }
    </script>
</body>
</html>
