<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <style>
        :root {
            --bg: #0d1117; --panel: #161b22; --border: #30363d;
            --text-main: #c9d1d9; --text-dim: #8b949e; --accent: #58a6ff;
            --green: #238636; --red: #da3633; --orange: #d29922;
            --btn-gray: #21262d;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding-top: 70px; }
        
        /* Navbar */
        .nav-top { position: fixed; top: 0; width: 100%; height: 60px; background: var(--panel); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; z-index: 1000; justify-content: space-between; box-sizing: border-box; }
        .nav-left { font-weight: 800; color: var(--accent); font-size: 1.2rem; }
        .nav-center { display: flex; gap: 20px; position: absolute; left: 50%; transform: translateX(-50%); }
        .nav-link { color: var(--text-dim); text-decoration: none; font-weight: 600; font-size: 0.9rem; display: flex; align-items: center; gap: 5px; }
        .nav-link:hover { color: var(--text-main); }
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: var(--panel); border: 1px solid var(--border); min-width: 160px; border-radius: 6px; }
        .nav-item:hover .dropdown { display: block; }
        .dropdown a { display: block; padding: 10px; color: var(--text-dim); text-decoration: none; font-size: 0.8rem; }

        .container { max-width: 1200px; margin: auto; padding: 20px; }

        /* Calculator Section */
        .trade-header { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .action-btn { background: var(--btn-gray); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .action-btn:hover { background: #30363d; border-color: #8b949e; }

        .calculator-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .log-column { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
        .log-title { border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .log-title h2 { margin: 0; font-size: 0.85rem; color: var(--text-dim); letter-spacing: 0.5px; }
        .total-display { font-size: 1.4rem; font-weight: 700; color: var(--accent); font-family: monospace; }

        .stats-bar { display: flex; gap: 20px; margin-bottom: 15px; font-size: 0.75rem; color: var(--text-dim); background: #0d1117; padding: 8px; border-radius: 6px; }
        .stat-val { color: var(--text-main); font-weight: 700; }

        /* --- CHANGELOG STYLE DISCOVERY --- */
        .discovery-section { margin-top: 50px; }
        .filter-bar { display: flex; gap: 12px; background: var(--panel); padding: 15px; border-radius: 8px; border: 1px solid var(--border); margin-bottom: 20px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .filter-group label { font-size: 0.7rem; color: var(--text-dim); font-weight: 800; text-transform: uppercase; }
        select, input[type="text"] { background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; font-size: 0.9rem; }

        /* Item Grid & Cards */
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .item-card { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            padding: 12px; 
            display: flex; 
            flex-direction: column;
            gap: 12px;
            transition: 0.15s ease-in-out;
        }
        .item-card:hover { border-color: #444c56; background: #1c2128; }
        
        .card-header { display: flex; gap: 12px; align-items: center; }
        .card-img { width: 70px; height: 70px; object-fit: contain; background: #000; border-radius: 6px; border: 1px solid var(--border); }
        .card-title-area { flex: 1; }
        .card-title-area h3 { margin: 0; font-size: 1rem; font-weight: 700; color: #adbac7; }
        .category-tag { font-size: 0.65rem; color: var(--accent); font-weight: 600; text-transform: uppercase; }

        .card-metrics { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 8px; 
            background: rgba(0,0,0,0.2); 
            padding: 10px; 
            border-radius: 6px;
        }
        .metric { display: flex; justify-content: space-between; font-size: 0.75rem; }
        .m-label { color: var(--text-dim); }
        .m-val { font-weight: 700; color: #cdd9e5; }
        .m-val.price { color: #57ab5a; font-family: monospace; }

        /* Changelog Style Buttons */
        .card-btns { display: flex; gap: 8px; }
        .btn-add { 
            flex: 1;
            padding: 8px;
            border-radius: 6px;
            border: 1px solid var(--border);
            font-size: 0.75rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-offer { background: #238636; color: white; border-color: #2ea043; }
        .btn-offer:hover { background: #2ea043; }
        .btn-request { background: #24292f; color: #adbac7; border-color: #444c56; }
        .btn-request:hover { background: #30363d; border-color: #8b949e; }

        /* Badges */
        .badge { font-size: 0.6rem; padding: 2px 5px; border-radius: 3px; font-weight: 800; margin-left: 5px; }
        .lim { background: #9e6a03; color: #fff; }
        .sea { background: var(--accent); color: #fff; }

        /* Added items in logs */
        .log-item { display: flex; align-items: center; gap: 12px; padding: 8px; background: var(--bg); border-radius: 6px; margin-bottom: 6px; border: 1px solid var(--border); }
        .log-item img { width: 35px; height: 35px; object-fit: contain; }
        .log-item-info { flex: 1; font-size: 0.8rem; font-weight: 600; }
        .remove-log { color: var(--text-dim); cursor: pointer; padding: 0 5px; font-size: 1.1rem; }
        .remove-log:hover { color: var(--red); }

    </style>
</head>
<body>

    <nav class="nav-top">
        <div class="nav-left">Jailbreak Hub</div>
        <div class="nav-center">
            <a href="index.html" class="nav-link">HOME</a>
            <a href="tracker.html" class="nav-link">ROBBERY TRACKER</a>
            <div class="nav-item">
                <a href="#" class="nav-link">VALUES ▾</a>
                <div class="dropdown">
                    <a href="values.html">Value List</a>
                    <a href="calculator.html">Value Calculator</a>
                </div>
            </div>
        </div>
        <div></div>
    </nav>

    <div class="container">
        
        <section>
            <div class="trade-header">
                <button class="action-btn" onclick="swapSides()">⇄ Swap Sides</button>
                <button class="action-btn" onclick="clearAll()">× Clear All</button>
            </div>

            <div class="calculator-grid">
                <div class="log-column">
                    <div class="log-title">
                        <h2>OFFERING</h2>
                        <span class="total-display" id="total-offering">$0</span>
                    </div>
                    <div class="stats-bar">
                        <span>Items: <b id="count-offering">0</b></span>
                        <span>Clean: <b id="clean-offering" style="color:var(--green)">$0</b></span>
                        <span>Duped: <b id="dupe-offering" style="color:var(--red)">$0</b></span>
                    </div>
                    <div id="list-offering"></div>
                </div>

                <div class="log-column">
                    <div class="log-title">
                        <h2>REQUESTING</h2>
                        <span class="total-display" id="total-requesting">$0</span>
                    </div>
                    <div class="stats-bar">
                        <span>Items: <b id="count-requesting">0</b></span>
                        <span>Clean: <b id="clean-requesting" style="color:var(--green)">$0</b></span>
                        <span>Duped: <b id="dupe-requesting" style="color:var(--red)">$0</b></span>
                    </div>
                    <div id="list-requesting"></div>
                </div>
            </div>
        </section>

        <section class="discovery-section">
            <div class="filter-bar">
                <div class="filter-group">
                    <label>Search</label>
                    <input type="text" id="search-input" placeholder="Type name..." oninput="updateDiscovery()">
                </div>
                <div class="filter-group">
                    <label>Values</label>
                    <select id="sort-value" onchange="updateDiscovery()">
                        <option value="cash-high">High to Low</option>
                        <option value="cash-low">Low to High</option>
                        <option value="dupe-high">Dupe High</option>
                        <option value="dupe-low">Dupe Low</option>
                        <option value="random">Random</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Sort</label>
                    <select id="sort-alpha" onchange="updateDiscovery()">
                        <option value="a-z">Name A-Z</option>
                        <option value="z-a">Name Z-A</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Type</label>
                    <select id="filter-cat" onchange="updateDiscovery()">
                        <option value="all">All Items</option>
                        <option value="Vehicles">Vehicles</option>
                        <option value="Rims">Rims</option>
                        <option value="Colors">Colors/Textures</option>
                    </select>
                </div>
            </div>

            <div class="item-grid" id="discovery-grid"></div>
        </section>
    </div>

    <script src="Values.js"></script>
    <script>
        let offering = [];
        let requesting = [];

        function updateDiscovery() {
            const grid = document.getElementById('discovery-grid');
            const search = document.getElementById('search-input').value.toLowerCase();
            const valSort = document.getElementById('sort-value').value;
            const alphaSort = document.getElementById('sort-alpha').value;
            const catFilter = document.getElementById('filter-cat').value;

            let items = [];
            for (let cat in db) {
                if (catFilter !== 'all' && cat !== catFilter) continue;
                db[cat].forEach(i => items.push({...i, category: cat}));
            }

            items = items.filter(i => i.name.toLowerCase().includes(search));

            if (valSort === 'cash-high') items.sort((a,b) => b.cash_value - a.cash_value);
            if (valSort === 'cash-low') items.sort((a,b) => a.cash_value - b.cash_value);
            if (alphaSort === 'a-z') items.sort((a,b) => a.name.localeCompare(b.name));
            if (alphaSort === 'z-a') items.sort((a,b) => b.name.localeCompare(a.name));
            if (valSort === 'random') items.sort(() => Math.random() - 0.5);

            grid.innerHTML = items.map(i => `
                <div class="item-card">
                    <div class="card-header">
                        <img src="${i.image}" class="card-img" onerror="this.src='https://via.placeholder.com/70/161b22/8b949e?text=?'">
                        <div class="card-title-area">
                            <span class="category-tag">${i.category}</span>
                            <h3>${i.name} ${i.limited ? '<span class="badge lim">LIM</span>' : ''}${i.seasonal ? '<span class="badge sea">SEA</span>' : ''}</h3>
                        </div>
                    </div>
                    
                    <div class="card-metrics">
                        <div class="metric"><span class="m-label">Clean Value</span> <span class="m-val price">$${i.cash_value.toLocaleString()}</span></div>
                        <div class="metric"><span class="m-label">Dupe Value</span> <span class="m-val">$${(i.duped_value || 0).toLocaleString()}</span></div>
                        <div class="metric"><span class="m-label">Demand</span> <span class="m-val" style="color:var(--accent)">${i.demand || 'Normal'}</span></div>
                        <div class="metric"><span class="m-label">Trend</span> <span class="m-val">${i.trend || 'Stable'}</span></div>
                    </div>

                    <div class="card-btns">
                        <button class="btn-add btn-offer" onclick="addItem('${i.name}', 'offering')">Add Offer</button>
                        <button class="btn-add btn-request" onclick="addItem('${i.name}', 'requesting')">Add Request</button>
                    </div>
                </div>
            `).join('');
        }

        function addItem(name, side) {
            let item = null;
            for (let cat in db) {
                let found = db[cat].find(i => i.name === name);
                if (found) { item = {...found, uid: Math.random(), isDuped: false}; break; }
            }
            if (side === 'offering') offering.push(item);
            else requesting.push(item);
            renderLogs();
        }

        function toggleDupe(uid, side) {
            const list = (side === 'offering') ? offering : requesting;
            const item = list.find(i => i.uid === uid);
            if (item) item.isDuped = !item.isDuped;
            renderLogs();
        }

        function removeItem(uid, side) {
            if (side === 'offering') offering = offering.filter(i => i.uid !== uid);
            else requesting = requesting.filter(i => i.uid !== uid);
            renderLogs();
        }

        function swapSides() {
            [offering, requesting] = [requesting, offering];
            renderLogs();
        }

        function clearAll() {
            offering = []; requesting = [];
            renderLogs();
        }

        function renderLogs() {
            updateColumn('offering', offering);
            updateColumn('requesting', requesting);
        }

        function updateColumn(side, items) {
            const list = document.getElementById(`list-${side}`);
            let total = 0, cleanTotal = 0, dupeTotal = 0;

            list.innerHTML = items.map(i => {
                const val = i.isDuped ? (i.duped_value || i.cash_value) : i.cash_value;
                total += val;
                if (i.isDuped) dupeTotal += val; else cleanTotal += val;

                return `
                <div class="log-item">
                    <img src="${i.image}" onerror="this.src='https://via.placeholder.com/40/161b22/8b949e?text=?'">
                    <div class="log-item-info">
                        ${i.name} <br>
                        <span style="color:var(--green); font-family:monospace">$${val.toLocaleString()}</span>
                        <input type="checkbox" style="margin-left:10px" ${i.isDuped ? 'checked' : ''} onchange="toggleDupe(${i.uid}, '${side}')"> <small>Dupe</small>
                    </div>
                    <span class="remove-log" onclick="removeItem(${i.uid}, '${side}')">×</span>
                </div>`;
            }).join('');

            document.getElementById(`total-${side}`).innerText = `$${total.toLocaleString()}`;
            document.getElementById(`count-${side}`).innerText = items.length;
            document.getElementById(`clean-${side}`).innerText = `$${cleanTotal.toLocaleString()}`;
            document.getElementById(`dupe-${side}`).innerText = `$${dupeTotal.toLocaleString()}`;
        }

        window.onload = updateDiscovery;
    </script>
</body>
</html>
