<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.12);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 80px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            min-height: 100vh;
        }

        /* --- STICKY MOBILE-FIRST HEADER --- */
        .status-bar {
            position: fixed; top: 0; width: 100%; z-index: 5000;
            background: rgba(3, 5, 8, 0.95); backdrop-filter: blur(20px);
            border-bottom: 2px solid var(--border);
            padding: 15px 20px;
        }

        .status-flex {
            max-width: 1400px; margin: 0 auto;
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }

        .badge {
            background: #000; border: 2px solid var(--border);
            padding: 12px 20px; border-radius: 12px;
            text-align: center; flex-grow: 1;
        }

        .badge-text { font-weight: 900; font-size: 1.2rem; display: block; letter-spacing: 1px; }
        .diff-text { font-family: 'JetBrains Mono'; color: var(--text-dim); font-size: 0.75rem; font-weight: 700; }

        .action-btns { display: flex; gap: 10px; }
        .icon-btn {
            background: var(--card); border: 1px solid var(--border);
            color: white; padding: 12px; border-radius: 12px; cursor: pointer;
            font-weight: 800; font-size: 0.8rem; text-transform: uppercase;
        }

        /* --- MAIN LAYOUT --- */
        .wrapper { max-width: 1400px; margin: 20px auto; padding: 0 15px 100px; }

        .side-title {
            display: flex; justify-content: space-between; align-items: center;
            padding: 20px; background: var(--surface); border-radius: 20px 20px 0 0;
            border: 1px solid var(--border); border-bottom: none; margin-top: 20px;
        }
        .side-name { font-weight: 900; text-transform: uppercase; font-style: italic; font-size: 1.5rem; }
        .side-total { font-family: 'JetBrains Mono'; color: var(--green); font-size: 1.5rem; font-weight: 800; }

        .item-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 15px; background: rgba(255,255,255,0.02);
            padding: 20px; border: 1px solid var(--border); border-radius: 0 0 20px 20px;
            margin-bottom: 40px;
        }

        /* Responsive grid for larger screens */
        @media (min-width: 768px) {
            .item-grid { grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; }
        }

        /* --- ITEM CARDS (LIST STYLE) --- */
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; overflow: hidden; position: relative;
            transition: transform 0.2s;
        }

        .img-box {
            width: 100%; height: 160px; background: #000;
            display: flex; align-items: center; justify-content: center;
        }
        .img-box img { width: 85%; height: 85%; object-fit: contain; }

        .card-meta { padding: 15px; }
        .card-cat { color: var(--accent); font-size: 0.6rem; font-weight: 800; text-transform: uppercase; }
        .card-name { font-weight: 800; font-size: 1rem; margin: 4px 0 12px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .val-pill {
            background: rgba(0,0,0,0.4); padding: 8px; border-radius: 10px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .val-pill span { font-family: 'JetBrains Mono'; color: var(--green); font-size: 0.9rem; }

        .remove-tap {
            position: absolute; top: 8px; right: 8px;
            background: var(--red); color: white; border: none;
            width: 32px; height: 32px; border-radius: 10px;
            font-weight: 900; cursor: pointer; z-index: 5;
        }

        .add-btn-large {
            border: 3px dashed var(--border); border-radius: 18px;
            height: 240px; display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            color: var(--text-dim); font-weight: 800; cursor: pointer;
            text-transform: uppercase; font-size: 0.9rem; gap: 10px;
        }
        .add-btn-large:active { background: var(--accent); color: white; border-color: white; }

        /* --- FULL SCREEN SEARCH --- */
        #searchOverlay {
            position: fixed; inset: 0; background: var(--bg);
            z-index: 9999; display: none; flex-direction: column;
            padding: 20px;
        }

        .search-top { display: flex; gap: 15px; margin-bottom: 20px; }
        .big-search {
            flex-grow: 1; background: var(--surface); border: 2px solid var(--border);
            border-radius: 15px; padding: 18px; color: white; font-size: 1.1rem;
            outline: none;
        }
        .big-search:focus { border-color: var(--accent); }

        .close-overlay {
            background: var(--red); color: white; border: none;
            padding: 0 25px; border-radius: 15px; font-weight: 900; cursor: pointer;
        }

        .filter-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px;
            margin-bottom: 15px; scrollbar-width: none;
        }
        .filter-chip {
            padding: 10px 25px; border-radius: 50px; background: var(--card);
            border: 1px solid var(--border); white-space: nowrap; font-weight: 800;
            font-size: 0.8rem; cursor: pointer;
        }
        .filter-chip.active { background: var(--accent); border-color: var(--accent); }

        .results-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px; overflow-y: auto; flex-grow: 1; padding-bottom: 40px;
        }
        @media (min-width: 768px) {
            .results-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
        }

        .result-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 15px; padding: 15px; text-align: center;
            cursor: pointer;
        }
        .result-card:active { transform: scale(0.95); background: var(--accent); }
        .result-card img { width: 80px; height: 80px; object-fit: contain; margin-bottom: 10px; }
    </style>
</head>
<body>

    <div class="status-bar">
        <div class="status-flex">
            <div class="badge">
                <span class="badge-text" id="status">EQUAL</span>
                <span class="diff-text" id="difference">DIFF: $0</span>
            </div>
            <div class="action-btns">
                <button class="icon-btn" onclick="swapSides()">Swap</button>
                <button class="icon-btn" style="color:var(--red)" onclick="clearAll()">Clear</button>
            </div>
        </div>
    </div>

    <div class="wrapper">
        <div class="side-title">
            <span class="side-name">Your Side</span>
            <span class="side-total" id="valA">$0</span>
        </div>
        <div class="item-grid" id="gridA">
            <div class="add-btn-large" onclick="openPicker('A')">
                <span style="font-size: 3rem;">+</span>
                Add Item
            </div>
        </div>

        <div class="side-title">
            <span class="side-name">Their Side</span>
            <span class="side-total" id="valB">$0</span>
        </div>
        <div class="item-grid" id="gridB">
            <div class="add-btn-large" onclick="openPicker('B')">
                <span style="font-size: 3rem;">+</span>
                Add Item
            </div>
        </div>
    </div>

    <div id="searchOverlay">
        <div class="search-top">
            <input type="text" id="mainSearch" class="big-search" placeholder="Search item name..." oninput="renderPicker()">
            <button class="close-overlay" onclick="closePicker()">X</button>
        </div>

        <div class="filter-scroll" id="filters">
            <div class="filter-chip active" onclick="setFilter('All', this)">All Items</div>
            <div class="filter-chip" onclick="setFilter('Vehicles', this)">Vehicles</div>
            <div class="filter-chip" onclick="setFilter('Textures', this)">Textures</div>
            <div class="filter-chip" onclick="setFilter('Colors', this)">Colors</div>
            <div class="filter-chip" onclick="setFilter('Rims', this)">Rims</div>
            <div class="filter-chip" onclick="setFilter('Spoilers', this)">Spoilers</div>
        </div>

        <div class="results-grid" id="pickerResults"></div>
    </div>

    <script src="Values.js"></script>
    <script>
        let sideA = [];
        let sideB = [];
        let currentSide = 'A';
        let activeFilter = 'All';

        function openPicker(side) {
            currentSide = side;
            document.getElementById('searchOverlay').style.display = 'flex';
            document.getElementById('mainSearch').value = '';
            renderPicker();
        }

        function closePicker() { document.getElementById('searchOverlay').style.display = 'none'; }

        function setFilter(cat, el) {
            activeFilter = cat;
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            renderPicker();
        }

        function renderPicker() {
            const query = document.getElementById('mainSearch').value.toLowerCase();
            const container = document.getElementById('pickerResults');
            container.innerHTML = '';

            let list = [];
            for(let cat in db) {
                db[cat].forEach(item => {
                    if (activeFilter === 'All' || cat === activeFilter) {
                        list.push({...item, cat});
                    }
                });
            }

            list.filter(i => i.name.toLowerCase().includes(query)).forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-card';
                div.innerHTML = `
                    <img src="${item.image}">
                    <div style="font-size:0.6rem; color:var(--accent); font-weight:900;">${item.cat}</div>
                    <div style="font-weight:800; font-size:0.8rem; margin:5px 0;">${item.name}</div>
                    <div style="font-family:'JetBrains Mono'; color:var(--green); font-size:0.8rem;">$${item.cash_value.toLocaleString()}</div>
                `;
                div.onclick = () => {
                    if (currentSide === 'A') sideA.push(item);
                    else sideB.push(item);
                    closePicker();
                    updateUI();
                };
                container.appendChild(div);
            });
        }

        function removeItem(side, index) {
            if (side === 'A') sideA.splice(index, 1);
            else sideB.splice(index, 1);
            updateUI();
        }

        function clearAll() { sideA = []; sideB = []; updateUI(); }
        function swapSides() { [sideA, sideB] = [sideB, sideA]; updateUI(); }

        function updateUI() {
            const draw = (items, gridId, side) => {
                const grid = document.getElementById(gridId);
                let html = items.map((item, i) => `
                    <div class="card">
                        <button class="remove-tap" onclick="removeItem('${side}', ${i})">×</button>
                        <div class="img-box"><img src="${item.image}"></div>
                        <div class="card-meta">
                            <span class="card-cat">${item.cat}</span>
                            <div class="card-name">${item.name}</div>
                            <div class="val-pill">
                                <span style="font-size:0.5rem; font-weight:800; color:var(--text-dim)">VALUE</span>
                                <span>$${item.cash_value.toLocaleString()}</span>
                            </div>
                        </div>
                    </div>
                `).join('');
                html += `<div class="add-btn-large" onclick="openPicker('${side}')"><span style="font-size: 3rem;">+</span>Add Item</div>`;
                grid.innerHTML = html;
            };

            draw(sideA, 'gridA', 'A');
            draw(sideB, 'gridB', 'B');

            const totalA = sideA.reduce((s, i) => s + i.cash_value, 0);
            const totalB = sideB.reduce((s, i) => s + i.cash_value, 0);
            document.getElementById('valA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('valB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalA - totalB;
            const status = document.getElementById('status');
            document.getElementById('difference').innerText = `DIFF: $${Math.abs(diff).toLocaleString()}`;

            if (totalA === 0 && totalB === 0) { status.innerText = "EQUAL"; status.style.color = "white"; }
            else if (Math.abs(diff) < (Math.max(totalA, totalB) * 0.12)) { status.innerText = "FAIR TRADE"; status.style.color = "var(--green)"; }
            else { status.innerText = diff > 0 ? "A OVERPAYING" : "B OVERPAYING"; status.style.color = "var(--red)"; }
        }
    </script>
</body>
</html>
