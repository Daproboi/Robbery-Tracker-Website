<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jailbreak Hub | Value Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #030508;
            --surface: #0a0c10;
            --card: #11141a;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #0070f3;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
            --green: #00ff88;
            --red: #ff3333;
        }

        * { box-sizing: border-box; transition: all 0.2s ease; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding-top: 100px;
            background-image: radial-gradient(circle at 50% -20%, #111827 0%, #030508 60%);
            min-height: 100vh;
        }

        /* --- NAVIGATION --- */
        .nav-top {
            position: fixed; top: 0; width: 100%; height: 70px;
            background: rgba(3, 5, 8, 0.9); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border); display: flex;
            align-items: center; justify-content: center;
            padding: 0 40px; z-index: 5000;
        }

        .nav-logo { position: absolute; left: 40px; font-weight: 800; font-size: 1.4rem; text-decoration: none; color: #fff; letter-spacing: -1px; }
        .nav-logo span { color: var(--accent); }

        .nav-links { display: flex; gap: 5px; align-items: center; }
        .nav-item { position: relative; height: 70px; display: flex; align-items: center; padding: 0 12px; }
        .nav-link { text-decoration: none; color: var(--text-dim); font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; }
        .nav-link:hover, .nav-item:hover .nav-link { color: #fff; }

        .dropdown {
            position: absolute; top: 70px; left: 50%; transform: translateX(-50%) translateY(10px);
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 12px; min-width: 220px; padding: 10px;
            opacity: 0; pointer-events: none; box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            z-index: 6000;
        }
        .nav-item:hover .dropdown { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        
        .drop-link { 
            display: flex; flex-direction: column; padding: 12px; 
            color: var(--text-dim); text-decoration: none; 
            font-size: 0.75rem; border-radius: 8px; font-weight: 600; 
            margin-bottom: 4px;
        }
        .drop-link:hover { background: var(--card); color: #fff; }

        /* --- CALCULATOR UI --- */
        .container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }

        .result-panel {
            background: rgba(10, 12, 16, 0.8); backdrop-filter: blur(10px);
            border: 1px solid var(--border); border-radius: 24px;
            padding: 30px; margin-bottom: 40px;
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 90px; z-index: 4000;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        }
        .status-label { font-weight: 900; font-size: 2.2rem; text-transform: uppercase; italic; letter-spacing: -1px; }

        .item-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); 
            gap: 15px; margin-bottom: 50px;
        }

        .item-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; position: relative; overflow: hidden;
        }

        .img-container { width: 100%; height: 140px; background: #000; display: flex; align-items: center; justify-content: center; padding: 15px; }
        .img-container img { max-width: 100%; max-height: 100%; object-fit: contain; }
        
        .card-details { padding: 12px; border-top: 1px solid var(--border); }
        .card-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 2px; }
        .val-num { font-family: 'JetBrains Mono'; color: var(--green); font-weight: 700; font-size: 0.85rem; }

        .remove-btn {
            position: absolute; top: 8px; right: 8px; background: rgba(255,51,51,0.2); color: var(--red);
            border: none; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; font-weight: 900; z-index: 10;
        }

        .add-box {
            border: 2px dashed var(--border); border-radius: 16px; height: 200px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; color: var(--text-dim); font-weight: 800; font-size: 0.7rem; gap: 5px;
        }
        .add-box h1 { font-size: 2rem; margin: 0; }

        /* --- PICKER OVERLAY (VALUE LIST STYLE) --- */
        #pickerOverlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: none; flex-direction: column;
        }

        .picker-header {
            padding: 30px 40px; background: var(--surface); border-bottom: 1px solid var(--border);
        }

        .picker-body {
            flex: 1; overflow-y: auto; padding: 40px;
        }

        .search-row { display: flex; gap: 15px; margin-bottom: 20px; }
        .search-bar { 
            flex: 1; background: var(--card); border: 1px solid var(--border); 
            border-radius: 12px; padding: 15px 20px; color: white; font-size: 1rem; outline: none;
        }

        .filter-row { display: flex; gap: 10px; flex-wrap: wrap; }
        .filter-btn { 
            background: var(--card); border: 1px solid var(--border); color: var(--text-dim);
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; font-size: 0.8rem;
        }
        .filter-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

        .picker-results {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); 
            gap: 20px;
        }

        .list-card {
            background: var(--card); border: 1px solid var(--border); border-radius: 20px;
            padding: 20px; text-align: center; cursor: pointer; transition: transform 0.2s;
        }
        .list-card:hover { transform: scale(1.03); border-color: var(--accent); }
        .list-card img { width: 140px; height: 140px; object-fit: contain; margin-bottom: 15px; }
        .list-card-name { font-size: 1.1rem; font-weight: 800; margin-bottom: 5px; }
        .list-card-val { color: var(--green); font-family: 'JetBrains Mono'; font-weight: 700; font-size: 1rem; }

        .btn-close { 
            background: var(--red); color: white; border: none; 
            padding: 15px 25px; border-radius: 12px; font-weight: 800; cursor: pointer;
        }
    </style>
</head>
<body>

    <nav class="nav-top">
        <a href="index.html" class="nav-logo">JAILBREAK<span>HUB</span></a>
        <div class="nav-links">
            <div class="nav-item"><a href="index.html" class="nav-link">Home</a></div>
            <div class="nav-item">
                <span class="nav-link">Seasons ▼</span>
                <div class="dropdown">
                    <a href="contracts.html" class="drop-link">Season Contracts</a>
                    <a href="prizes.html" class="drop-link">Season Rewards</a>
                </div>
            </div>
            <div class="nav-item">
                <span class="nav-link" style="color:#fff">Values ▼</span>
                <div class="dropdown">
                    <a href="values.html" class="drop-link">Value List</a>
                    <a href="calculator.html" class="drop-link">Value Calculator</a>
                </div>
            </div>
            <div class="nav-item">
                <span class="nav-link">Community ▼</span>
                <div class="dropdown">
                    <a href="vip.html" class="drop-link">Private Servers</a>
                    <a href="testimonials.html" class="drop-link">Testimonials</a>
                </div>
            </div>
            <div class="nav-item"><a href="tracker.html" class="nav-link">Tracker</a></div>
        </div>
    </nav>

    <div class="container">
        <div class="result-panel">
            <div>
                <div class="status-label" id="status">EQUAL</div>
                <div id="difference" style="color:var(--text-dim); font-weight:700; font-size: 0.9rem;">Difference: $0</div>
            </div>
            <div style="display:flex; gap:12px;">
                <button class="btn-ui" onclick="swapSides()" style="background:var(--card); color:white; border:1px solid var(--border); padding:10px 20px; border-radius:10px; cursor:pointer;">Swap Sides</button>
                <button class="btn-ui" onclick="clearAll()" style="background:var(--card); color:var(--red); border:1px solid var(--red); padding:10px 20px; border-radius:10px; cursor:pointer;">Clear All</button>
            </div>
        </div>

        <h2 style="font-weight:900; text-transform: uppercase; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">
            YOUR SIDE <span id="valA" style="float:right; color:var(--accent); font-family:'JetBrains Mono'; font-size: 1.2rem;">$0</span>
        </h2>
        <div class="item-grid" id="gridA">
            <div class="add-box" onclick="openPicker('A')"><h1>+</h1>ADD ITEM</div>
        </div>

        <h2 style="font-weight:900; text-transform: uppercase; font-size: 0.8rem; color: var(--text-dim); margin-bottom: 20px;">
            THEIR SIDE <span id="valB" style="float:right; color:var(--accent); font-family:'JetBrains Mono'; font-size: 1.2rem;">$0</span>
        </h2>
        <div class="item-grid" id="gridB">
            <div class="add-box" onclick="openPicker('B')"><h1>+</h1>ADD ITEM</div>
        </div>
    </div>

    <div id="pickerOverlay">
        <div class="picker-header">
            <div class="search-row">
                <input type="text" id="pSearch" class="search-bar" placeholder="Search by name..." oninput="renderPicker()">
                <button class="btn-close" onclick="closePicker()">CLOSE</button>
            </div>
            <div class="filter-row" id="filterTabs">
                <button class="filter-btn active" onclick="setFilter('All')">ALL ITEMS</button>
                <button class="filter-btn" onclick="setFilter('Vehicles')">VEHICLES</button>
                <button class="filter-btn" onclick="setFilter('Limiteds')">LIMITEDS</button>
                <button class="filter-btn" onclick="setFilter('Textures')">TEXTURES</button>
                <button class="filter-btn" onclick="setFilter('Rims')">RIMS</button>
            </div>
        </div>
        
        <div class="picker-body">
            <div class="picker-results" id="pResults"></div>
        </div>
    </div>

    <script>
        const db = {
            "Vehicles": [
                { name: "Torpedo", cash_value: 40000000, image: "https://via.placeholder.com/200" },
                { name: "Arachnid", cash_value: 25000000, image: "https://via.placeholder.com/200" },
                { name: "Mégalo", cash_value: 15000000, image: "https://via.placeholder.com/200" },
                { name: "Beam Hybrid", cash_value: 20000000, image: "https://via.placeholder.com/200" },
                { name: "Celsior", cash_value: 18000000, image: "https://via.placeholder.com/200" },
                { name: "Proto-08", cash_value: 12000000, image: "https://via.placeholder.com/200" }
            ],
            "Limiteds": [
                { name: "Void Rim", cash_value: 12000000, image: "https://via.placeholder.com/200" },
                { name: "Blue Fire", cash_value: 5000000, image: "https://via.placeholder.com/200" },
                { name: "Hypno Rim", cash_value: 3000000, image: "https://via.placeholder.com/200" }
            ],
            "Textures": [
                { name: "Armor", cash_value: 8000000, image: "https://via.placeholder.com/200" },
                { name: "Pixel", cash_value: 1500000, image: "https://via.placeholder.com/200" },
                { name: "Galactic", cash_value: 4500000, image: "https://via.placeholder.com/200" }
            ],
            "Rims": [
                { name: "Spinner", cash_value: 35000000, image: "https://via.placeholder.com/200" },
                { name: "Track Rim", cash_value: 500000, image: "https://via.placeholder.com/200" }
            ]
        };

        let sideA = [];
        let sideB = [];
        let activeSide = 'A';
        let currentFilter = 'All';

        function openPicker(side) {
            activeSide = side;
            document.getElementById('pickerOverlay').style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Prevent background scroll
            renderPicker();
        }

        function closePicker() { 
            document.getElementById('pickerOverlay').style.display = 'none'; 
            document.body.style.overflow = 'auto';
        }

        function setFilter(cat) {
            currentFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === cat.toLowerCase() || (cat === 'All' && btn.innerText === 'ALL ITEMS'));
            });
            renderPicker();
        }

        function renderPicker() {
            const query = document.getElementById('pSearch').value.toLowerCase();
            const res = document.getElementById('pResults');
            res.innerHTML = '';

            for(let cat in db) {
                if(currentFilter !== 'All' && cat !== currentFilter) continue;

                db[cat].filter(i => i.name.toLowerCase().includes(query)).forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'list-card';
                    div.innerHTML = `
                        <img src="${item.image}">
                        <div class="list-card-name">${item.name}</div>
                        <div class="list-card-val">$${item.cash_value.toLocaleString()}</div>
                    `;
                    div.onclick = () => {
                        if (activeSide === 'A') sideA.push(item);
                        else sideB.push(item);
                        closePicker();
                        updateUI();
                    };
                    res.appendChild(div);
                });
            }
        }

        function removeItem(side, index) {
            if (side === 'A') sideA.splice(index, 1);
            else sideB.splice(index, 1);
            updateUI();
        }

        function clearAll() { sideA = []; sideB = []; updateUI(); }
        function swapSides() { [sideA, sideB] = [sideB, sideA]; updateUI(); }

        function updateUI() {
            const draw = (items, gridId, side) => {
                const grid = document.getElementById(gridId);
                let html = items.map((item, i) => `
                    <div class="item-card">
                        <button class="remove-btn" onclick="removeItem('${side}', ${i})">×</button>
                        <div class="img-container"><img src="${item.image}"></div>
                        <div class="card-details">
                            <div class="card-name">${item.name}</div>
                            <div class="val-num">$${item.cash_value.toLocaleString()}</div>
                        </div>
                    </div>
                `).join('');
                html += `<div class="add-box" onclick="openPicker('${side}')"><h1>+</h1>ADD ITEM</div>`;
                grid.innerHTML = html;
            };

            draw(sideA, 'gridA', 'A');
            draw(sideB, 'gridB', 'B');

            const totalA = sideA.reduce((s, i) => s + i.cash_value, 0);
            const totalB = sideB.reduce((s, i) => s + i.cash_value, 0);
            document.getElementById('valA').innerText = `$${totalA.toLocaleString()}`;
            document.getElementById('valB').innerText = `$${totalB.toLocaleString()}`;

            const diff = totalA - totalB;
            const status = document.getElementById('status');
            document.getElementById('difference').innerText = `Difference: $${Math.abs(diff).toLocaleString()}`;

            if (totalA === 0 && totalB === 0) { 
                status.innerText = "EQUAL"; status.style.color = "white"; 
            } else if (Math.abs(diff) < (Math.max(totalA, totalB) * 0.1)) { 
                status.innerText = "FAIR TRADE"; status.style.color = "var(--green)"; 
            } else { 
                status.innerText = diff > 0 ? "L (OVERPAYING)" : "W (PROFIT)"; 
                status.style.color = diff > 0 ? "var(--red)" : "var(--green)";
            }
        }
    </script>
</body>
</html>
